<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Processing Console</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
html, body { height: 100%; margin: 0; overflow: auto; }
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #12131a;
  --accent: #00e5ff;
  --accent2: #ff3d71;
  --text: #e0e6ed;
  --dim: #4a5568;
}

* { box-sizing: border-box; }
body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); }

.card {
  background: var(--surface);
  border: 1px solid #1e2030;
  border-radius: 8px;
  padding: 10px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0.6;
}

.led-uv {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #7c3aed;
  box-shadow: 0 0 4px #7c3aed, 0 0 8px #7c3aed;
  display: inline-block;
  animation: ledPulse 2s infinite;
}
@keyframes ledPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.led-active {
  background: #00ff88;
  box-shadow: 0 0 4px #00ff88, 0 0 8px #00ff88;
}

.neon-flash {
  animation: neonFlash 0.3s infinite alternate;
}
@keyframes neonFlash {
  from { opacity: 1; text-shadow: 0 0 5px #ff0040, 0 0 10px #ff0040, 0 0 20px #ff0040; }
  to { opacity: 0.4; text-shadow: none; }
}

.btn-ctrl {
  background: #1a1b2e;
  border: 1px solid #2d3048;
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 9px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s;
}
.btn-ctrl:hover { border-color: var(--accent); }
.btn-ctrl.active { background: var(--accent); color: #000; border-color: var(--accent); }

.fader {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: #1e2030;
  border-radius: 2px;
  outline: none;
}
.fader::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 4px var(--accent);
}
.fader::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: none;
}

.digital-display {
  background: #000;
  border: 1px solid #1e2030;
  padding: 2px 6px;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: #00ff88;
  border-radius: 3px;
  min-width: 50px;
  text-align: center;
}

/* KOMPONEN VU METER BAR */
.vu-container {
  width: 130px;
  height: 14px;
  background: #050508;
  border: 1px solid #1e2030;
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  gap: 1px;
  padding: 1.5px;
}
.vu-bar {
  flex: 1;
  height: 100%;
  background: #222;
  transition: background 0.03s ease;
}

canvas { display: block; }

.section-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--dim);
}

.grid-console {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 8px;
}

@media (max-width: 1200px) {
  .grid-console { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 800px) {
  .grid-console { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 500px) {
  .grid-console { grid-template-columns: 1fr; }
}
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full overflow-auto" style="background: var(--bg);">
   
   <!-- HEADER UTAMA -->
   <div class="flex items-center justify-between px-4 py-2 border-b border-gray-800">
    <div class="flex items-center gap-3">
     <h1 id="consoleTitle" class="font-bold text-sm" style="font-family:'Orbitron',sans-serif; color:var(--accent);">AUDIO PROCESSING CONSOLE</h1><span class="led-uv"></span>
    </div>
    
    <!-- INDIKATOR INDEKS MASTER & VU METER -->
    <div class="flex items-center gap-4">
     <div class="flex items-center gap-1.5">
       <span class="text-[8px] text-gray-500 font-bold font-['Orbitron']">VU LEVEL</span>
       <div class="vu-container" id="vuMeterLEDs">
         <!-- Elemen LED bar digenerate via JavaScript -->
       </div>
     </div>
     <div class="flex items-center gap-2">
      <span id="limitBadge" class="text-xs px-2 py-0.5 rounded bg-gray-800 text-gray-400 font-bold" style="font-family:'Orbitron',sans-serif;">LIMIT</span> 
      <span class="digital-display" id="masterLevel">-∞ dB</span>
     </div>
    </div>
   </div>

   <!-- KONTROL SUMBER AUDIO (SOURCE CONTROLS) -->
   <div class="flex items-center gap-2 px-4 py-2 border-b border-gray-800 flex-wrap">
    <span class="section-label">SOURCE:</span> 
    <label class="btn-ctrl cursor-pointer"> 
      <input type="file" accept="audio/*" id="fileInput" class="hidden"> 📁 Load File 
    </label> 
    <span id="fileNameDisp" class="text-xs text-gray-400 max-w-[150px] truncate">No file...</span>
    <button class="btn-ctrl" id="micBtn">🎙️ Mic</button> 
    <button class="btn-ctrl" id="toneBtn">〰️ Tone Gen</button>
    <div class="flex items-center gap-1 ml-2">
     <span class="text-xs text-gray-500">Freq:</span> <input type="range" class="fader" style="width:80px;" id="toneFreq" min="15" max="20000" value="440"> <span class="digital-display" id="toneFreqDisp">440 Hz</span>
    </div>
    <div class="flex items-center gap-1 ml-2">
     <span class="text-xs text-gray-500">Wave:</span> 
     <select id="toneWave" class="btn-ctrl" style="padding:2px 4px;"> 
       <option value="sine">Sine</option> 
       <option value="square">Square</option> 
       <option value="sawtooth">Saw</option> 
       <option value="triangle">Tri</option> 
     </select>
    </div>
    <button class="btn-ctrl ml-auto !text-emerald-400 border-emerald-900/50" id="playBtn">▶ Play</button> 
    <button class="btn-ctrl !text-rose-400 border-rose-900/50" id="stopBtn">⏹ Stop</button>
   </div>

   <!-- PANEL KONTROL UTAMA -->
   <div class="grid-console" id="mainGrid">
    
    <!-- Real-Time Analyzer (RTA) -->
    <div class="card" style="grid-column: span 2; grid-row: span 2;">
     <div class="flex items-center justify-between mb-1">
      <span class="section-label">Real-Time Analyzer</span> <span class="led-uv"></span>
     </div>
     <canvas id="rtaCanvas" width="500" height="200" style="width:100%;height:180px;border-radius:4px;background:#000;"></canvas>
    </div>

    <!-- Focal FX Panel -->
    <div class="card" style="grid-column: span 2;">
     <div class="flex items-center justify-between mb-1">
      <span class="section-label">Focal FX</span>
      <div class="flex items-center gap-1"><span class="led-uv"></span><button class="btn-ctrl active" id="focalToggle">ON</button>
      </div>
     </div>
     <div class="space-y-1">
      <div class="flex items-center justify-between">
       <span class="text-xs text-gray-500">Effect</span> 
       <select id="focalEffect" class="btn-ctrl" style="padding:3px 6px; font-size:10px;"> 
         <option value="none">None</option> 
         <option value="reverb">Reverb</option> 
         <option value="delay">Delay</option> 
       </select>
      </div>
      <div class="flex items-center justify-between">
       <span class="text-xs text-gray-500">Depth</span> <span class="digital-display" id="focalDepthDisp">50%</span>
      </div><input type="range" class="fader" id="focalDepth" min="0" max="100" value="50">
      <div class="flex items-center justify-between">
       <span class="text-xs text-gray-500">Speed</span> <span class="digital-display" id="focalSpeedDisp">50%</span>
      </div><input type="range" class="fader" id="focalSpeed" min="0" max="100" value="50">
      <div class="flex items-center justify-between">
       <span class="text-xs text-gray-500">Mix</span> <span class="digital-display" id="focalMixDisp">50%</span>
      </div><input type="range" class="fader" id="focalMix" min="0" max="100" value="50">
     </div>
    </div>

    <!-- Kompresor -->
    <div class="card">
     <div class="flex items-center justify-between mb-1">
      <span class="section-label">Compressor</span>
      <div class="flex items-center gap-1"><span class="led-uv"></span><button class="btn-ctrl active" id="compToggle">ON</button>
      </div>
     </div>
     <div class="space-y-1">
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">Threshold</span><span class="digital-display" id="compThDisp">-24 dB</span>
      </div><input type="range" class="fader" id="compThreshold" min="-60" max="0" value="-24">
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">Ratio</span><span class="digital-display" id="compRatDisp">4:1</span>
      </div><input type="range" class="fader" id="compRatio" min="1" max="20" value="4">
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">Attack</span><span class="digital-display" id="compAtkDisp">3 ms</span>
      </div><input type="range" class="fader" id="compAttack" min="0" max="100" value="3">
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">Release</span><span class="digital-display" id="compRelDisp">250 ms</span>
      </div><input type="range" class="fader" id="compRelease" min="10" max="1000" value="250">
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">Reduction</span><span class="digital-display" id="compRedDisp">0 dB</span>
      </div>
     </div>
    </div>

    <!-- Limiter -->
    <div class="card">
     <div class="flex items-center justify-between mb-1">
      <span class="section-label">Output Limiter</span>
      <div class="flex items-center gap-1"><span class="led-uv"></span><button class="btn-ctrl active" id="limiterToggle">ON</button>
      </div>
     </div>
     <div class="space-y-1">
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">Ceiling</span><span class="digital-display" id="limCeilDisp">-0.3 dB</span>
      </div><input type="range" class="fader" id="limCeiling" min="-12" max="0" value="-0.3" step="0.1">
      <div class="flex items-center justify-between"><span class="text-xs text-gray-500">Release</span><span class="digital-display" id="limRelDisp">50 ms</span>
      </div><input type="range" class="fader" id="limRelease" min="1" max="500" value="50">
     </div>
    </div>

   </div>

   <!-- Panel Periksa Status -->
   <div class="px-4 py-3 border-t border-gray-800 flex justify-center">
    <button class="btn-ctrl px-6 py-2 text-sm" id="checkStatusBtn" style="font-family:'Orbitron',sans-serif; border-color: var(--accent);">⚡ CHECK STATUS</button>
    <div id="statusOutput" class="ml-4 text-xs text-gray-400 self-center hidden"></div>
   </div>
  </div>

  <!-- JAVASCRIPT LOGIC -->
  <script>
// Konstruktor Variabel Audio Engine
let ctx, sourceNode, micStream;
let analyser, compressor, limiter;
let outputGain, masterGain;
let audioBuffer, isPlaying = false;
let toneOsc, toneGain;
let animFrame;

// Pembuatan Segmen Bar LED VU Meter (15 Segmen)
const vuContainer = document.getElementById('vuMeterLEDs');
const totalLEDs = 15;
for(let i=0; i<totalLEDs; i++) {
  const bar = document.createElement('div');
  bar.className = 'vu-bar';
  vuContainer.appendChild(bar);
}
const vuBars = document.querySelectorAll('.vu-bar');

// Fungsi Inisialisasi Audio Core
function initAudio() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Konfigurasi Analyser Node
  analyser = ctx.createAnalyser();
  analyser.fftSize = 256; 

  // Konfigurasi Standar Compressor
  compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -24; 
  compressor.ratio.value = 4;
  compressor.attack.value = 0.003; 
  compressor.release.value = 0.25;

  // Konfigurasi Standar Limiter
  limiter = ctx.createDynamicsCompressor();
  limiter.threshold.value = -0.3; 
  limiter.ratio.value = 20;
  limiter.attack.value = 0.001; 
  limiter.release.value = 0.05;

  // Gain Manajemen
  outputGain = ctx.createGain(); outputGain.gain.value = 1;
  masterGain = ctx.createGain(); masterGain.gain.value = 1;

  startAnimation();
}

// Fungsi Membangun Rantai Hubungan Audio (Audio Chain)
function buildChain(source) {
  // Masuk ke Analyser terlebih dahulu agar visualisasi presisi sebelum terkena kompresi berlebih
  source.connect(analyser);

  // Aliran Efek: Analyser -> Compressor -> Limiter -> Output Terminal
  analyser.connect(compressor);
  compressor.connect(limiter);
  limiter.connect(outputGain);
  outputGain.connect(masterGain);
  masterGain.connect(ctx.destination);
}

// Event Listener: Penanganan Input File Audio
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileNameDisp').textContent = file.name;
  
  initAudio();
  if (ctx.state === 'suspended') await ctx.resume();
  
  const arrayBuf = await file.arrayBuffer();
  ctx.decodeAudioData(arrayBuf, (buffer) => {
    audioBuffer = buffer;
    console.log("Audio terdekode dengan aman!");
  }, (err) => {
    console.error("Gagal memproses decoding file audio.", err);
  });
});

// Event Listener: Fungsi Tombol Play (Fix Meluncurkan Aliran Audio)
document.getElementById('playBtn').addEventListener('click', async () => {
  initAudio();
  if (ctx.state === 'suspended') await ctx.resume();
  if (isPlaying) return;

  if (audioBuffer) {
    disconnectAll();
    sourceNode = ctx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.loop = true;
    
    // Hubungkan simpul pipa audio
    buildChain(sourceNode);
    
    sourceNode.start(0);
    isPlaying = true;
    document.getElementById('playBtn').classList.add('active');
  } else {
    alert("Silakan muat berkas audio via tombol 'Load File' terlebih dahulu!");
  }
});

// Event Listener: Tombol Stop
document.getElementById('stopBtn').addEventListener('click', () => {
  if (sourceNode && isPlaying) {
    try { sourceNode.stop(); } catch(e){}
    isPlaying = false;
    document.getElementById('playBtn').classList.remove('active');
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
    document.getElementById('micBtn').classList.remove('active');
  }
  if (toneOsc) {
    try { toneOsc.stop(); } catch(e){}
    toneOsc = null;
    document.getElementById('toneBtn').classList.remove('active');
  }
  resetVUMeter();
});

// Event Listener: Mikrofon Input
document.getElementById('micBtn').addEventListener('click', async () => {
  initAudio();
  if (ctx.state === 'suspended') await ctx.resume();
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    disconnectAll();
    sourceNode = ctx.createMediaStreamSource(micStream);
    buildChain(sourceNode);
    document.getElementById('micBtn').classList.add('active');
  } catch(e) {
    alert("Izin mikrofon ditolak atau perangkat tidak ditemukan.");
  }
});

// Event Listener: Tone Generator
document.getElementById('toneBtn').addEventListener('click', async () => {
  initAudio();
  if (ctx.state === 'suspended') await ctx.resume();
  if (toneOsc) { 
    try { toneOsc.stop(); } catch(e){}
    toneOsc = null; 
    document.getElementById('toneBtn').classList.remove('active'); 
    resetVUMeter();
    return; 
  }
  disconnectAll();
  toneOsc = ctx.createOscillator();
  toneOsc.type = document.getElementById('toneWave').value;
  toneOsc.frequency.value = parseInt(document.getElementById('toneFreq').value);
  
  buildChain(toneOsc);
  toneOsc.start();
  document.getElementById('toneBtn').classList.add('active');
});

document.getElementById('toneFreq').addEventListener('input', (e) => {
  const v = parseInt(e.target.value);
  document.getElementById('toneFreqDisp').textContent = v + ' Hz';
  if (toneOsc) toneOsc.frequency.value = v;
});

// Helper Fungsi Pengikat Data Fader UI ke Audio Parameter
function bindFader(id, dispId, fmt, cb) {
  document.getElementById(id).addEventListener('input', function() {
    const v = parseFloat(this.value);
    document.getElementById(dispId).textContent = fmt(v);
    if (cb) cb(v);
  });
}

bindFader('compThreshold', 'compThDisp', v => v+' dB', v => { if(compressor) compressor.threshold.value = v; });
bindFader('compRatio', 'compRatDisp', v => v+':1', v => { if(compressor) compressor.ratio.value = v; });
bindFader('compAttack', 'compAtkDisp', v => v+' ms', v => { if(compressor) compressor.attack.value = v/1000; });
bindFader('compRelease', 'compRelDisp', v => v+' ms', v => { if(compressor) compressor.release.value = v/1000; });
bindFader('limCeiling', 'limCeilDisp', v => v.toFixed(1)+' dB', v => { if(limiter) limiter.threshold.value = v; });
bindFader('limRelease', 'limRelDisp', v => v+' ms', v => { if(limiter) limiter.release.value = v/1000; });

function disconnectAll() {
  try { if (sourceNode) sourceNode.disconnect(); } catch(e){}
}

function resetVUMeter() {
  vuBars.forEach(bar => bar.style.background = '#222');
  document.getElementById('masterLevel').textContent = '-∞ dB';
}

// Loop Animasi RTA & Level VU Meter
function startAnimation() {
  const rtaC = document.getElementById('rtaCanvas');
  const rtaCtx = rtaC.getContext('2d');

  function draw() {
    animFrame = requestAnimationFrame(draw);
    if (!analyser) return;

    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);

    // Render Canvas RTA
    rtaCtx.fillStyle = '#000';
    rtaCtx.fillRect(0, 0, rtaC.width, rtaC.height);
    const barW = rtaC.width / bufLen;
    for (let i = 0; i < bufLen; i++) {
      const v = data[i] / 255;
      const h = v * rtaC.height;
      rtaCtx.fillStyle = `hsl(190, 100%, ${30 + v * 40}%)`;
      rtaCtx.fillRect(i * barW, rtaC.height - h, barW - 1, h);
    }

    // Penghitungan Logika Amplitudo VU Meter
    let peak = 0;
    for (let i = 0; i < bufLen; i++) { 
      if (data[i] > peak) peak = data[i]; 
    }
    
    const dbLevel = peak > 0 ? (20 * Math.log10(peak / 255)) : -60;
    document.getElementById('masterLevel').textContent = peak > 0 ? dbLevel.toFixed(1) + ' dB' : '-∞ dB';

    // Manajemen Warna Lampu LED VU Meter (Hijau -> Oranye -> Merah)
    const activeLEDs = Math.round((peak / 255) * totalLEDs);
    vuBars.forEach((bar, index) => {
      if (index < activeLEDs) {
        if (index < 9) {
          bar.style.background = '#00ff88'; // Hijau (Aman)
        } else if (index < 13) {
          bar.style.background = '#ff9900'; // Oranye (Saturasi/Warning)
        } else {
          bar.style.background = '#ff3d71'; // Merah (Peak Limit)
        }
      } else {
        bar.style.background = '#222'; // Redup mati
      }
    });

    // Alert Kedip pada Badge Limit jika sinyal terlalu panas mendekati 0 dB
    const badge = document.getElementById('limitBadge');
    if (dbLevel > -1.0 && peak > 0) {
      badge.classList.add('neon-flash');
      badge.style.color = '#ff0040';
    } else {
      badge.classList.remove('neon-flash');
      badge.style.color = '#4a5568';
    }
    
    if(compressor) {
      document.getElementById('compRedDisp').textContent = (compressor.reduction || 0).toFixed(1) + ' dB';
    }
  }
  draw();
}

// Mengaktifkan Tombol Verifikasi Sistem Terminal
document.getElementById('checkStatusBtn').addEventListener('click', function() {
  const out = document.getElementById('statusOutput');
  out.classList.remove('hidden');
  out.innerHTML = `<span style="color:var(--accent);">✓ Audio Engine Active</span> | Sample Rate: ${ctx ? ctx.sampleRate + ' Hz' : 'N/A'}`;
});
  </script>
 </body>
