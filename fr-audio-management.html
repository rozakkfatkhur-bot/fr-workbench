<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR-Engine Audio DSP Workbench</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0a0f; color: #e0e0ff; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #151525; border-radius: 8px; }
        .status-bar { display: flex; gap: 20px; }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .stream-source-btn, .action-toggle-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .stream-source-btn { background: #2a2a4a; color: #fff; }
        .stream-source-btn.active-src { background: #bc13fe; }
        .action-toggle-btn { background: #3a3a6a; color: #fff; margin: 2px; }
        .action-toggle-btn.l-active, .action-toggle-btn.fx-active, .action-toggle-btn.harm-active { background: #2ecc71; color: #000; }
        .action-toggle-btn.muted-active { background: #e74c3c; }
        .display-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .canvas-wrap { flex: 1; background: #000; border-radius: 8px; padding: 10px; }
        canvas { width: 100%; height: 120px; background: #000; border-radius: 4px; }
        .grid-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #151525; padding: 15px; border-radius: 8px; }
        .card h3 { margin-bottom: 12px; color: #00e5ff; }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 3px; opacity: 0.8; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #2a2a4a; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: #bc13fe; cursor: pointer; }
        .btn-matrix { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
        .btn-matrix button { padding: 6px 10px; font-size: 12px; border: none; border-radius: 4px; background: #2a2a4a; color: #fff; cursor: pointer; }
        .btn-matrix button.l-active, .btn-matrix button.r-active { background: #2ecc71; color: #000; }
        .btn-matrix button.mute-on { background: #e74c3c; }
        .vu-meter { display: flex; gap: 2px; height: 20px; margin: 5px 0; }
        .vu-segment, .gr-segment { flex: 1; background: #1a1a2e; border-radius: 2px; }
        .vu-segment.green-on { background: #2ecc71; }
        .vu-segment.yellow-on { background: #f1c40f; }
        .vu-segment.red-on { background: #e74c3c; }
        .gr-segment.gr-on { background: #00e5ff; }
        .led-limit { width: 12px; height: 12px; border-radius: 50%; background: #2a2a4a; display: inline-block; margin-left: 5px; }
        .led-limit.active-limit { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        select { background: #2a2a4a; color: #fff; border: none; padding: 5px; border-radius: 4px; }
        .file-controls { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>FR-ENGINE DSP MATRIX PRO</h2>
            <div class="status-bar">
                <div class="status-item">CPU: <span id="cpu-temp">45.0 °C</span></div>
                <div class="status-item">VCC: <span id="volt-monitor">12.50 VDC</span></div>
                <div class="status-item">
                    <button id="src-toggle-btn" class="stream-source-btn">AUTO</button>
                    <span id="src-mode-text">AUTO</span>
                </div>
            </div>
        </div>

        <div id="stream-status" class="card" style="margin-bottom:15px; padding:10px; background:#1a1a2e;">

        <div class="file-controls">

            <button id="play-pause-btn" class="action-toggle-btn" disabled style="opacity:0.5">▶️ PLAY</button>
            <button id="start-stream-btn" class="action-toggle-btn l-active">🎙️ MULAI LIVE</button>
            <button id="global-panic-btn" class="action-toggle-btn">🚨 MUTE SYSTEM</button>
        </div>

        <div class="display-row">

                    <span>CHANNEL L</span>
                    <div>
                        <span>VU:</span>

                        <span>GR:</span>

            </div>
            <div class="canvas-wrap">

                        <span>GR:</span>

                        <span class="led-limit" id="led-limit-r"></span>

                    <button class="ch-l-btn l-active" data-type="limiter">GUARDING</button>

                    <button class="ch-l-btn l-active" data-type="syscombine">COMBINE L</button>

                            <option value="LR48">LR48 (48dB/oct)</option>

                <div class="control-group">
                    <label>LOW MID Q: <span id="peq-lm-q-txt-l">1.2</span></label>
                    <input type="range" id="peq-lm-q-l" min="0.1" max="5" step="0.1" value="1.2">

                <div class="control-group">
                    <label>MID HIGH GAIN: <span id="peq-mv-g-txt-l">0 dB</span></label>

                </div>
                <div class="control-group">
                    <label>MID HIGH Q: <span id="peq-mv-q-txt-l">1.5</span></label>
                    <input type="range" id="peq-mv-q-l" min="0.1" max="5" step="0.1" value="1.5">
                </div>
                <div class="control-group">
                    <label>HIGH GAIN: <span id="peq-ht-g-txt-l">0 dB</span></label>
                    <input type="range" id="peq-ht-g-l" min="-15" max="+15" value="0">
                </div>
                <div class="control-group">
                    <label>HIGH Q: <span id="peq-ht-q-txt-l">1.0</span></label>
                    <input type="range" id="peq-ht-q-l" min="0.1" max="5" step="0.1" value="1.0">

                <h4 style="margin:10px 0 5px 0;">SPECIAL MODULES</h4>

                    <label>SULTAN SUB GLOW: <span id="sultan-txt-l">0 dB</span></label>
                    <input type="range" id="sultan-gain-l" min="0" max="+18" value="0">
                </div>
                <div class="control-group">
                    <label>VOCAL BOOST: <span id="vocal-txt-l">0 dB</span></label>
                    <input type="range" id="vocal-gain-l" min="0" max="+12" value="0">
                </div>
                <div class="control-group">
                    <label>HARMONIC EXCITER: <span id="harmonic-txt-l">0%</span></label>
                    <input type="range" id="harmonic-amt-l" min="0" max="100" value="0">
                </div>
                <div class="control-group">
                    <label>DYNAMIC EQ FREQ: <span id="deq-freq-txt-l">1000 Hz</span></label>
                    <input type="range" id="deq-freq-l" min="100" max="8000" value="1000">
                </div>
                <div class="control-group">
                    <label>DYNAMIC EQ GAIN: <span id="deq-gain-txt-l">0 dB</span></label>
                    <input type="range" id="deq-gain-l" min="-12" max="+12" value="0">
                </div>
            </div>

            <!-- KANAN CHANNEL -->
            <div class="card">
                <h3>CHANNEL R</h3>
                <div class="btn-matrix">
                    <button class="ch-r-btn l-active" data-type="core">CORE ON</button>
                    <button class="ch-r-btn" data-type="turbo">STD POWER</button>
                    <button class="ch-r-btn" data-type="phase">180 DEG (INV)</button>
                    <button class="ch-r-btn" data-type="sultan">SUB GLOW OFF</button>
                    <button class="ch-r-btn" data-type="vocal">BOOST OFF</button>
                    <button class="ch-r-btn" data-type="harmonic">XTREME OFF</button>
                    <button class="ch-r-btn" data-type="deq">DEQ OFF</button>
                    <button class="ch-r-btn l-active" data-type="limiter">GUARDING</button>
                    <button class="ch-r-btn l-active" data-type="antipop">SECURE ON</button>
                    <button class="ch-r-btn l-active" data-type="syscombine">COMBINE R</button>
                </div>

                <div class="control-group">
                    <label>HPF: <span id="hpf-txt-r">20 Hz</span></label>
                    <input type="range" id="hpf-slider-r" min="20" max="500" value="20">
                </div>
                <div class="control-group">
                    <label>LPF: <span id="lpf-txt-r">20.0 kHz</span></label>
                    <input type="range" id="lpf-slider-r" min="1000" max="22000" value="20000">
                </div>
                <div class="control-group">
                    <label>GAIN: <span id="gain-txt-r">100%</span></label>
                    <input type="range" id="gain-slider-r" min="0" max="250" value="100">
                </div>
                <div class="control-group">
                    <label>LIMITER THRESHOLD: <span id="limit-thres-txt-r">-10 dB</span></label>
                    <input type="range" id="limit-thres-r" min="-40" max="0" value="-10">
                </div>

                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div class="control-group" style="flex:1;">
                        <label>Slope Filter</label>
                        <select id="slope-select-r">
                            <option value="LR12">LR12 (12dB/oct)</option>
                            <option value="LR24" selected>LR24 (24dB/oct)</option>
                            <option value="LR48">LR48 (48dB/oct)</option>
                        </select>
                    </div>
                    <div class="btn-matrix">
                        <button class="core-mute-btn mute-off" data-ch="r" data-type="peq">MUTE PEQ</button>
                        <button class="core-mute-btn mute-off" data-ch="r" data-type="gain">MUTE GAIN</button>
                        <button class="core-mute-btn mute-off" data-ch="r" data-type="echo">MUTE ECHO</button>
                    </div>
                </div>

                <h4 style="margin:10px 0 5px 0;">PARAMETRIC EQ</h4>
                <div class="control-group">
                    <label>LOW MID GAIN: <span id="peq-lm-g-txt-r">0 dB</span></label>
                    <input type="range" id="peq-lm-g-r" min="-15" max="+15" value="0">
                </div>
                <div class="control-group">
                    <label>LOW MID Q: <span id="peq-lm-q-txt-r">1.2</span></label>
                    <input type="range" id="peq-lm-q-r" min="0.1" max="5" step="0.1" value="1.2">
                </div>
                <div class="control-group">
                    <label>MID HIGH GAIN: <span id="peq-mv-g-txt-r">0 dB</span></label>
                    <input type="range" id="peq-mv-g-r" min="-15" max="+15" value="0">
                </div>
                <div class="control-group">
                    <label>MID HIGH Q: <span id="peq-mv-q-txt-r">1.5</span></label>
                    <input type="range" id="peq-mv-q-r" min="0.1" max="5" step="0.1" value="1.5">
                </div>
                <div class="control-group">
                    <label>HIGH GAIN: <span id="peq-ht-g-txt-r">0 dB</span></label>
                    <input type="range" id="peq-ht-g-r" min="-15" max="+15" value="0">
                </div>
                <div class="control-group">
                    <label>HIGH Q: <span id="peq-ht-q-txt-r">1.0</span></label>
                    <input type="range" id="peq-ht-q-r" min="0.1" max="5" step="0.1" value="1.0">
                </div>

                <h4 style="margin:10px 0 5px 0;">SPECIAL MODULES</h4>
                <div class="control-group">
                    <label>SULTAN SUB GLOW: <span id="sultan-txt-r">0 dB</span></label>
                    <input type="range" id="sultan-gain-r" min="0" max="+18" value="0">
                </div>
                <div class="control-group">
                    <label>VOCAL BOOST: <span id="vocal-txt-r">0 dB</span></label>
                    <input type="range" id="vocal-gain-r" min="0" max="+12" value="0">
                </div>
                <div class="control-group">
                    <label>HARMONIC EXCITER: <span id="harmonic-txt-r">0%</span></label>
                    <input type="range" id="harmonic-amt-r" min="0" max="100" value="0">
                </div>
                <div class="control-group">
                    <label>DYNAMIC EQ FREQ: <span id="deq-freq-txt-r">1000 Hz</span></label>
                    <input type="range" id="deq-freq-r" min="100" max="8000" value="1000">
                </div>
                <div class="control-group">
                    <label>DYNAMIC EQ GAIN: <span id="deq-gain-txt-r">0 dB</span></label>
                    <input type="range" id="deq-gain-r" min="-12" max="+12" value="0">
                </div>
            </div>
        </div>

        <div class="grid-controls">
            <!-- MASTER & EFEK GLOBAL -->
            <div class="card">
                <h3>MASTER CONTROL</h3>
                <div class="control-group">
                    <label>MASTER HARDWARE GAIN: <span id="master-vol-txt">0 dB</span></label>
                    <input type="range" id="master-gain-slider" min="0" max="200" value="100">
                </div>
                <button id="master-mute-trigger" class="action-toggle-btn" style="width:100%; margin:10px 0;">MASTER MUTE</button>

                <h4 style="margin:15px 0 8px 0;">COMPRESSOR</h4>
                <div class="control-group">
                    <label>Threshold: <span id="comp-thresh-txt">-24 dB</span></label>
                    <input type="range" id="comp-threshold" min="-60" max="0" value="-24">
                </div>
                <div class="control-group">
                    <label>Ratio: <span id="comp-ratio-txt">4:1</span></label>
                    <input type="range" id="comp-ratio" min="1" max="20" value="4">
                </div>
                <button id="comp-bypass-btn" class="action-toggle-btn l-active" style="width:100%;">COMPRESSOR ACTIVE</button>

                <h4 style="margin:15px 0 8px 0;">TEST SIGNAL GENERATOR</h4>
                <select id="test-signal-type" style="width:100%; margin-bottom:8px;">
                    <option value="off">-- Pilih Sinyal --</option>
                    <option value="sine">SINE 1kHz</option>
                    <option value="white">WHITE NOISE</option>
                    <option value="pink">PINK NOISE</option>
                </select>
                <button id="gen-toggle-btn" class="action-toggle-btn" style="width:100%;">INJECT</button>
            </div>

            <div class="card">
                <h3>EFEK KHUSUS</h3>

                <div style="margin-bottom:15px;">
                    <button id="fx-toggle-btn" class="action-toggle-btn" style="width:100%; margin-bottom:8px;">AKTIFKAN ROBOT VOICE</button>
                    <div class="control-group">
                        <label>Pitch Factor: <span id="fx-pitch-txt">1.0x</span></label>
                        <input type="range" id="fx-pitch-slider" min="5" max="20" value="10">
                    </div>
                    <div class="control-group">
                        <label>Formant: <span id="fx-formant-txt">800 Hz</span></label>
                        <input type="range" id="fx-formant-slider" min="200" max="2000" value="800">
                    </div>
                </div>

                <div style="margin-bottom:15px;">
                    <button id="harm-toggle-btn" class="action-toggle-btn" style="width:100%; margin-bottom:8px;">AKTIFKAN HARMONI</button>
                    <div class="control-group">
                        <label>Pitch Offset: <span id="harm-pitch-txt">0 Semitone</span></label>
                        <input type="range" id="harm-pitch-slider" min="-12" max="+12" value="0">
                    </div>
                    <div class="control-group">
                        <label>Volume: <span id="harm-vol-txt">0%</span></label>
                        <input type="range" id="harm-vol-slider" min="0" max="100" value="0">
                    </div>
                    <div class="control-group">
                        <label>Delay: <span id="harm-delay-txt">50 ms</span></label>
                        <input type="range" id="harm-delay-slider" min="10" max="300" value="50">
                    </div>
                </div>

                <div>
                    <button id="delay-toggle-btn" class="action-toggle-btn" style="width:100%; margin-bottom:8px;">AKTIFKAN DELAY</button>
                    <div class="control-group">
                        <label>Delay L: <span id="delay-time-l">200 ms</span></label>
                        <input type="range" id="delay-slider-l" min="50" max="500" value="200">
                    </div>
                    <div class="control-group">
                        <label>Delay R: <span id="delay-time-r">200 ms</span></label>
                        <input type="range" id="delay-slider-r" min="50" max="500" value="200">
                    </div>
                    <div class="control-group">
                        <label>Feedback: <span id="delay-fb-txt">30%</span></label>
                        <input type="range" id="delay-feedback-slider" min="0" max="90" value="30">
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="text-align:center; margin-top:20px;">
            <button id="ota-check-btn" class="action-toggle-btn">🔄 CEK FIRMWARE UPDATE</button>
            <p id="panic-status-text" style="margin-top:8px; font-weight:bold;">MUTE SYSTEM</p>
        </div>
    </div>

    <audio id="audio-file-player" controls style="display:none;">

    <script>
        const cpuTempEl = document.getElementById('cpu-temp');
        const voltEl = document.getElementById('volt-monitor');
        const streamStatusEl = document.getElementById('stream-status');
        const srcToggleBtn = document.getElementById('src-toggle-btn');
        const srcModeText = document.getElementById('src-mode-text');
        
        const canvasL = document.getElementById('displayCanvasL');
        const canvasR = document.getElementById('displayCanvasR');
        const ctxL = canvasL.getContext('2d');
        const ctxR = canvasR.getContext('2d');

        let audioCtx, streamNode, splitterNode, mergerNode;
        let analyserL, analyserR;
        
        let hpfLNodes = [], lpfLNodes = [];
        let hpfRNodes = [], lpfRNodes = [];

        let peqLML, peqMVL, peqHTL;
        let peqLMR, peqMVR, peqHTR;
        let sultanL, vocalL, harmonicL, gainL, phaseL, limiterL, antiPopL, deqFilterL;
        let sultanR, vocalR, harmonicR, gainR, phaseR, limiterR, antiPopR, deqFilterR;

        let generatorNode = null;
        let isGeneratorInjecting = false;
        let globalPanicState = false;

        let muteNodesL = {}, muteNodesR = {};

        let deqCurrentGainL = 0;
        let deqCurrentGainR = 0;

        let delayL1, delayL2, feedbackL1, feedbackL2, wetGainL, filterL;
        let delayR1, delayR2, feedbackR1, feedbackR2, wetGainR, filterR;

        // NEW VARIABLES FOR UPGRADED FEATURES
        let masterHardwareGainNode = null;
        let globalVoiceCompressorNode = null;
        let robotVoiceBiquadNode = null;
        let voicePitchWaveShaperNode = null;
        let voiceFormantNode = null;
        
        // HARMONIZER NODES
        let pitchShiftNodeL, pitchShiftNodeR, harmonizerGainL, harmonizerGainR, harmonizerDelayL, harmonizerDelayR;
        let isHarmonizerActive = false;
        let harmonizerPitch = 0;
        let harmonizerVolume = 0;
        let harmonizerDelayTime = 0;

        // DELAY EFFECT NODES
        let outputDelayL, outputDelayR, delayFeedbackGainL, delayFeedbackGainR, delayInputGainL, delayInputGainR;
        let isDelayActive = false;
        let delayTimeL = 0, delayTimeR = 0, delayFeedback = 0;

        let isMasterHardwareMuted = false;
        let isCompressorBypassed = false;
        let isRobotEffectActive = false;

        let dataArrayL, dataArrayR, bufferLength;
        let isEngineBuilt = false;
        let captureMode = 'auto'; 

        const filePlayer = document.getElementById('audio-file-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const uploadTriggerBtn = document.getElementById('upload-trigger-btn');
        let fileSourceNode = null;

        async function initLiveAudioCapture() {
            if (isEngineBuilt) {
                streamStatusEl.innerText = "Engine sudah berjalan. Silakan muat ulang untuk ganti input.";
                return;
            }
            if (activeInputType === 'file') {
                streamStatusEl.innerText = "Input File sedang aktif. Silakan muat ulang untuk ganti ke Live/Mic.";
                return;
            }
            
            activeInputType = 'live';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let mediaStream = null;

            streamStatusEl.innerText = "Meminta izin akses audio...";

            if (captureMode === 'mic') {
                mediaStream = await startMicStream();
            } else if (captureMode === 'system') {
                try {
                    mediaStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { displaySurface: "browser" },
                        audio: { 
                            echoCancellation: false, 
                            noiseSuppression: false, 
                            autoGainControl: false 
                        }
                    });
                    streamStatusEl.innerText = "Berhasil tangkap SUARA SISTEM/LOOPBACK";
                } catch (err) {
                    streamStatusEl.innerText = "Gagal ambil sistem, ganti ke Mikrofon...";
                    mediaStream = await startMicStream();
                }
            } else { // AUTO
                try {
                    mediaStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { displaySurface: "browser" },
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                    });
                    streamStatusEl.innerText = "Mode AUTO: Menggunakan Suara Sistem";
                } catch (err) {
                    mediaStream = await startMicStream();
                }
            }

            if (mediaStream) {
                streamNode = audioCtx.createMediaStreamSource(mediaStream);
                buildDiscreteEngine();
                document.getElementById('start-stream-btn').innerHTML = `<i class="fa-solid fa-circle-check"></i> FR-ENGINE LIVE`;
                document.getElementById('start-stream-btn').style.background = "#bc13fe";
                srcToggleBtn.disabled = true; 
            }
        }

        async function startMicStream() {
            try {
                streamStatusEl.innerText = "Menggunakan Mikrofon...";
                return await navigator.mediaDevices.getUserMedia({
                    video: false,
                    audio: { 
                        echoCancellation: false, 
                        noiseSuppression: false, 
                        autoGainControl: false 
                    }
                });
            } catch(e) {
                streamStatusEl.innerText = "Izin mikrofon ditolak: " + e.message;
                return null;
            }
        }

        function toggleSignalGenerator() {
            const select = document.getElementById('test-signal-type');
            const type = select.value;
            const btn = document.getElementById('gen-toggle-btn');

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            if(!isEngineBuilt) {
                streamStatusEl.innerText = "Membangun Engine DSP dulu...";
                buildDiscreteEngine();
            }

            if (isGeneratorInjecting) {
                if (generatorNode) {
                    generatorNode.stop();
                    generatorNode.disconnect();
                    generatorNode = null;
                }
                isGeneratorInjecting = false;
                btn.className = "action-toggle-btn";
                btn.innerText = "INJECT";
                streamStatusEl.innerText = "Signal generator dihentikan.";
                return;
            }

            if (type === 'off') {
                alert("Pilih tipe gelombang sinyal terlebih dahulu!");
                return;
            }

            if (type === 'sine') {
                generatorNode = audioCtx.createOscillator();
                generatorNode.type = 'sine';
                generatorNode.frequency.setValueAtTime(1000, audioCtx.currentTime);
            } else if (type === 'white' || type === 'pink') {
                let bufferSize = 2 * audioCtx.sampleRate,
                    noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                    output = noiseBuffer.getChannelData(0);
                
                let b0, b1, b2, b3, b4, b5, b6;
                b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;

                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    if (type === 'pink') {
                        b0 = 0.99886 * b0 + white * 0.0555179;
                        b1 = 0.99332 * b1 + white * 0.0750759;
                        b2 = 0.96900 * b2 + white * 0.1538520;
                        b3 = 0.86650 * b3 + white * 0.3104856;
                        b4 = 0.55000 * b4 + white * 0.5329522;
                        b5 = -0.7616 * b5 - white * 0.0168980;
                        output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                        output[i] *= 0.11; 
                        b6 = white * 0.115926;
                    } else {
                        output[i] = white * 0.4;
                    }
                }
                generatorNode = audioCtx.createBufferSource();
                generatorNode.buffer = noiseBuffer;
                generatorNode.loop = true;
            }

            generatorNode.connect(masterHardwareGainNode);
            generatorNode.start();
            isGeneratorInjecting = true;
            btn.className = "action-toggle-btn l-active";
            btn.innerText = "INJECTING";
            streamStatusEl.innerText = `Menyuntikkan Sinyal Uji: ${type.toUpperCase()} langsung ke DSP Matrix Cores...`;
        }

        function toggleRobotEffect() {

                if(isEngineBuilt) {
                    voicePitchWaveShaperNode = audioCtx.createWaveShaper();
                    let curve = new Float32Array(65536);
                    for (let i = 0; i < 65536; i++) {
                        let x = (i / 65536) * 2 - 1;
                        curve[i] = Math.tanh(x * 4);
                    }
                    voicePitchWaveShaperNode.curve = curve;
                    
                    robotVoiceBiquadNode = audioCtx.createBiquadFilter();
                    robotVoiceBiquadNode.type = 'bandpass';
                    robotVoiceBiquadNode.frequency.value = 1000;
                    robotVoiceBiquadNode.Q.value = 2;

                    if(peqHTL) peqHTL.disconnect();
                    if(peqHTR) peqHTR.disconnect();
                    
                    peqHTL.connect(voicePitchWaveShaperNode);
                    peqHTR.connect(voicePitchWaveShaperNode);
                    voicePitchWaveShaperNode.connect(robotVoiceBiquadNode);
                    robotVoiceBiquadNode.connect(harmonizerGainL);
                    robotVoiceBiquadNode.connect(harmonizerGainR);
                }
            } else {

        // --- FILTER & EQ UPDATE FUNCTIONS ---
        function updateHPF(channel, freq) {
            const txtEl = document.getElementById(`hpf-txt-${channel}`);
            txtEl.innerText = freq + " Hz";
            
            if(!isEngineBuilt) return;
            const nodes = channel === 'l' ? hpfLNodes : hpfRNodes;
            nodes.forEach((node, idx) => {
                let order = channelParams[channel].slope;
                let factor = 1;
                if(order === 'LR24') factor = 2;
                if(order === 'LR48') factor = 4;
                node.frequency.setValueAtTime(freq, audioCtx.currentTime);
                node.Q.setValueAtTime(1 / Math.sqrt(2), audioCtx.currentTime);
            });
        }

        function updateLPF(channel, freq) {
            const txtEl = document.getElementById(`lpf-txt-${channel}`);
            txtEl.innerText = (freq / 1000).toFixed(1) + " kHz";
            
            if(!isEngineBuilt) return;
            const nodes = channel === 'l' ? lpfLNodes : lpfRNodes;
            nodes.forEach(node => {
                node.frequency.setValueAtTime(freq, audioCtx.currentTime);
                node.Q.setValueAtTime(1 / Math.sqrt(2), audioCtx.currentTime);
            });
        }

        function updateGain(channel, value) {
            const txtEl = document.getElementById(`gain-txt-${channel}`);
            txtEl.innerText = value + "%";
            
            if(!isEngineBuilt) return;
            const gainNode = channel === 'l' ? gainL : gainR;
            gainNode.gain.setTargetAtTime(value / 100, audioCtx.currentTime, 0.01);
        }

        function updateLimiterThreshold(channel, value) {
            const txtEl = document.getElementById(`limit-thres-txt-${channel}`);
            txtEl.innerText = value + " dB";
            
            if(!isEngineBuilt) return;
            const limiter = channel === 'l' ? limiterL : limiterR;
            limiter.threshold.setValueAtTime(value, audioCtx.currentTime);
            limiter.ratio.setValueAtTime(20, audioCtx.currentTime);
            limiter.knee.setValueAtTime(0, audioCtx.currentTime);
        }

        function updateSlope(channel, type) {
            channelParams[channel].slope = type;
            // Rebuild filter rantai jika perlu, disederhanakan untuk simulasi
            if(isEngineBuilt) {
                streamStatusEl.innerText = `Slope Channel ${channel.toUpperCase()} diubah ke: ${type}`;
            }
        }

        function updatePEQ(channel, band, gainVal, qVal) {
            let txtGain = document.getElementById(`peq-${band}-g-txt-${channel}`);
            let txtQ = document.getElementById(`peq-${band}-q-txt-${channel}`);
            
            txtGain.innerText = gainVal + " dB";
            txtQ.innerText = qVal;

            if(!isEngineBuilt) return;
            let node;
            if(channel === 'l') {
                if(band === 'lm') node = peqLML;
                if(band === 'mv') node = peqMVL;
                if(band === 'ht') node = peqHTL;
            } else {
                if(band === 'lm') node = peqLMR;
                if(band === 'mv') node = peqMVR;
                if(band === 'ht') node = peqHTR;
            }

            if(node) {
                node.gain.setTargetAtTime(gainVal, audioCtx.currentTime, 0.01);
                node.Q.setValueAtTime(qVal, audioCtx.currentTime);
            }
        }

        function updateSpecialGain(channel, type, value) {
            let txt, node;
            if(type === 'sultan') {
                txt = document.getElementById(`sultan-txt-${channel}`);
                node = channel === 'l' ? sultanL : sultanR;
                txt.innerText = value + " dB";
            }
            if(type === 'vocal') {
                txt = document.getElementById(`vocal-txt-${channel}`);
                node = channel === 'l' ? vocalL : vocalR;
                txt.innerText = value + " dB";
            }
            if(type === 'harmonic') {
                txt = document.getElementById(`harmonic-txt-${channel}`);
                node = channel === 'l' ? harmonicL : harmonicR;
                txt.innerText = value + "%";
                value = value / 100;
            }
            if(type === 'deq-gain') {
                txt = document.getElementById(`deq-gain-txt-${channel}`);
                node = channel === 'l' ? deqFilterL : deqFilterR;
                txt.innerText = value + " dB";
                if(channel === 'l') deqCurrentGainL = value;
                if(channel === 'r') deqCurrentGainR = value;
            }
            if(type === 'deq-freq') {
                txt = document.getElementById(`deq-freq-txt-${channel}`);
                node = channel === 'l' ? deqFilterL : deqFilterR;
                txt.innerText = value + " Hz";
                if(node) node.frequency.setValueAtTime(value, audioCtx.currentTime);
                return;
            }

            if(node) node.gain.setTargetAtTime(value, audioCtx.currentTime, 0.01);
        }

        // --- BUTTON TOGGLE HANDLERS ---
        function setupChannelButtons(channel) {
            const buttons = document.querySelectorAll(`.ch-${channel}-btn`);
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const type = btn.dataset.type;
                    channelParams[channel][type] = !channelParams[channel][type];
                    
                    btn.classList.toggle('l-active', channelParams[channel][type]);
                    
                    if(type === 'core') {
                        const node = channel === 'l' ? gainL : gainR;
                        node.gain.setTargetAtTime(channelParams[channel][type] ? 1 : 0.0001, audioCtx.currentTime, 0.01);
                    }
                    if(type === 'phase') {
                        const node = channel === 'l' ? phaseL : phaseR;
                        node.gain.setTargetAtTime(channelParams[channel][type] ? -1 : 1, audioCtx.currentTime, 0.001);
                    }
                    if(type === 'limiter') {
                        const node = channel === 'l' ? limiterL : limiterR;
                        node.bypass = !channelParams[channel][type];
                    }
                    if(type === 'antipop') {
                        const node = channel === 'l' ? antiPopL : antiPopR;
                        node.bypass = !channelParams[channel][type];
                    }
                    if(type === 'deq') {
                        const node = channel === 'l' ? deqFilterL : deqFilterR;
                        node.bypass = !channelParams[channel][type];
                        btn.innerText = channelParams[channel][type] ? "DEQ ON" : "DEQ OFF";
                    }
                    if(type === 'sultan') btn.innerText = channelParams[channel][type] ? "SUB GLOW ON" : "SUB GLOW OFF";
                    if(type === 'vocal') btn.innerText = channelParams[channel][type] ? "BOOST ON" : "BOOST OFF";
                    if(type === 'harmonic') btn.innerText = channelParams[channel][type] ? "XTREME ON" : "XTREME OFF";
                    if(type === 'syscombine') btn.innerText = channelParams[channel][type] ? "COMBINE " + channel.toUpperCase() : "SOLO " + channel.toUpperCase();
                });
            });
        }

        function setupMuteButtons() {
            const buttons = document.querySelectorAll('.core-mute-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const ch = btn.dataset.ch;
                    const type = btn.dataset.type;
                    
                    coreMuteStates[ch][type] = !coreMuteStates[ch][type];
                    btn.classList.toggle('mute-on', coreMuteStates[ch][type]);
                    btn.classList.toggle('mute-off', !coreMuteStates[ch][type]);
                    
                    let targetNode;
                    if(type === 'peq') targetNode = ch === 'l' ? peqLML : peqLMR;
                    if(type === 'gain') targetNode = ch === 'l' ? gainL : gainR;
                    if(type === 'echo') {
                        if(ch === 'l' && delayInputGainL) targetNode = delayInputGainL;
                        if(ch === 'r' && delayInputGainR) targetNode = delayInputGainR;
                    }

                    if(targetNode) {
                        targetNode.gain.setTargetAtTime(coreMuteStates[ch][type] ? 0 : 1, audioCtx.currentTime, 0.01);
                    }
                    
                    btn.innerText = coreMuteStates[ch][type] ? `UNMUTE ${type.toUpperCase()}` : `MUTE ${type.toUpperCase()}`;
                });
            });
        }

        // --- DSP ENGINE BUILDER ---
        function buildDiscreteEngine() {
            if(isEngineBuilt) return;
            isEngineBuilt = true;

            // 1. SPLIT INPUT KE KIRI & KANAN
            splitterNode = audioCtx.createChannelSplitter(2);
            mergerNode = audioCtx.createChannelMerger(2);

            streamNode.connect(splitterNode);

            // ============= CHANNEL LEFT =============
            // HPF - High Pass Filter Chain (LR12/LR24/LR48)
            hpfLNodes = [audioCtx.createBiquadFilter(), audioCtx.createBiquadFilter()];
            hpfLNodes.forEach(f => { f.type = 'highpass'; f.frequency.value = 20; });
            
            // LPF - Low Pass Filter Chain
            lpfLNodes = [audioCtx.createBiquadFilter(), audioCtx.createBiquadFilter()];
            lpfLNodes.forEach(f => { f.type = 'lowpass'; f.frequency.value = 20000; });

            // GAIN & PHASE
            gainL = audioCtx.createGain();
            gainL.gain.value = 1.0;
            phaseL = audioCtx.createGain();
            phaseL.gain.value = 1.0;

            // PARAMETRIC EQ - 3 Pita
            peqLML = audioCtx.createBiquadFilter(); peqLML.type = 'peaking'; peqLML.frequency.value = 250; peqLML.Q.value = 1.2; peqLML.gain.value = 0;
            peqMVL = audioCtx.createBiquadFilter(); peqMVL.type = 'peaking'; peqMVL.frequency.value = 1500; peqMVL.Q.value = 1.5; peqMVL.gain.value = 0;
            peqHTL = audioCtx.createBiquadFilter(); peqHTL.type = 'peaking'; peqHTL.frequency.value = 8000; peqHTL.Q.value = 1.0; peqHTL.gain.value = 0;

            // MODUL KHUSUS
            sultanL = audioCtx.createGain(); sultanL.gain.value = 0;
            vocalL = audioCtx.createGain(); vocalL.gain.value = 0;
            harmonicL = audioCtx.createGain(); harmonicL.gain.value = 0;
            deqFilterL = audioCtx.createBiquadFilter(); deqFilterL.type = 'peaking'; deqFilterL.frequency.value = 1000; deqFilterL.gain.value = 0;

            // LIMITER & ANTI-POP
            limiterL = audioCtx.createDynamicsCompressor();
            limiterL.threshold.value = -10; limiterL.ratio.value = 20; limiterL.knee.value = 0; limiterL.attack.value = 0.001; limiterL.release.value = 0.05;
            
            antiPopL = audioCtx.createDynamicsCompressor();
            antiPopL.threshold.value = -30; antiPopL.ratio.value = 5; antiPopL.knee.value = 10;

            // RUTE KIRI
            splitterNode.connect(hpfLNodes[0], 0);
            hpfLNodes[0].connect(hpfLNodes[1]);
            hpfLNodes[1].connect(lpfLNodes[0]);
            lpfLNodes[0].connect(lpfLNodes[1]);
            lpfLNodes[1].connect(gainL);
            gainL.connect(phaseL);
            phaseL.connect(peqLML);
            peqLML.connect(peqMVL);
            peqMVL.connect(peqHTL);
            peqHTL.connect(sultanL);
            sultanL.connect(vocalL);
            vocalL.connect(harmonicL);
            harmonicL.connect(deqFilterL);
            deqFilterL.connect(limiterL);
            limiterL.connect(antiPopL);

            // ============= CHANNEL RIGHT =============
            hpfRNodes = [audioCtx.createBiquadFilter(), audioCtx.createBiquadFilter()];
            hpfRNodes.forEach(f => { f.type = 'highpass'; f.frequency.value = 20; });
            
            lpfRNodes = [audioCtx.createBiquadFilter(), audioCtx.createBiquadFilter()];
            lpfRNodes.forEach(f => { f.type = 'lowpass'; f.frequency.value = 20000; });

            gainR = audioCtx.createGain();
            gainR.gain.value = 1.0;
            phaseR = audioCtx.createGain();
            phaseR.gain.value = 1.0;

            peqLMR = audioCtx.createBiquadFilter(); peqLMR.type = 'peaking'; peqLMR.frequency.value = 250; peqLMR.Q.value = 1.2; peqLMR.gain.value = 0;
            peqMVR = audioCtx.createBiquadFilter(); peqMVR.type = 'peaking'; peqMVR.frequency.value = 1500; peqMVR.Q.value = 1.5; peqMVR.gain.value = 0;
            peqHTR = audioCtx.createBiquadFilter(); peqHTR.type = 'peaking'; peqHTR.frequency.value = 8000; peqHTR.Q.value = 1.0; peqHTR.gain.value = 0;

            sultanR = audioCtx.createGain(); sultanR.gain.value = 0;
            vocalR = audioCtx.createGain(); vocalR.gain.value = 0;
            harmonicR = audioCtx.createGain(); harmonicR.gain.value = 0;
            deqFilterR = audioCtx.createBiquadFilter(); deqFilterR.type = 'peaking'; deqFilterR.frequency.value = 1000; deqFilterR.gain.value = 0;

            limiterR = audioCtx.createDynamicsCompressor();
            limiterR.threshold.value = -10; limiterR.ratio.value = 20; limiterR.knee.value = 0; limiterR.attack.value = 0.001; limiterR.release.value = 0.05;
            
            antiPopR = audioCtx.createDynamicsCompressor();
            antiPopR.threshold.value = -30; antiPopR.ratio.value = 5; antiPopR.knee.value = 10;

            // RUTE KANAN
            splitterNode.connect(hpfRNodes[0], 1);
            hpfRNodes[0].connect(hpfRNodes[1]);
            hpfRNodes[1].connect(lpfRNodes[0]);
            lpfRNodes[0].connect(lpfRNodes[1]);
            lpfRNodes[1].connect(gainR);
            gainR.connect(phaseR);
            phaseR.connect(peqLMR);
            peqLMR.connect(peqMVR);
            peqMVR.connect(peqHTR);
            peqHTR.connect(sultanR);
            sultanR.connect(vocalR);
            vocalR.connect(harmonicR);
            harmonicR.connect(deqFilterR);
            deqFilterR.connect(limiterR);
            limiterR.connect(antiPopR);

            // ============= MASTER SECTION =============
            masterHardwareGainNode = audioCtx.createGain();
            masterHardwareGainNode.gain.value = 1.0;

            globalVoiceCompressorNode = audioCtx.createDynamicsCompressor();
            globalVoiceCompressorNode.threshold.value = -24;
            globalVoiceCompressorNode.ratio.value = 4;
            globalVoiceCompressorNode.knee.value = 5;

            // ANALYSER UNTUK VU METER & GRAFIK
            analyserL = audioCtx.createAnalyser();
            analyserL.fftSize = 256;
            analyserR = audioCtx.createAnalyser();
            analyserR.fftSize = 256;

            antiPopL.connect(analyserL);
            antiPopR.connect(analyserR);

            // SAMBUNG KE MASTER
            antiPopL.connect(mergerNode, 0, 0);
            antiPopR.connect(mergerNode, 0, 1);

            mergerNode.connect(globalVoiceCompressorNode);
            globalVoiceCompressorNode.connect(masterHardwareGainNode);
            masterHardwareGainNode.connect(audioCtx.destination);

            dataArrayL = new Uint8Array(analyserL.frequencyBinCount);
            dataArrayR = new Uint8Array(analyserR.frequencyBinCount);
            bufferLength = analyserL.frequencyBinCount;

            setupChannelButtons('l');
            setupChannelButtons('r');
            setupMuteButtons();
            animateDisplay();
            streamStatusEl.innerText = "✅ DSP Engine Aktif & Siap Memproses Audio";
        }

        // --- VISUALIZER & METER ANIMATION ---
        function animateDisplay() {
            requestAnimationFrame(animateDisplay);

            analyserL.getByteTimeDomainData(dataArrayL);
            analyserR.getByteTimeDomainData(dataArrayR);

            // GAMBAR GELOMBANG KIRI
            ctxL.fillStyle = '#000';
            ctxL.fillRect(0, 0, canvasL.width, canvasL.height);
            ctxL.lineWidth = 2;
            ctxL.strokeStyle = '#00e5ff';
            ctxL.beginPath();
            const sliceWidthL = canvasL.width / bufferLength;
            let x = 0;
            for(let i = 0; i < bufferLength; i++) {
                const v = dataArrayL[i] / 128.0;
                const y = v * canvasL.height / 2;
                if(i === 0) ctxL.moveTo(x, y);
                else ctxL.lineTo(x, y);
                x += sliceWidthL;
            }
            ctxL.lineTo(canvasL.width, canvasL.height/2);
            ctxL.stroke();

            // GAMBAR GELOMBANG KANAN
            ctxR.fillStyle = '#000';
            ctxR.fillRect(0, 0, canvasR.width, canvasR.height);
            ctxR.lineWidth = 2;
            ctxR.strokeStyle = '#bc13fe';
            ctxR.beginPath();
            const sliceWidthR = canvasR.width / bufferLength;
            x = 0;
            for(let i = 0; i < bufferLength; i++) {
                const v = dataArrayR[i] / 128.0;
                const y = v * canvasR.height / 2;
                if(i === 0) ctxR.moveTo(x, y);
                else ctxR.lineTo(x, y);
                x += sliceWidthR;
            }
            ctxR.lineTo(canvasR.width, canvasR.height/2);
            ctxR.stroke();

            // UPDATE VU METER SEDERHANA
            let rmsL = 0, rmsR = 0;
            for(let i=0; i<bufferLength; i++) {
                rmsL += Math.pow((dataArrayL[i] - 128)/128, 2);
                rmsR += Math.pow((dataArrayR[i] - 128)/128, 2);
            }
            rmsL = Math.sqrt(rmsL / bufferLength);
            rmsR = Math.sqrt(rmsR / bufferLength);
            
            let dB_L = 20 * Math.log10(Math.max(rmsL, 0.0000001));
            let dB_R = 20 * Math.log10(Math.max(rmsR, 0.0000001));
            
            updateVUMeter('vu-left', dB_L);
            updateVUMeter('vu-right', dB_R);
            updateGRMeter('gr-left', dB_L - parseFloat(document.getElementById('gain-txt-l').value)/100 * 20);
            updateGRMeter('gr-right', dB_R - parseFloat(document.getElementById('gain-txt-r').value)/100 * 20);
            
            document.getElementById('led-limit-l').classList.toggle('active-limit', dB_L > -1);
            document.getElementById('led-limit-r').classList.toggle('active-limit', dB_R > -1);

            // SIMULASI SUHU & TEGANGAN
            let temp = 45 + Math.sin(Date.now()/1000)*2;
            let volt = 12.5 + Math.cos(Date.now()/2000)*0.05;
            cpuTempEl.innerText = temp.toFixed(1) + " °C";
            voltEl.innerText = volt.toFixed(2) + " VDC";
        }

        function updateVUMeter(id, dB) {
            const meter = document.getElementById(id);
            const segments = meter.children;
            let level = Math.max(0, Math.min(10, Math.floor((dB + 60)/6)));
            
            for(let i=0; i<segments.length; i++) {
                segments[i].className = 'vu-segment';
                if(i < level) {
                    if(i < 6) segments[i].classList.add('green-on');
                    else if(i < 8) segments[i].classList.add('yellow-on');
                    else segments[i].classList.add('red-on');
                }
            }
        }

        function updateGRMeter(id, dB) {
            const meter = document.getElementById(id);
            const segments = meter.children;
            let level = Math.max(0, Math.min(6, Math.floor((dB + 30)/5)));
            
            for(let i=0; i<segments.length; i++) {
                segments[i].className = 'gr-segment';
                if(i < level) segments[i].classList.add('gr-on');
            }
        }

        document.getElementById('peq-lm-q-r').addEventListener('input', (e) => updatePEQ('r', 'lm', parseInt(document.getElementById('peq-lm-g-r').value), parseFloat(e.target.value)));
        document.getElementById('peq-mv-g-r').addEventListener('input', (e) => updatePEQ('r', 'mv', parseInt(e.target.value), parseFloat(document.getElementById('peq-mv-q-r').value)));
        document.getElementById('peq-mv-q-r').addEventListener('input', (e) => updatePEQ('r', 'mv', parseInt(document.getElementById('peq-mv-g-r').value), parseFloat(e.target.value)));
        document.getElementById('peq-ht-g-r').addEventListener('input', (e) => updatePEQ('r', 'ht', parseInt(e.target.value), parseFloat(document.getElementById('peq-ht-q-r').value)));

        document.getElementById('sultan-gain-r').addEventListener('input', (e) => updateSpecialGain('r', 'sultan', parseInt(e.target.value)));
        document.getElementById('vocal-gain-r').addEventListener('input', (e) => updateSpecialGain('r', 'vocal', parseInt(e.target.value)));
        document.getElementById('harmonic-amt-r').addEventListener('input', (e) => updateSpecialGain('r', 'harmonic', parseInt(e.target.value)));
        document.getElementById('deq-freq-r').addEventListener('input', (e) => updateSpecialGain('r', 'deq-freq', parseInt(e.target.value)));
        document.getElementById('deq-gain-r').addEventListener('input', (e) => updateSpecialGain('r', 'deq-gain', parseInt(e.target.value)));

        // MASTER & EFEK
        document.getElementById('master-gain-slider').addEventListener('input', (e) => adjustMasterHardwareGain(parseInt(e.target.value)));
        document.getElementById('master-mute-trigger').addEventListener('click', toggleMasterHardwareMute);

        document.getElementById('comp-ratio').addEventListener('input', updateCompressorSettings);
        document.getElementById('comp-bypass-btn').addEventListener('click', toggleCompressorBypass);
        document.getElementById('gen-toggle-btn').addEventListener('click', toggleSignalGenerator);

        document.getElementById('fx-toggle-btn').addEventListener('click', toggleRobotEffect);
        document.getElementById('fx-pitch-slider').addEventListener('input', updateRobotEffectSettings);

        document.getElementById('harm-toggle-btn').addEventListener('click', toggleHarmonizer);

        document.getElementById('delay-toggle-btn').addEventListener('click', toggleDelayEffect);

        document.getElementById('delay-feedback-slider').addEventListener('input', updateDelaySettings);

        document.getElementById('ota-check-btn').addEventListener('click', () => {
            streamStatusEl.innerText = "🔍 Memeriksa Pembaruan Firmware... Versi Terbaru: v4.2.1 PRO";
        });

        // BUAT SEGMEN VU METER OTOMATIS
        function createVUSegments(id, count) {
            const el = document.getElementById(id);
            for(let i=0; i<count; i++) {
                const div = document.createElement('div');
                div.className = id.includes('gr') ? 'gr-segment' : 'vu-segment';
                el.appendChild(div);
            }
        }
        createVUSegments('vu-left', 10); createVUSegments('vu-right', 10);
        createVUSegments('gr-left', 6); createVUSegments('gr-right', 6);
