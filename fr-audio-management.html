<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Mixer Console - Efek Pitch & Harmonizer</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --accent-green: #2ecc71;
            --accent-orange: #e67e22;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin-bottom: 5px;
            color: var(--accent-green);
        }

        p {
            margin-top: 0;
            color: #aaa;
            font-size: 14px;
        }

        .mixer-container {
            background-color: var(--panel-color);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }

        /* Bagian Kiri: Input & Kontrol Media */
        .input-section {
            flex: 1;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover { background-color: #555; }
        .btn.active { background-color: var(--accent-green); }

        .audio-player {
            width: 100%;
            margin-top: 10px;
        }

        /* Bagian Tengah: DSP Screen (Efek No. 24) */
        .dsp-panel {
            flex: 1;
            background: #111;
            border: 3px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .dsp-screen {
            background: #00bcd4;
            color: #000;
            width: 90%;
            height: 80px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .dsp-screen .effect-num { font-size: 24px; font-weight: bold; }
        .dsp-screen .effect-name { font-size: 16px; margin-top: 5px; }

        .knob-container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            width: 100%;
            justify-content: space-around;
        }

        .knob-box { text-align: center; font-size: 12px; color: #888; }

        /* Bagian Kanan: Master Fader / Strip Channel */
        .fader-section {
            width: 120px;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .fader-track {
            height: 200px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .fader-input {
            writing-mode: bt-lr; /* Sisi vertikal untuk browser lama */
            appearance: slider-vertical; /* Standar vertikal slider */
            width: 8px;
            height: 180px;
            background: #444;
        }

        .mute-btn {
            background-color: #c0392b;
            width: 100%;
        }
        .mute-btn.muted { background-color: #ff3333; box-shadow: 0 0 10px #ff3333; }
    </style>
</head>
<body>

    <h2>Digital Mixer Audio Engine</h2>
    <p>Update: Efek No. 24 Pitch Shifter & Multi-Voice Harmonizer Paduan Suara</p>

    <div class="mixer-container">
        
        <div class="input-section">
            <h3>Jalur Input Audio</h3>
            
            <label><strong>1. Upload Musik (File):</strong></label>
            <input type="file" id="fileInput" accept="audio/*">
            <audio id="audioPlayer" class="audio-player" controls></audio>
            
            <hr style="border-color:#333; width:100%;">
            
            <label><strong>2. Live Mic Input:</strong></label>
            <button id="micBtn" class="btn">HUBUNGKAN MIC LIVE</button>
            <div id="micStatus" style="font-size:12px; color:gray;">Mic sedang Off</div>
        </div>

        <div class="dsp-panel">
            <h3>FX PROGRAM DSP</h3>
            
            <div class="dsp-screen">
                <div id="fxNum" class="effect-num">00</div>
                <div id="fxName" class="effect-name">BYPASS (CLEAN)</div>
            </div>

            <div class="knob-container">
                <div class="knob-box">
                    <button id="btnBypass" class="btn active">BYPASS</button>
                </div>
                <div class="knob-box">
                    <button id="btnPitch" class="btn">FX 24</button>
                    <div>Pitch Shift</div>
                </div>
                <div class="knob-box">
                    <button id="btnHarmonizer" class="btn">HARMONY</button>
                    <div>Vocoder</div>
                </div>
            </div>

            <div style="width: 100%; text-align: center; margin-top: 10px;">
                <label style="font-size: 12px; color:#aaa;">KNOB PARAMETER EDIT (Pitch Semitone)</label><br>
                <input type="range" id="pitchKnob" min="-12" max="12" value="3" step="1" style="width:80%;">
                <div id="pitchValue" style="color:var(--accent-orange); font-weight:bold;">+3 Semitones</div>
            </div>
        </div>

        <div class="fader-section">
            <h3>MASTER</h3>
            <button id="muteBtn" class="btn mute-btn">MUTE</button>
            <div class="fader-track">
                <input type="range" id="masterVolume" class="fader-input" min="0" max="1.5" step="0.01" value="1">
            </div>
            <div style="font-size: 12px;">VOLUME</div>
        </div>

    </div>

    <script>
        class AudioMixerEngine {
            constructor() {
                this.audioCtx = null;
                this.inputSource = null;
                this.microphoneStream = null;
                this.isMuted = false;
                
                // State Nilai Awal Efek
                this.currentEffect = 'none'; // 'none', 'pitch', 'harmonizer'
                this.pitchSemiTones = 3;
                this.harmonicVoices = [0, -4, 3, 5]; // Kombinasi Multi-suara natural
                
                this.effectNode = null;
                this.masterGain = null;
            }

            initAudio() {
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioCtx.createGain();
                    this.masterGain.connect(this.audioCtx.destination);
                }
            }

            // Fungsi Mengolah File Input Musik
            setupAudioElementSource(audioElement) {
                this.initAudio();
                this.disconnectInput();
                this.inputSource = this.audioCtx.createMediaElementSource(audioElement);
                this.routeAudio();
            }

            // Fungsi Mengolah Live Mic
            async setupMicrophoneSource() {
                this.initAudio();
                this.disconnectInput();
                try {
                    this.microphoneStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: false, noiseSuppression: false } 
                    });
                    this.inputSource = this.audioCtx.createMediaStreamSource(this.microphoneStream);
                    this.routeAudio();
                    return true;
                } catch (err) {
                    alert("Akses Mikrofon Ditolak/Tidak Ditemukan.");
                    return false;
                }
            }

            // Routing Jalur Audio DSP
            routeAudio() {
                if (!this.inputSource) return;

                // Putus koneksi node lama agar tidak menumpuk stack memory
                if (this.effectNode) {
                    this.effectNode.disconnect();
                }
                this.inputSource.disconnect();

                switch (this.currentEffect) {
                    case 'pitch':
                        // Mode Efek No.24 Pitch Shifter Alami
                        this.effectNode = this.createPitchShifterNode(this.pitchSemiTones);
                        this.inputSource.connect(this.effectNode);
                        this.effectNode.connect(this.masterGain);
                        break;
                        
                    case 'harmonizer':
                        // Mode Efek Paduan Suara (Vocoder Harmoni)
                        this.effectNode = this.createHarmonizerNode(this.harmonicVoices);
                        // Koneksi ke master dilakukan internal didalam fungsi harmonizer
                        break;
                        
                    default:
                        // Bypass Tanpa Efek (Clean)
                        this.inputSource.connect(this.masterGain);
                        break;
                }
            }

            // Pemroses Algoritma Pitch Shifter Granular Efek 24
            createPitchShifterNode(semitones) {
                const pitchRatio = Math.pow(2, semitones / 12);
                const bufferSize = 4096;
                const processor = this.audioCtx.createScriptProcessor(bufferSize, 1, 1);
                
                processor.onaudioprocess = (audioEvent) => {
                    const inputData = audioEvent.inputBuffer.getChannelData(0);
                    const outputData = audioEvent.outputBuffer.getChannelData(0);
                    
                    for (let i = 0; i < audioEvent.outputBuffer.length; i++) {
                        const readPos = i * pitchRatio;
                        const index = Math.floor(readPos);
                        const alpha = readPos - index;
                        
                        if (index + 1 < inputData.length) {
                            // Interpolasi Linear (Menghilangkan distorsi kasar robot statis)
                            outputData[i] = (1 - alpha) * inputData[index] + alpha * inputData[index + 1];
                        } else {
                            outputData[i] = inputData[index] || 0;
                        }
                    }
                };
                return processor;
            }

            // Pemroses Algoritma Multi-Voice Harmonizer 
            createHarmonizerNode(voices) {
                const mainGroupNode = this.audioCtx.createGain();
                
                voices.forEach((semitone) => {
                    const voiceGain = this.audioCtx.createGain();
                    voiceGain.gain.value = 1.0 / voices.length; 
                    
                    let shifter;
                    if (semitone === 0) {
                        shifter = this.audioCtx.createGain(); // Suara asli / dry
                    } else {
                        shifter = this.createPitchShifterNode(semitone); // Suara harmoni tinggi/rendah
                    }
                    
                    this.inputSource.connect(shifter);
                    shifter.connect(voiceGain);
                    voiceGain.connect(this.masterGain);
                });

                return mainGroupNode;
            }

            // Mengubah Volume via Fader Master
            setVolume(volumeValue) {
                if(this.masterGain) {
                    this.masterGain.gain.value = this.isMuted ? 0 : volumeValue;
                }
            }

            toggleMute(currentVol) {
                this.isMuted = !this.isMuted;
                this.setVolume(currentVol);
                return this.isMuted;
            }

            disconnectInput() {
                if (this.inputSource) this.inputSource.disconnect();
                if (this.microphoneStream) {
                    this.microphoneStream.getTracks().forEach(track => track.stop());
                }
            }
        }

        // =================================================================
        // BINDING LOGIC KE SELEKTOR ANTARMUKA WEB (UI)
        // =================================================================
        
        const mixer = new AudioMixerEngine();
        
        const fileInput = document.getElementById('fileInput');
        const audioPlayer = document.getElementById('audioPlayer');
        const micBtn = document.getElementById('micBtn');
        const micStatus = document.getElementById('micStatus');
        
        const fxNum = document.getElementById('fxNum');
        const fxName = document.getElementById('fxName');
        const btnBypass = document.getElementById('btnBypass');
        const btnPitch = document.getElementById('btnPitch');
        const btnHarmonizer = document.getElementById('btnHarmonizer');
        
        const pitchKnob = document.getElementById('pitchKnob');
        const pitchValue = document.getElementById('pitchValue');
        const masterVolume = document.getElementById('masterVolume');
        const muteBtn = document.getElementById('muteBtn');

        // Event Handler 1: Musik File Upload
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                audioPlayer.src = URL.createObjectURL(file);
                mixer.setupAudioElementSource(audioPlayer);
                micBtn.classList.remove('active');
                micStatus.innerText = "Mic Off (Beralih ke File Musik)";
            }
        });

        // Event Handler 2: Live Mic Input Toggle
        micBtn.addEventListener('click', async () => {
            audioPlayer.pause();
            const isConnected = await mixer.setupMicrophoneSource();
            if(isConnected) {
                micBtn.classList.add('active');
                micStatus.innerText = "LIVE MIC AKTIF - Silakan Berbicara";
                micStatus.style.color = "#2ecc71";
            }
        });

        // Event Handler 3: Menu Pilih Efek DSP
        btnBypass.addEventListener('click', () => {
            setActiveEffectBtn(btnBypass);
            fxNum.innerText = "00";
            fxName.innerText = "BYPASS (CLEAN)";
            mixer.currentEffect = 'none';
            mixer.routeAudio();
        });

        btnPitch.addEventListener('click', () => {
            setActiveEffectBtn(btnPitch);
            fxNum.innerText = "24";
            fxName.innerText = "PITCH SHIFTER";
            mixer.currentEffect = 'pitch';
            mixer.routeAudio();
        });

        btnHarmonizer.addEventListener('click', () => {
            setActiveEffectBtn(btnHarmonizer);
            fxNum.innerText = "88";
            fxName.innerText = "HARMONIZER VOCODER";
            mixer.currentEffect = 'harmonizer';
            mixer.routeAudio();
        });

        function setActiveEffectBtn(activeBtn) {
            [btnBypass, btnPitch, btnHarmonizer].forEach(btn => btn.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        // Event Handler 4: Knob Edit Parameter Pitch
        pitchKnob.addEventListener('input', (e) => {
            const val = e.target.value;
            pitchValue.innerText = (val > 0 ? "+" + val : val) + " Semitones";
            mixer.pitchSemiTones = parseInt(val);
            if(mixer.currentEffect === 'pitch') {
                mixer.routeAudio();
            }
        });

        // Event Handler 5: Fader Master Volume & Mute
        masterVolume.addEventListener('input', (e) => {
            mixer.setVolume(e.target.value);
        });

        muteBtn.addEventListener('click', () => {
            const muted = mixer.toggleMute(masterVolume.value);
            if(muted) {
                muteBtn.classList.add('muted');
                muteBtn.innerText = "MUTED";
            } else {
                muteBtn.classList.remove('muted');
                muteBtn.innerText = "MUTE";
            }
        });
    </script>
</body>
</html>
