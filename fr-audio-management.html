<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR-AUDIO Qu-32 SUITE MASTER v1.5 ULTRA</title>
    <style>
        :root {
            --bg-body: #06020c;
            --bg-mixer: #11091a;
            --bg-strip: #190e26;
            --purple-neon: #a200ff;
            --cyan-neon: #00ffcc;
            --blue-neon: #0088ff;
            --danger: #ff0055;
            --success: #00ff44;
        }

        body {
            background-color: var(--bg-body);
            color: #e2dbec;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            user-select: none;
            box-sizing: border-box;
        }

        .screen-container {
            max-width: 1300px;
            margin: 0 auto;
            background: linear-gradient(135deg, #160a26 0%, #0a0314 100%);
            border: 3px solid var(--purple-neon);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(162, 0, 255, 0.5);
        }

        /* Master Control Panel */
        .master-panel {
            background: #090412;
            border: 2px solid #361752;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand-box {
            font-weight: bold;
        }
        .brand-title {
            font-size: 24px;
            color: #fff;
            text-shadow: 0 0 10px var(--purple-neon);
            margin: 0;
        }
        .brand-sub {
            font-size: 11px;
            color: var(--cyan-neon);
            letter-spacing: 1.5px;
            margin: 3px 0 0 0;
        }

        /* Complex DSP Sultan FX Controller UI */
        .fx-global-panel {
            background: #130a22;
            border: 1px solid #52278a;
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(162,0,255,0.2);
        }
        .fx-title {
            font-size: 11px;
            color: #ff9d00;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-right: 1px solid #3d1f66;
            padding-right: 15px;
        }
        .fx-knob-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 9px;
            color: #a491bc;
            font-weight: bold;
        }
        .fx-slider {
            -webkit-appearance: none;
            width: 90px;
            height: 5px;
            background: #25133d;
            border-radius: 3px;
            outline: none;
            margin-top: 5px;
        }
        .fx-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff9d00;
            box-shadow: 0 0 5px #ff9d00;
            cursor: pointer;
        }

        .audio-uploader-box {
            background: rgba(162, 0, 255, 0.1);
            border: 1px dashed var(--purple-neon);
            padding: 10px 15px;
            border-radius: 5px;
            text-align: center;
        }
        .audio-uploader-box input[type="file"] {
            display: none;
        }
        .upload-btn {
            background: var(--purple-neon);
            color: white;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        .upload-btn:hover {
            box-shadow: 0 0 15px var(--purple-neon);
        }

        .display-screen {
            background: #010003;
            border: 2px solid #221236;
            border-radius: 6px;
            padding: 10px 15px;
            font-family: 'Courier New', monospace;
            color: #26ff54;
            font-size: 12px;
            min-width: 320px;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.15);
            line-height: 1.4;
        }

        .layer-container {
            display: flex;
            gap: 5px;
        }
        .layer-btn {
            background: #23103a;
            border: 1px solid #562791;
            color: #b199d1;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
        }
        .layer-btn.active {
            background: var(--purple-neon);
            color: #fff;
            box-shadow: 0 0 12px var(--purple-neon);
            border-color: #c97eff;
        }

        /* Mixer Surface Channels Layout */
        .mixer-surface {
            background: var(--bg-mixer);
            border: 2px solid #26133a;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            overflow-x: auto;
        }

        .channel-strip {
            background: var(--bg-strip);
            border: 1px solid #2e1847;
            border-radius: 6px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .ch-header {
            font-size: 11px;
            font-weight: bold;
            color: #a491bc;
            margin-bottom: 8px;
            text-align: center;
            width: 100%;
            border-bottom: 1px solid #2a153f;
            padding-bottom: 5px;
            letter-spacing: 0.5px;
        }

        /* SEL and MUTE Mechanics */
        .btn-sel, .btn-mute {
            width: 95%;
            padding: 6px 0;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            text-align: center;
            transition: 0.1s;
        }
        .btn-sel {
            background: #2a193d;
            color: #cbbad6;
            border: 1px solid #452b61;
            margin-bottom: 6px;
        }
        .btn-sel.active {
            background: var(--cyan-neon);
            color: #041410;
            box-shadow: 0 0 10px var(--cyan-neon);
            border-color: #a6fff0;
        }

        .btn-mute {
            background: #3a1c27;
            color: #e695ab;
            border: 1px solid #5c2637;
        }
        
        /* LED Status Mute Indicators Container */
        .mute-led-container {
            width: 90%;
            display: flex;
            justify-content: space-around;
            margin: 5px 0 8px 0;
            background: #0d0614;
            padding: 3px 0;
            border-radius: 3px;
            border: 1px solid #251238;
        }
        .led-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #221133;
            transition: background 0.1s, box-shadow 0.1s;
        }
        .led-indicator.led-mute-on.active {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }
        .led-indicator.led-mute-off.active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* Upgraded Custom VU Meter Bridge with Secuil Blue Active */
        .meter-bridge {
            width: 14px;
            height: 85px;
            background: #090412;
            border-radius: 2px;
            position: relative;
            margin: 5px 0 10px 0;
            overflow: hidden;
            border: 1px solid #231238;
        }
        
        /* Layered VU Meter Background Bars Stack */
        .meter-layer {
            position: absolute;
            width: 100%;
            bottom: 0;
            left: 0;
            transition: height 0.04s ease-out;
        }
        /* Base Active Indicator (Secuil Biru di paling bawah) */
        .meter-blue-base {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6%; 
            background: #1a1a2a; /* Default off */
        }
        .meter-blue-base.active {
            background: var(--blue-neon);
            box-shadow: 0 0 6px var(--blue-neon);
        }

        /* Main Core VU Signal Colorizer */
        .meter-signal-bar {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, 
                #00ff44 0%,  /* Hijau */
                #00ff44 65%, 
                #ffeb00 65%, /* Kuning */
                #ffeb00 85%, 
                #ff0044 85%, /* Merah */
                #ff0044 100%
            );
            position: absolute;
            bottom: 6%; /* Dimulai tepat di atas porsi secuil lampu biru */
            width: 100%;
        }

        /* Fader Mechanical Track Layout */
        .fader-wrapper {
            height: 190px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0;
        }
        .fader-track-label {
            position: absolute;
            left: 2px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 8px;
            color: #5d4875;
            pointer-events: none;
        }
        .fader-input {
            -webkit-appearance: none;
            transform: rotate(-90deg);
            width: 170px;
            height: 6px;
            background: #080312;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        .fader-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 36px;
            background: #e9dbff;
            border: 2px solid var(--purple-neon);
            border-radius: 4px;
            box-shadow: 0 0 6px rgba(0,0,0,0.7), inset 0 0 4px #fff;
            cursor: pointer;
        }

        .db-readout {
            font-size: 11px;
            font-family: monospace;
            color: var(--cyan-neon);
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .mixer-surface {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="screen-container">
    <div class="master-panel">
        <div class="brand-box">
            <h1 class="brand-title">FR-AUDIO Qu-32</h1>
            <p class="brand-sub">ULTRA CONGLOMERATE DSP CORE v1.5</p>
        </div>

        <div class="fx-global-panel">
            <div class="fx-title">Sultan Complex FX</div>
            <div class="fx-knob-group">
                <span>REVERB TIME</span>
                <input type="range" id="fx-decay" class="fx-slider" min="1" max="12" step="0.1" value="7.5">
            </div>
            <div class="fx-knob-group">
                <span>DAMPENING (LPF)</span>
                <input type="range" id="fx-damp" class="fx-slider" min="800" max="6000" step="100" value="2800">
            </div>
            <div class="fx-knob-group">
                <span>SPATIAL ROOM</span>
                <input type="range" id="fx-spatial" class="fx-slider" min="0" max="100" step="5" value="75">
            </div>
        </div>

        <div class="audio-uploader-box">
            <label for="audio-file" class="upload-btn">LOAD TRACK / SHOLAWAT</label>
            <input type="file" id="audio-file" accept="audio/*">
        </div>

        <div class="display-screen" id="main-display">
            [SYSTEM INTIALIZED] - ENGINE v1.5 LIVE<br>
            PRESET: SHOLAWAT_HADROH_LAPANGAN_BASAH<br>
            SELECTED CH: CH 01 | LED SYSTEM: INTELLIGENT LINK<br>
            • ROUTING STATUS: WAITING FOR SOURCE AUDIO TRACK...
        </div>

        <div class="layer-container">
            <button class="layer-btn active" onclick="switchLayer('1-8')">1-8</button>
            <button class="layer-btn" onclick="switchLayer('9-16')">9-16</button>
            <button class="layer-btn" onclick="switchLayer('17-24')">17-24</button>
        </div>
    </div>

    <div class="mixer-surface" id="mixer-surface">
        </div>
</div>

<script>
    // Audio Architecture Graph Node Declarations
    let audioCtx = null;
    let audioBuffer = null;
    let sourceNode = null;

    // Complex Ultra Reverb Matrix Graph Nodes (Stereo FDN Nodes)
    let ReverbInputNode = null;
    let ReverbWetGainNode = null;
    let delayNodesArray = [];
    let feedbackGainsArray = [];
    let dampingFiltersArray = [];

    const totalChannels = 24;
    const channelsData = [];
    let currentLayer = '1-8';
    let selectedChannel = 1;

    // Building Data Array Structure
    for (let i = 1; i <= totalChannels; i++) {
        channelsData.push({
            id: i,
            name: `CH ${String(i).padStart(2, '0')}`,
            faderValue: 100, 
            muted: false,
            gainNode: null,
            sendGainNode: null, 
            analyserNode: null
        });
    }

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        buildComplexSultanFXEngine();
    }

    // High Complex Dual-Stage FDN & Diffusion Reverb Simulator Node Graph Architecture
    function buildComplexSultanFXEngine() {
        ReverbInputNode = audioCtx.createGain();
        ReverbWetGainNode = audioCtx.createGain();
        ReverbWetGainNode.gain.value = 0.75; // Set deep wet gain mix parameters for maximum "Kebasahan"

        // 6-Jalur Delay Matrix Time Prime Numbers to prevent periodic metallic resonance
        const delayMatrixTimes = [0.067, 0.089, 0.123, 0.157, 0.193, 0.233];
        const baseFeedbackGains = [0.75, 0.73, 0.70, 0.68, 0.65, 0.62];

        const merger = audioCtx.createChannelMerger(2);
        
        const decaySliderVal = parseFloat(document.getElementById('fx-decay').value) / 12;
        const dampFreqSliderVal = parseFloat(document.getElementById('fx-damp').value);
        const spatialVal = parseFloat(document.getElementById('fx-spatial').value) / 100;

        // Flushing nodes arrays if re-triggered
        delayNodesArray = [];
        feedbackGainsArray = [];
        dampingFiltersArray = [];

        delayMatrixTimes.forEach((time, index) => {
            let delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = time;

            let feedbackGainNode = audioCtx.createGain();
            feedbackGainNode.gain.value = baseFeedbackGains[index] * decaySliderVal;

            let dampingFilterNode = audioCtx.createBiquadFilter();
            dampingFilterNode.type = 'lowpass';
            dampingFilterNode.frequency.value = dampFreqSliderVal;

            // 3D All-pass diffusion filtering block configuration to fatten the vocal tail echoes
            let allPassDiffusionNode = audioCtx.createBiquadFilter();
            allPassDiffusionNode.type = 'allpass';
            allPassDiffusionNode.Q.value = 1.2;
            allPassDiffusionNode.frequency.value = 1500 - (index * 100);

            // Interconnecting the matrix paths feedback routing loops
            ReverbInputNode.connect(delayNode);
            delayNode.connect(dampingFilterNode);
            dampingFilterNode.connect(allPassDiffusionNode);
            allPassDiffusionNode.connect(feedbackGainNode);
            feedbackGainNode.connect(delayNode); // Cross-Feedback Network Ring injection Loop

            // Storage for active graph runtime alterations adjustments
            delayNodesArray.push(delayNode);
            feedbackGainsArray.push(feedbackGainNode);
            dampingFiltersArray.push(dampingFilterNode);

            // Panning separation spatial distribution
            if (index % 2 === 0) {
                // Modulating structural stereo depth factor parameter directly
                let leftGain = audioCtx.createGain();
                leftGain.gain.value = 0.5 + (spatialVal * 0.5);
                allPassDiffusionNode.connect(leftGain);
                leftGain.connect(merger, 0, 0);
            } else {
                let rightGain = audioCtx.createGain();
                rightGain.gain.value = 0.5 + (spatialVal * 0.5);
                allPassDiffusionNode.connect(rightGain);
                rightGain.connect(merger, 0, 1);
            }
        });

        merger.connect(ReverbWetGainNode);
        ReverbWetGainNode.connect(audioCtx.destination);
    }

    // Real-time slider engine parameter tuning injector mechanics
    function updateComplexFXParameters() {
        if (!audioCtx) return;
        
        const decayVal = parseFloat(document.getElementById('fx-decay').value);
        const dampVal = parseFloat(document.getElementById('fx-damp').value);
        const spatialVal = parseFloat(document.getElementById('fx-spatial').value);

        const decayFactor = decayVal / 12;
        const baseFeedbackGains = [0.75, 0.73, 0.70, 0.68, 0.65, 0.62];

        // Safely tweaking living nodes running on the audio context background thread
        feedbackGainsArray.forEach((fgNode, index) => {
            if (fgNode) fgNode.gain.setTargetAtTime(baseFeedbackGains[index] * decayFactor, audioCtx.currentTime, 0.05);
        });

        dampingFiltersArray.forEach(filterNode => {
            if (filterNode) filterNode.frequency.setTargetAtTime(dampVal, audioCtx.currentTime, 0.05);
        });

        document.getElementById('main-display').innerHTML = `
            [DSP ENGINE MODULATING] - COMPLEX SULTAN FX ONLINE<br>
            DECAY TAIL: ${decayVal.toFixed(1)}s | DAMP HIGH-CUT: ${dampVal}Hz<br>
            STEREO SPATIAL WIDTH: ${spatialVal}% (FIELD SPATIAL ROOM)<br>
            • SELECTED CHANNEL FOCUS: CH ${String(selectedChannel).padStart(2, '0')}
        `;
    }

    // Audio source loading pipeline handling
    document.getElementById('audio-file').addEventListener('change', function(e) {
        initAudio();
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            audioCtx.decodeAudioData(evt.target.result, function(buffer) {
                audioBuffer = buffer;
                startComplexTrackRouting();
                document.getElementById('main-display').innerHTML = `
                    [AUDIO DECODED SYSTEM-WIDE]<br>
                    SOURCE FILE: ${file.name.substring(0, 22)}...<br>
                    PROCESSING STATE: ACTIVE 24 CHANNELS PARALLEL<br>
                    • LED VU BRIDGES INITIALIZED SUCCESSFULLY
                `;
            });
        };
        reader.readAsArrayBuffer(file);
    });

    function startComplexTrackRouting() {
        if (sourceNode) sourceNode.stop();

        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        sourceNode.loop = true;

        channelsData.forEach(ch => {
            ch.gainNode = audioCtx.createGain();
            ch.sendGainNode = audioCtx.createGain();
            ch.analyserNode = audioCtx.createAnalyser();
            ch.analyserNode.fftSize = 32;

            const dbGain = faderToGain(ch.faderValue);
            ch.gainNode.gain.value = ch.muted ? 0 : dbGain;
            
            // Channel 1-4 mapped as main vocal channels with heavy wet fx routing injections
            ch.sendGainNode.gain.value = (ch.id <= 4) ? 0.95 : 0.25; 

            sourceNode.connect(ch.gainNode);
            ch.gainNode.connect(audioCtx.destination); 
            
            ch.gainNode.connect(ch.sendGainNode);
            ch.sendGainNode.connect(ReverbInputNode);
            
            ch.gainNode.connect(ch.analyserNode);
        });

        sourceNode.start(0);
        executeLiveVuLogic();
    }

    function faderToGain(val) {
        if (val === 0) return 0;
        return Math.pow(10, (20 * Math.log10(val / 100)) / 20);
    }

    function gainToDB(val) {
        if (val === 0) return '-INF';
        const db = Math.round(20 * Math.log10(val / 100));
        return db >= 0 ? `+${db} dB` : `${db} dB`;
    }

    // UI Surface rendering system
    function renderMixerSurface() {
        const surface = document.getElementById('mixer-surface');
        surface.innerHTML = '';

        const [start, end] = currentLayer.split('-').map(Number);

        for (let i = start - 1; i < end; i++) {
            const ch = channelsData[i];
            const isSelected = ch.id === selectedChannel;
            const isMuted = ch.muted;

            const strip = document.createElement('div');
            strip.className = `channel-strip ${isSelected ? 'selected' : ''}`;
            strip.id = `strip-${ch.id}`;

            strip.innerHTML = `
                <div class="ch-header">${ch.name}</div>
                <button class="btn-sel ${isSelected ? 'active' : ''}" onclick="selectChannel(${ch.id})">SEL</button>
                <button class="btn-mute" onclick="toggleMuteMechanics(${ch.id})">MUTE</button>
                
                <div class="mute-led-container">
                    <div class="led-indicator led-mute-on ${isMuted ? 'active' : ''}" id="led-m-on-${ch.id}"></div>
                    <div class="led-indicator led-mute-off ${!isMuted ? 'active' : ''}" id="led-m-off-${ch.id}"></div>
                </div>
                
                <div class="meter-bridge">
                    <div class="meter-blue-base" id="bluebase-${ch.id}"></div>
                    <div class="meter-signal-bar" id="signalbar-${ch.id}"></div>
                </div>

                <div class="fader-wrapper">
                    <div class="fader-track-label">
                        <span>+10</span><span>0</span><span>-10</span><span>-30</span><span>-∞</span>
                    </div>
                    <input type="range" class="fader-input" min="0" max="127" value="${ch.faderValue}" 
                        oninput="handleFaderMove(${ch.id}, this.value)">
                </div>

                <div class="db-readout" id="db-${ch.id}">${gainToDB(ch.faderValue)}</div>
            `;
            surface.appendChild(strip);
        }
    }

    // Execution routine calculation monitoring standard loop cycles
    function executeLiveVuLogic() {
        if (!audioCtx) return;

        channelsData.forEach(ch => {
            const blueBaseLED = document.getElementById(`bluebase-${ch.id}`);
            const signalBarMeter = document.getElementById(`signalbar-${ch.id}`);
            
            if (ch.analyserNode) {
                // If the engine node exists, then the channel is actively wired inside the framework map
                if (blueBaseLED) blueBaseLED.classList.add('active');

                if (signalBarMeter && !ch.muted) {
                    const frequencyBufferArray = new Uint8Array(ch.analyserNode.frequencyBinCount);
                    ch.analyserNode.getByteFrequencyData(frequencyBufferArray);
                    
                    let frequencyAmplitudeSum = 0;
                    for (let i = 0; i < frequencyBufferArray.length; i++) {
                        frequencyAmplitudeSum += frequencyBufferArray[i];
                    }
                    const averageAmplitude = frequencyAmplitudeSum / frequencyBufferArray.length;
                    
                    // Remapping audio spectrum energy bounds directly onto CSS scaling rendering
                    const calculatedHeight = Math.min(100, (averageAmplitude / 255) * 240); 
                    signalBarMeter.style.height = `${calculatedHeight}%`;
                } else if (signalBarMeter) {
                    signalBarMeter.style.height = '0%';
                }
            } else {
                if (blueBaseLED) blueBaseLED.classList.remove('active');
                if (signalBarMeter) signalBarMeter.style.height = '0%';
            }
        });

        requestAnimationFrame(executeLiveVuLogic);
    }

    function handleFaderMove(chId, value) {
        const ch = channelsData[chId - 1];
        ch.faderValue = parseInt(value);
        
        document.getElementById(`db-${chId}`).innerText = gainToDB(ch.faderValue);

        if (ch.gainNode) {
            const gainTarget = faderToGain(ch.faderValue);
            ch.gainNode.gain.setTargetAtTime(ch.muted ? 0 : gainTarget, audioCtx.currentTime, 0.02);
        }
    }

    // Intelligent hardware style LED status Toggle Mute Mechanics
    function toggleMuteMechanics(chId) {
        const ch = channelsData[chId - 1];
        ch.muted = !ch.muted;

        const ledOnNode = document.getElementById(`led-m-on-${chId}`);
        const ledOffNode = document.getElementById(`led-m-off-${chId}`);

        if (ledOnNode && ledOffNode) {
            if (ch.muted) {
                ledOnNode.classList.add('active');
                ledOffNode.classList.remove('active');
            } else {
                ledOnNode.classList.remove('active');
                ledOffNode.classList.add('active');
            }
        }

        if (ch.gainNode) {
            const gainTarget = ch.muted ? 0 : faderToGain(ch.faderValue);
            ch.gainNode.gain.setTargetAtTime(gainTarget, audioCtx.currentTime, 0.01);
        }
    }

    function selectChannel(chId) {
        selectedChannel = chId;
        renderMixerSurface();
        updateComplexFXParameters();
    }

    function switchLayer(layerRange) {
        currentLayer = layerRange;
        document.querySelectorAll('.layer-btn').forEach(btn => {
            if (btn.innerText === layerRange) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderMixerSurface();
    }

    // Binding Global Complex Matrix DSP Interface control knobs
    document.getElementById('fx-decay').addEventListener('input', updateComplexFXParameters);
    document.getElementById('fx-damp').addEventListener('input', updateComplexFXParameters);
    document.getElementById('fx-spatial').addEventListener('input', updateComplexFXParameters);

    // Bootstrap run
    renderMixerSurface();
</script>

</body>
