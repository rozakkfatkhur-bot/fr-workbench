<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR AUDIO - Luxe DSP Processor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f4f5f9;
            --panel-white: #ffffff;
            --purple-primary: #6c5ce7;
            --purple-glow: #a29bfe;
            --purple-light: #f3f0ff;
            --text-dark: #2d3436;
            --text-muted: #b2bec3;
            --border-color: #e2e8f0;
            --red-alert: #ff7675;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 24px;
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header UI */
        .header {
            background: var(--panel-white);
            border-radius: 16px;
            padding: 20px 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand i {
            font-size: 24px;
            color: var(--purple-primary);
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .brand h1 span {
            color: var(--purple-primary);
        }

        /* Audio Source Loader */
        .audio-source-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-light);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 1px solid var(--purple-glow);
            color: var(--purple-primary);
            background-color: var(--panel-white);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-upload:hover {
            background-color: var(--purple-primary);
            color: white;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        audio {
            height: 36px;
            outline: none;
        }

        /* RTA Canvas Display */
        .display-card {
            background: var(--panel-white);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 20px;
        }

        .canvas-container {
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 200px;
            display: block;
        }

        /* Matrix Section Layout */
        .grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .panel-card {
            background: var(--panel-white);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .panel-header {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .panel-header i { color: var(--purple-primary); }

        /* Graphic EQ Sliders (10 Band) */
        .eq-sliders-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            height: 220px;
            align-items: center;
        }

        .eq-band {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: space-between;
        }

        .eq-band span.val {
            font-size: 10px;
            font-weight: 700;
            color: var(--purple-primary);
        }

        .eq-band span.freq {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .slider-wrapper {
            height: 150px;
            display: flex;
            align-items: center;
        }

        /* Vertical Slider Styling */
        input[type="range"].v-slider {
            -webkit-appearance: none;
            writing-mode: bt-lr; /* Firefox Support */
            transform: rotate(-90deg);
            width: 140px;
            height: 6px;
            background: #edf2f7;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"].v-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--purple-primary);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(108, 92, 231, 0.4);
        }

        /* Right Control Stack */
        .controls-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            margin-bottom: 14px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-dark);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .control-label span.val { color: var(--purple-primary); }

        input[type="range"].h-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #edf2f7;
            outline: none;
        }

        input[type="range"].h-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--purple-primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.4);
        }

        .toggle-btn {
            width: 100%;
            background: var(--purple-light);
            color: var(--purple-primary);
            border: 1px solid var(--purple-glow);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn.active {
            background: var(--purple-primary);
            color: #ffffff;
        }

    </style>
</head>
<body>

    <!-- Header UI -->
    <div class="header">
        <div class="brand">
            <i class="fa-solid fa-sliders"></i>
            <h1>FR <span>AUDIO</span> MATRIX DSP</h1>
        </div>
        <div class="audio-source-box">
            <div class="file-input-wrapper">
                <button class="btn-upload"><i class="fa-solid fa-folder-open"></i> Pilih Lagu (MP3/WAV)</button>
                <input type="file" id="audioFile" accept="audio/*">
            </div>
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>

    <!-- RTA Canvas Display -->
    <div class="display-card">
        <div class="canvas-container">
            <canvas id="rtaCanvas"></canvas>
        </div>
    </div>

    <!-- Main DSP Processing Controls Grid -->
    <div class="grid-layout">
        
        <!-- Graphic Equalizer (10 Band Real-Time Processing) -->
        <div class="panel-card">
            <div class="panel-header">
                <span>10-BAND GRAPHIC EQUALIZER</span>
                <button class="toggle-btn" id="eqBypassBtn" style="width: auto; padding: 4px 12px;">EQ ENABLED</button>
            </div>
            
            <div class="eq-sliders-container" id="eqContainer">
                <!-- JS akan me-render 10 Band slider di sini -->
            </div>
        </div>

        <!-- Master Crossover, Gain & Limiter Stack -->
        <div class="controls-stack">
            
            <!-- Crossover Filters -->
            <div class="panel-card">
                <div class="panel-header">
                    <span>ACTIVE CROSSOVER (24dB/Oct)</span>
                    <i class="fa-solid fa-filter"></i>
                </div>
                
                <div class="control-group">
                    <div class="control-label">
                        <span>HPF (Sub Cut Cutoff)</span>
                        <span class="val" id="hpfVal">20 Hz</span>
                    </div>
                    <input type="range" class="h-slider" id="hpfFreq" min="20" max="200" value="20">
                </div>

                <div class="control-group">
                    <div class="control-label"><span>LPF (High Cut Cutoff)</span><span class="val" id="lpfVal">20000 Hz</span></div>
                    <input type="range" class="h-slider" id="lpfFreq" min="2000" max="20000" value="20000">
                </div>
            </div>

            <!-- Master & Dynamic Control -->
            <div class="panel-card">
                <div class="panel-header">
                    <span>MASTER GAIN & LIMITER</span>
                    <i class="fa-solid fa-gauge-high"></i>
                </div>

                <div class="control-group">
                    <div class="control-label"><span>Master Level Gain</span><span class="val" id="masterGainVal">0 dB</span></div>
                    <input type="range" class="h-slider" id="masterGain" min="-20" max="10" value="0" step="0.5">
                </div>

                <div class="control-group">
                    <div class="control-label"><span>Limiter Threshold</span><span class="val" id="limiterVal">-3 dB</span></div>
                    <input type="range" class="h-slider" id="limiterThresh" min="-24" max="0" value="-3">
                </div>

                <button class="toggle-btn active" id="limiterToggle">
                    <i class="fa-solid fa-shield-halved"></i> PEAK LIMITER ACTIVE
                </button>
            </div>

        </div>

    </div>

    <!-- Web Audio API Core Processing Script -->
    <script>
        // Frequency Bands Preset untuk Graphic EQ
        const FREQUENCIES = [31, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        
        // Node Elements
        const audioPlayer = document.getElementById('audioPlayer');
        const audioFileInput = document.getElementById('audioFile');
        const eqContainer = document.getElementById('eqContainer');
        const canvas = document.getElementById('rtaCanvas');
        const ctx = canvas.getContext('2d');

        // Web Audio API Global Variables
        let audioCtx;
        let sourceNode;
        let eqFilters = [];
        let hpfFilter;
        let lpfFilter;
        let masterGainNode;
        let limiterNode;
        let analyserNode;
        let isEqBypassed = false;
        let isLimiterActive = true;

        // 1. Inisialisasi Tampilan 10-Band EQ Sliders UI
        function createEQSliders() {
            eqContainer.innerHTML = '';
            FREQUENCIES.forEach((freq, index) => {
                const bandEl = document.createElement('div');
                bandEl.className = 'eq-band';
                
                const freqLabel = freq >= 1000 ? (freq / 1000) + 'k' : freq;

                bandEl.innerHTML = `
                    <span class="val" id="eqVal-${index}">0dB</span>
                    <div class="slider-wrapper">
                        <input type="range" class="v-slider eq-slider" data-index="${index}" min="-12" max="12" value="0" step="0.5">
                    </div>
                    <span class="freq">${freqLabel}Hz</span>
                `;
                eqContainer.appendChild(bandEl);
            });
        }
        createEQSliders();

        // 2. Membangun Audio Graph Context & Digital Filters
        function initAudioContext() {
            if (audioCtx) return; // Mencegah re-initialization

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            // Source Audio
            sourceNode = audioCtx.createMediaElementSource(audioPlayer);

            // Create 10-Band EQ Filters (Peaking Filter Nodes)
            eqFilters = FREQUENCIES.map(freq => {
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'peaking';
                filter.frequency.value = freq;
                filter.Q.value = 1.4; // Q-Factor Audio Standard
                filter.gain.value = 0;
                return filter;
            });

            // Create Active Crossover Filters (High-Pass & Low-Pass)
            hpfFilter = audioCtx.createBiquadFilter();
            hpfFilter.type = 'highpass';
            hpfFilter.frequency.value = 20;

            lpfFilter = audioCtx.createBiquadFilter();
            lpfFilter.type = 'lowpass';
            lpfFilter.frequency.value = 20000;

            // Create Master Gain Node
            masterGainNode = audioCtx.createGain();

            // Create Compressor/Limiter Node
            limiterNode = audioCtx.createDynamicsCompressor();
            limiterNode.threshold.value = -3;
            limiterNode.knee.value = 0; // Hard Limiting
            limiterNode.ratio.value = 20; // High compression ratio
            limiterNode.attack.value = 0.003; // Fast attack
            limiterNode.release.value = 0.1;

            // Create Analyser Node untuk Visualizer RTA
            analyserNode = audioCtx.createAnalyser();
            analyserNode.fftSize = 256;

            // --- MENUANGKAN AUDIO ROUTING (CONNECTING NODES) ---
            // Source -> HPF -> LPF -> EQ1 -> EQ2... -> EQ10 -> Gain -> Limiter -> Analyser -> Output
            let lastNode = sourceNode;

            lastNode.connect(hpfFilter);
            lastNode = hpfFilter;

            lastNode.connect(lpfFilter);
            lastNode = lpfFilter;

            eqFilters.forEach(filter => {
                lastNode.connect(filter);
                lastNode = filter;
            });

            lastNode.connect(masterGainNode);
            lastNode = masterGainNode;

            lastNode.connect(limiterNode);
            lastNode = limiterNode;

            lastNode.connect(analyserNode);
            analyserNode.connect(audioCtx.destination);

            // Render RTA Visualizer
            drawRTA();
        }

        // 3. Event Handling Input File Audio
        audioFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                audioPlayer.src = fileURL;
                audioPlayer.play();
            }
        });

        // Autoplay handler saat Audio diklik play
        audioPlayer.addEventListener('play', () => {
            initAudioContext();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        // 4. Real-time Parameters Updating Logic

        // EQ Sliders Event
        document.querySelectorAll('.eq-slider').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const index = e.target.dataset.index;
                const val = parseFloat(e.target.value);
                document.getElementById(`eqVal-${index}`).innerText = (val > 0 ? '+' : '') + val + 'dB';
                
                if (eqFilters[index] && !isEqBypassed) {
                    eqFilters[index].gain.value = val;
                }
            });
        });

        // EQ Bypass Toggle
        const eqBypassBtn = document.getElementById('eqBypassBtn');
        eqBypassBtn.addEventListener('click', () => {
            isEqBypassed = !isEqBypassed;
            eqBypassBtn.innerText = isEqBypassed ? 'EQ BYPASSED' : 'EQ ENABLED';
            eqBypassBtn.style.color = isEqBypassed ? '#ff7675' : 'var(--purple-primary)';

            eqFilters.forEach((filter, idx) => {
                const sliderVal = parseFloat(document.querySelectorAll('.eq-slider')[idx].value);
                filter.gain.value = isEqBypassed ? 0 : sliderVal;
            });
        });

        // High Pass Filter Event
        document.getElementById('hpfFreq').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('hpfVal').innerText = val + ' Hz';
            if (hpfFilter) hpfFilter.frequency.value = val;
        });

        // Low Pass Filter Event
        document.getElementById('lpfFreq').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('lpfVal').innerText = val + ' Hz';
            if (lpfFilter) lpfFilter.frequency.value = val;
        });

        // Master Gain Event
        document.getElementById('masterGain').addEventListener('input', (e) => {
            const dB = parseFloat(e.target.value);
            document.getElementById('masterGainVal').innerText = (dB > 0 ? '+' : '') + dB + ' dB';
            if (masterGainNode) {
                // Konversi Desibel ke Linear Gain Level
                masterGainNode.gain.value = Math.pow(10, dB / 20);
            }
        });

        // Limiter Threshold Event
        document.getElementById('limiterThresh').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('limiterVal').innerText = val + ' dB';
            if (limiterNode) limiterNode.threshold.value = val;
        });

        // Limiter Toggle Event
        const limiterToggle = document.getElementById('limiterToggle');
        limiterToggle.addEventListener('click', () => {
            isLimiterActive = !isLimiterActive;
            limiterToggle.classList.toggle('active', isLimiterActive);
            limiterToggle.innerHTML = isLimiterActive ? 
                '<i class="fa-solid fa-shield-halved"></i> PEAK LIMITER ACTIVE' : 
                '<i class="fa-solid fa-shield-cat"></i> LIMITER BYPASSED';
            
            if (limiterNode) {
                limiterNode.ratio.value = isLimiterActive ? 20 : 1;
            }
        });

        // 5. Canvas RTA (Real-Time Analyzer) Rendering Loop
        function drawRTA() {
            requestAnimationFrame(drawRTA);

            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            // Draw Background Minimalist Grid Lines
            ctx.strokeStyle = '#f0f2f5';
            ctx.lineWidth = 1;
            for(let x = 0; x < width; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for(let y = 0; y < height; y += 30) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }

            if (!analyserNode) return;

            const bufferLength = analyserNode.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyserNode.getByteFrequencyData(dataArray);

            // Render Purple Bar Visualizer
            const barWidth = (width / bufferLength) * 1.8;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * height;

                // Gradient Fill Ungu
                const gradient = ctx.createLinearGradient(0, height, 0, 0);
                gradient.addColorStop(0, '#6c5ce7');
                gradient.addColorStop(1, '#a29bfe');

                ctx.fillStyle = gradient;
                ctx.fillRect(x, height - barHeight, barWidth, barHeight);

                x += barWidth + 2;
            }
        }

        // Init blank grid canvas
        drawRTA();
    </script>
</body>
</html>
