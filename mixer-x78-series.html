<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR AUDIO X78 Series - Digital Mixer Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom Scrollbar & Violet Glow Effects */
        .violet-glow {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }
        .led-active {
            box-shadow: 0 0 8px rgba(167, 139, 250, 1);
        }
        /* Vertical Fader Styling */
        .fader-range {
            writing-mode: bt-lr; /* IE */
            appearance: slider-vertical; /* Webkit */
            width: 8px;
            height: 220px;
            background: #4c1d95;
        }
    </style>
</head>
<body class="bg-zinc-950 text-stone-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-7xl bg-zinc-900 border-4 border-violet-900 rounded-3xl p-6 shadow-2xl violet-glow relative">
        
        <div class="flex justify-between items-center border-b-2 border-violet-950 pb-4 mb-6">
            <div>
                <h1 class="text-3xl font-black tracking-widest text-white">FR AUDIO <span class="text-violet-400 font-light text-xl">X78 SERIES</span></h1>
                <p class="text-xs tracking-wider text-violet-300/60 uppercase">The Violet and White Essence of Sound</p>
            </div>
            <div class="flex items-center gap-4 bg-zinc-950 px-4 py-2 rounded-xl border border-violet-900/50">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse led-active"></span>
                    <span class="text-xs text-stone-400 font-mono">SYSTEM READY</span>
                </div>
                <div class="w-px h-4 bg-zinc-800"></div>
                <div class="text-xs font-mono text-violet-400">48kHz / 24-bit</div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-4 mb-6">
            
            <div class="col-span-4 bg-zinc-950 p-4 rounded-2xl border border-violet-900/40 grid grid-cols-3 gap-3 text-center">
                <div class="col-span-3 text-left border-b border-zinc-800 pb-1 mb-1">
                    <span class="text-xs font-bold tracking-wider text-white">SUPERIOR PARAMETRIC EQ</span>
                </div>
                <div class="flex flex-col items-center justify-center py-2">
                    <div class="w-12 h-12 rounded-full border-4 border-violet-400 bg-zinc-900 flex items-center justify-center text-white text-xs font-bold shadow-inner cursor-pointer">HF</div>
                    <span class="text-[10px] text-stone-400 mt-1">Gain</span>
                </div>
                <div class="flex flex-col items-center justify-center py-2">
                    <div class="w-12 h-12 rounded-full border-4 border-violet-500 bg-zinc-900 flex items-center justify-center text-white text-xs font-bold shadow-inner cursor-pointer">HM</div>
                    <span class="text-[10px] text-stone-400 mt-1">Freq</span>
                </div>
                <div class="flex flex-col items-center justify-center py-2">
                    <div class="w-12 h-12 rounded-full border-4 border-violet-600 bg-zinc-900 flex items-center justify-center text-white text-xs font-bold shadow-inner cursor-pointer">LF</div>
                    <span class="text-[10px] text-stone-400 mt-1">Width</span>
                </div>
            </div>

            <div class="col-span-5 bg-gradient-to-br from-purple-950 to-zinc-950 p-4 rounded-2xl border-2 border-violet-500 shadow-md flex flex-col justify-between">
                <div class="flex justify-between items-center border-b border-violet-800/50 pb-2">
                    <span class="text-xs font-bold tracking-widest text-violet-200">MASTER TOUCHSCREEN DISPLAY</span>
                    <span class="bg-violet-600 text-[10px] font-bold text-white px-2 py-0.5 rounded">FX ROUTING</span>
                </div>
                <div class="my-3 flex-1 bg-zinc-950 rounded-lg p-3 border border-violet-900 flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-[linear-gradient(to_right,#1f1333_1px,transparent_1px),linear-gradient(to_bottom,#1f1333_1px,transparent_1px)] bg-[size:16px_16px]"></div>
                    <svg class="w-full h-24 stroke-white fill-none z-10 drop-shadow-[0_0_6px_rgba(255,255,255,0.8)]" viewBox="0 0 100 50">
                        <path d="M0,40 Q25,5 50,25 T100,10" stroke-width="2" />
                    </svg>
                    <div class="absolute bottom-2 left-2 text-[10px] font-mono text-violet-300 z-10">Active Scene: INITIAL_SHOW</div>
                </div>
                <div class="flex gap-2 text-[10px]">
                    <button class="flex-1 py-1 bg-white text-zinc-950 font-bold rounded hover:bg-stone-200 transition">Copy</button>
                    <button class="flex-1 py-1 bg-zinc-800 text-white font-bold rounded border border-zinc-700 hover:bg-zinc-700 transition">Paste</button>
                    <button class="flex-1 py-1 bg-violet-900 text-white font-bold rounded hover:bg-violet-800 transition">RTA</button>
                </div>
            </div>

            <div class="col-span-3 bg-zinc-950 p-4 rounded-2xl border border-violet-900/40 flex gap-4">
                <div class="w-12 bg-zinc-900 rounded-lg p-1 flex flex-col justify-between items-center border border-zinc-800">
                    <div class="w-full flex flex-col gap-0.5 items-center flex-1 justify-end pb-1">
                        <div class="w-4 h-1.5 bg-red-500 rounded-sm"></div>
                        <div class="w-4 h-1.5 bg-amber-400 rounded-sm"></div>
                        <div class="w-4 h-1.5 bg-violet-400 led-active rounded-sm"></div>
                        <div class="w-4 h-1.5 bg-violet-500 led-active rounded-sm"></div>
                        <div class="w-4 h-1.5 bg-violet-600 rounded-sm"></div>
                        <div class="w-4 h-1.5 bg-violet-700 rounded-sm"></div>
                        <div class="w-4 h-1.5 bg-zinc-800 rounded-sm"></div>
                    </div>
                    <span class="text-[9px] font-mono font-bold text-stone-400">LR</span>
                </div>
                <div class="flex-1 grid grid-cols-2 gap-2 text-center text-[10px]">
                    <button class="bg-zinc-900 border border-zinc-800 rounded-lg text-stone-300 hover:bg-zinc-800 py-2">Assign</button>
                    <button class="bg-zinc-900 border border-zinc-800 rounded-lg text-stone-300 hover:bg-zinc-800 py-2">Scene</button>
                    <button class="bg-zinc-900 border border-zinc-800 rounded-lg text-stone-300 hover:bg-zinc-800 py-2">Setup</button>
                    <button class="bg-violet-600 text-white font-bold rounded-lg hover:bg-violet-500 py-2 shadow-sm">Talkback</button>
                </div>
            </div>
        </div>

        <div class="bg-zinc-950 p-4 rounded-2xl border border-violet-900/60 overflow-x-auto">
            <div class="flex gap-3 min-w-max justify-between">
                
                <script>
                    for (let i = 1; i <= 8; i++) {
                        document.write(`
                        <div class="w-24 bg-zinc-900/80 rounded-xl p-2 border border-zinc-800 flex flex-col items-center">
                            <div class="flex gap-1 mb-2">
                                <span class="w-2 h-2 rounded-full bg-zinc-800" id="sig-${i}"></span>
                                <span class="w-2 h-2 rounded-full bg-zinc-800" id="pk-${i}"></span>
                            </div>
                            
                            <button class="w-full py-1 text-[10px] font-bold bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded text-stone-300 mb-1">PAFL</button>
                            <button class="w-full py-1 text-[10px] font-bold bg-white text-zinc-950 rounded mb-1 shadow">SEL</button>
                            <button class="w-full py-1 text-[10px] font-bold bg-red-950/40 text-red-400 border border-red-900 rounded mb-3 hover:bg-red-900/60 transition" onclick="toggleMute(this)">MUTE</button>
                            
                            <div class="w-full mb-3 px-1">
                                <label class="block text-[8px] text-center text-violet-300 bg-violet-950/60 border border-violet-800/50 py-0.5 rounded cursor-pointer truncate">
                                    Load File
                                    <input type="file" class="hidden" accept="audio/*" onchange="loadAudio(event, ${i})">
                                </label>
                            </div>

                            <div class="py-2 flex justify-center items-center h-56">
                                <input type="range" min="0" max="100" value="70" class="fader-range accent-white cursor-ns-resize" oninput="updateVolume(${i}, this.value)">
                            </div>
                            
                            <div class="w-full bg-zinc-950 border-t border-zinc-800 pt-1 text-center mt-2">
                                <span class="text-xs font-mono font-bold text-stone-200">CH 0${i}</span>
                                <span class="block text-[8px] text-stone-500 uppercase tracking-tight">Live/File</span>
                            </div>
                        </div>
                        `);
                    }
                </script>

                <div class="w-24 bg-gradient-to-b from-zinc-900 to-red-950/20 rounded-xl p-2 border border-red-900/30 flex flex-col items-center">
                    <div class="flex gap-1 mb-2">
                        <span class="w-2 h-2 rounded-full bg-zinc-800"></span>
                        <span class="w-2 h-2 rounded-full bg-zinc-800"></span>
                    </div>
                    
                    <button class="w-full py-1 text-[10px] font-bold bg-zinc-800 text-zinc-600 border border-zinc-800 rounded mb-1 cursor-not-allowed" disabled>PAFL ✕</button>
                    <button class="w-full py-1 text-[10px] font-bold bg-white text-zinc-950 rounded mb-1 shadow">SEL</button>
                    <button class="w-full py-1 text-[10px] font-bold bg-red-950/40 text-red-400 border border-red-900 rounded mb-3" onclick="toggleMute(this)">MUTE</button>
                    
                    <div class="w-full mb-3 text-center">
                        <span class="inline-block text-[8px] bg-red-600 text-white px-1.5 py-0.5 rounded font-black tracking-tighter">YT ONLY</span>
                    </div>

                    <div class="py-2 flex justify-center items-center h-56">
                        <input type="range" min="0" max="100" value="60" class="fader-range accent-red-500 cursor-ns-resize">
                    </div>
                    
                    <div class="w-full bg-zinc-950 border-t border-zinc-800 pt-1 text-center mt-2">
                        <span class="text-xs font-mono font-bold text-red-400">CH 09</span>
                        <span class="block text-[8px] text-stone-500 uppercase tracking-tight">Stream BGM</span>
                    </div>
                </div>

                <div class="w-24 bg-gradient-to-b from-zinc-900 to-purple-950/40 rounded-xl p-2 border border-violet-500/40 flex flex-col items-center">
                    <div class="flex gap-1 mb-2">
                        <span class="w-2 h-2 rounded-full bg-violet-400 led-active"></span>
                        <span class="w-2 h-2 rounded-full bg-zinc-800"></span>
                    </div>
                    
                    <button class="w-full py-1 text-[10px] font-bold bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded text-stone-300 mb-1">PAFL</button>
                    <button class="w-full py-1 text-[10px] font-bold bg-violet-500 text-white rounded mb-1 shadow">SEL</button>
                    <button class="w-full py-1 text-[10px] font-bold bg-red-950/40 text-red-400 border border-red-900 rounded mb-3" onclick="toggleMute(this)">MUTE</button>
                    
                    <div class="w-full mb-3 text-center">
                        <span class="inline-block text-[8px] bg-violet-600 text-white px-2 py-0.5 rounded font-bold">DIGITAL FX</span>
                    </div>

                    <div class="py-2 flex justify-center items-center h-56">
                        <input type="range" min="0" max="100" value="50" class="fader-range accent-violet-400 cursor-ns-resize">
                    </div>
                    
                    <div class="w-full bg-zinc-950 border-t border-zinc-800 pt-1 text-center mt-2">
                        <span class="text-xs font-mono font-bold text-violet-400">CH 10</span>
                        <span class="block text-[8px] text-stone-400 uppercase tracking-tight">Master FX</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Toggle Hardware Mute Button
        function toggleMute(button) {
            button.classList.toggle('bg-red-600');
            button.classList.toggle('text-white');
            button.classList.toggle('bg-red-950/40');
        }

        // Simulate Track File Loading
        function loadAudio(event, channelId) {
            const file = event.target.files[0];
            if (file) {
                console.log(`Channel ${channelId}: Loaded file ${file.name}`);
                
                // Trigger dynamic signal green LED simulation
                const sigLed = document.getElementById(`sig-${channelId}`);
                if (sigLed) {
                    sigLed.classList.remove('bg-zinc-800');
                    sigLed.classList.add('bg-emerald-400', 'led-active');
                }
            }
        }

        // Live Volume Slider Tracking Console
        function updateVolume(channelId, value) {
            console.log(`FR AUDIO X78 [CH ${channelId}] Volume level set to: ${value}%`);
        }
    </script>
</body>
</html>
