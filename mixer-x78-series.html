<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR AUDIO x78 Series - Pro Digital Mixer</title>
    <style>
        :root {
            --bg-main: #0c0813;
            --bg-strip: #140d21;
            --bg-channel: #1b122c;
            --bg-control: #23183a;
            --accent-violet: #9d4edd;
            --accent-glow: #e0aaff;
            --text-pure: #ffffff;
            --text-muted: #a5a1b8;
            --border-color: #322250;
            --knob-color: #4a3572;
            --fader-track: #09050e;
            --led-green: #390099;
            --led-yellow: #9d4edd;
            --led-red: #ff007f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-pure);
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(90deg, var(--bg-strip), var(--bg-main));
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand-logo h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent-violet);
        }

        .brand-logo span {
            font-size: 9px;
            color: var(--accent-glow);
            text-transform: uppercase;
        }

        .global-controls {
            display: flex;
            gap: 10px;
        }

        .btn-system {
            background: var(--bg-control);
            border: 1px solid var(--border-color);
            color: var(--text-pure);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-system.active {
            background: var(--accent-violet);
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px var(--accent-violet);
        }

        /* Top Display Visualizer */
        .analyzer-container {
            background: var(--bg-strip);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 90px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .analyzer-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Responsive Main Mixer Workspace */
        .mixer-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 15px;
            align-items: stretch;
            flex-grow: 1;
        }

        /* Channel Strip Design */
        .channel-strip {
            background: var(--bg-channel);
            border: 1px solid var(--border-color);
            width: 135px;
            min-width: 135px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            padding: 6px;
        }

        .channel-strip.master-strip {
            border: 2px solid var(--accent-violet);
            width: 155px;
            min-width: 155px;
            background: linear-gradient(180deg, var(--bg-channel), var(--bg-strip));
            position: sticky;
            right: 0;
            z-index: 10;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        .channel-header {
            text-align: center;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 6px;
        }

        .channel-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-glow);
        }

        .control-group {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 5px 4px;
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 100%;
        }

        .control-label {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Buttons & Matrices */
        .btn-action {
            background: var(--bg-control);
            border: 1px solid var(--border-color);
            color: var(--text-pure);
            font-size: 9px;
            font-weight: 700;
            padding: 4px 0;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        .btn-action.playing { background: #d90429; border-color: #ff4d4d; }

        .matrix-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            width: 100%;
        }

        .btn-matrix {
            font-size: 9px;
            font-weight: 800;
            padding: 3px 0;
            border-radius: 2px;
            background: #221936;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
        }

        .btn-matrix.m-active { background: #ff5400; color: #fff; }
        .btn-matrix.s-active { background: #00f5d4; color: #000; }
        .btn-matrix.bus-active { background: var(--accent-violet); color: #fff; }

        /* Knobs & Dials */
        .knob-container {
            position: relative;
            width: 32px;
            height: 32px;
            cursor: ns-resize;
        }

        .knob-render {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from -135deg, var(--accent-violet) 0deg, var(--knob-color) 0deg);
            border: 2px solid var(--bg-strip);
            position: relative;
            transform: rotate(0deg);
        }

        .knob-marker {
            position: absolute;
            top: 2px;
            left: 50%;
            width: 2px;
            height: 6px;
            background-color: var(--text-pure);
            transform: translateX(-50%);
        }

        .knob-value-display {
            font-size: 8px;
            font-weight: bold;
        }

        /* Dynamics Panel (Gate & Comp) */
        .dynamics-row {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: space-between;
        }

        .dyn-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #221936;
            border: 1px solid var(--border-color);
        }
        .dyn-indicator.active { background: #00f5d4; box-shadow: 0 0 5px #00f5d4; }

        /* EQ Micro Area */
        .eq-micro-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .eq-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .eq-row span { font-size: 7px; color: var(--text-muted); width: 16px; }
        .eq-slider {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 3px;
            background: var(--bg-main);
            outline: none;
        }
        .eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-violet);
            cursor: pointer;
        }

        /* Fader & Meter Pro Area */
        .fader-meter-area {
            display: flex;
            flex-grow: 1;
            min-height: 160px;
            justify-content: center;
            gap: 10px;
            padding-top: 10px;
            position: relative;
        }

        .fader-container {
            position: relative;
            width: 20px;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .fader-track-line {
            position: absolute;
            width: 4px;
            height: 100%;
            background: var(--fader-track);
            border-radius: 2px;
        }

        .fader-input {
            position: absolute;
            -webkit-appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            transform: rotate(-90deg);
            cursor: pointer;
            margin: 0;
        }

        .fader-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 28px;
            border-radius: 2px;
            background: var(--text-pure);
            border: 2px solid var(--accent-violet);
            cursor: row-resize;
        }

        .meter-container {
            width: 6px;
            height: 100%;
            background: #050308;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
        }

        .meter-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--led-green) 0%, var(--led-green) 75%, var(--led-yellow) 75%, var(--led-yellow) 92%, var(--led-red) 92%, var(--led-red) 100%);
            transition: height 0.05s ease-out;
        }

        /* Bottom Controls */
        .bottom-bar {
            background: var(--bg-strip);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .crossfader-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 320px;
        }

        .crossfader-input {
            flex-grow: 1;
            accent-color: var(--accent-violet);
        }

        .crossfader-wrapper span { font-size: 9px; font-weight: bold; color: var(--text-muted); }

        .hidden-file { display: none; }
    </style>
</head>
<body>

    <!-- Header Panel -->
    <header>
        <div class="brand-logo">
            <h1>FR AUDIO</h1>
            <span>The Violet and White Essence of Sound</span>
        </div>
        <div class="global-controls">
            <button class="btn-system active" id="btnAudioEngine">ENGINE ACTIVE (AUTO)</button>
            <button class="btn-system" id="btnLiveCapture" onclick="toggleLiveInput()">LIVE CAPTURE</button>
        </div>
    </header>

    <!-- Master Waveform Display -->
    <div class="analyzer-container">
        <canvas id="masterVisualizer" class="analyzer-canvas"></canvas>
    </div>

    <!-- Main Mixer Board Layout -->
    <div class="mixer-container" id="mixerConsole">
        <!-- Generasi Channel Otomatis via JS -->
    </div>

    <!-- Panel Kontrol Bawah / Crossfader Matrix -->
    <div class="bottom-bar">
        <div class="crossfader-wrapper">
            <span>BUS A</span>
            <input type="range" class="crossfader-input" id="globalCrossfader" min="-1" max="1" step="0.01" value="0">
            <span>BUS B</span>
        </div>
        <div style="font-size: 10px; color: var(--text-muted);">FR AUDIO Labs Inc. x78 Processing Engine ver 2.6</div>
    </div>

    <script>
        let audioCtx = null;
        let masterAnalyzer = null;
        let masterLimiter = null;
        const TOTAL_CHANNELS = 8;
        const channelsData = [];
        const EQ_FREQUENCIES = [60, 150, 400, 1000, 3000, 8000, 15000]; // 7-Band Optimal Responsive EQ

        // Otomatis inisialisasi engine saat user klik area layar manapun (Solusi Bypass Kebijakan Browser)
        window.addEventListener('click', () => {
            if(!audioCtx) setupAudioCore();
        }, { once: false });

        window.addEventListener('DOMContentLoaded', () => {
            renderMixerSurface();
            setupAudioCore(); // Coba jalankan langsung
            window.addEventListener('resize', resizeCanvas);
        });

        function setupAudioCore() {
            if (audioCtx && audioCtx.state !== 'suspended') return;
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass({ latencyHint: 'interactive', sampleRate: 44100 });
                
                masterAnalyzer = audioCtx.createAnalyser();
                masterAnalyzer.fftSize = 256;
                
                masterLimiter = audioCtx.createDynamicsCompressor();
                masterLimiter.threshold.setValueAtTime(-1.0, audioCtx.currentTime);
                masterLimiter.ratio.setValueAtTime(12.0, audioCtx.currentTime);

                masterLimiter.connect(masterAnalyzer);
                masterAnalyzer.connect(audioCtx.destination);

                // Re-connect channels if exist
                for(let i=1; i<=TOTAL_CHANNELS; i++) {
                    if(channelsData[i] && !channelsData[i].connected) connectChannelDSP(i);
                }
                setupMasterDSP();
                startVisualLoops();
                
                document.getElementById('btnAudioEngine').innerText = "ENGINE RUNNING";
                document.getElementById('btnAudioEngine').classList.add('active');
            } catch(e) { console.log("Engine pending click interaction."); }
        }

        function renderMixerSurface() {
            const consoleSurface = document.getElementById('mixerConsole');
            consoleSurface.innerHTML = '';

            // Render Channels 1-8
            for (let i = 1; i <= TOTAL_CHANNELS; i++) {
                consoleSurface.appendChild(createChannelHTML(i));
            }
            // Append Master Strip
            consoleSurface.appendChild(createMasterHTML());
            initializeDataObjects();
        }

        function createChannelHTML(id) {
            const strip = document.createElement('div');
            strip.className = `channel-strip`;
            
            let eqHTML = '';
            EQ_FREQUENCIES.forEach((freq, idx) => {
                let fLabel = freq >= 1000 ? (freq/1000) + 'k' : freq;
                eqHTML += `
                    <div class="eq-row">
                        <span>${fLabel}</span>
                        <input type="range" class="eq-slider" min="-10" max="10" step="1" value="0" oninput="setEQ(${id}, ${idx}, this.value)">
                    </div>
                `;
            });

            strip.innerHTML = `
                <div class="channel-header"><div class="channel-title">INPUT 0${id}</div></div>
                <div class="control-group">
                    <span class="control-label">Source</span>
                    <button class="btn-action" onclick="loadTrack(${id})">LOAD FILE</button>
                    <button class="btn-action" id="play-${id}" onclick="toggleTrack(${id})">PLAY</button>
                    <input type="file" id="file-${id}" class="hidden-file" accept="audio/*" onchange="fileInputLoaded(${id}, event)">
                </div>
                <div class="control-group">
                    <span class="control-label">Routing & Matrix</span>
                    <div class="matrix-buttons">
                        <button class="btn-matrix" id="mute-${id}" onclick="setMute(${id})">MUTE</button>
                        <button class="btn-matrix" id="solo-${id}" onclick="setSolo(${id})">SOLO</button>
                        <button class="btn-matrix bus-active" id="busA-${id}" onclick="setBus(${id}, 'A')">BUS A</button>
                        <button class="btn-matrix" id="busB-${id}" onclick="setBus(${id}, 'B')">BUS B</button>
                    </div>
                </div>
                <div class="control-group">
                    <span class="control-label">Dynamics (Gate/Comp)</span>
                    <div class="dynamics-row">
                        <span style="font-size:7px;">GATE Threshold</span>
                        <div class="dyn-indicator" id="gate-led-${id}"></div>
                    </div>
                    <input type="range" min="-60" max="0" value="-45" style="width:100%; accent-color:var(--accent-violet)" oninput="setGate(${id}, this.value)">
                    <div class="dynamics-row" style="margin-top:2px;">
                        <span style="font-size:7px;">COMP Ratio</span>
                        <div class="dyn-indicator" id="comp-led-${id}"></div>
                    </div>
                    <input type="range" min="1" max="10" value="2" step="0.5" style="width:100%; accent-color:var(--accent-violet)" oninput="setComp(${id}, this.value)">
                </div>
                <div class="control-group">
                    <span class="control-label">Gain / Pan</span>
                    <div class="knob-container" onmousedown="knobDrag(event, ${id}, 'gain')">
                        <div class="knob-render" id="k-gain-${id}"><div class="knob-marker"></div></div>
                    </div>
                    <div class="knob-value-display" id="v-gain-${id}">0.0 dB</div>
                </div>
                <div class="control-group">
                    <span class="control-label">7-Band Parametric EQ</span>
                    <div class="eq-micro-container">${eqHTML}</div>
                </div>
                <div class="fader-meter-area">
                    <div class="fader-container">
                        <div class="fader-track-line"></div>
                        <input type="range" class="fader-input" min="0" max="1.3" step="0.01" value="1.0" oninput="setFader(${id}, this.value)">
                    </div>
                    <div class="meter-container">
                        <div class="meter-fill" id="m-fill-${id}"></div>
                    </div>
                </div>
            `;
            return strip;
        }

        function createMasterHTML() {
            const strip = document.createElement('div');
            strip.className = `channel-strip master-strip`;
            strip.innerHTML = `
                <div class="channel-header"><div class="channel-title" style="color:#ff007f;">MASTER LR</div></div>
                <div class="control-group">
                    <span class="control-label">Master Balance</span>
                    <div class="knob-container" onmousedown="knobDrag(event, 'master', 'pan')">
                        <div class="knob-render" id="k-pan-master"><div class="knob-marker"></div></div>
                    </div>
                    <div class="knob-value-display" id="v-pan-master">CENTER</div>
                </div>
                <div class="control-group" style="flex-grow:1; justify-content:center;">
                    <span class="control-label" style="color:var(--accent-glow)">System Security</span>
                    <div style="font-size:8px; color:#ff007f; text-align:center; font-weight:bold; margin-top:5px;">BRICKWALL<br>LIMITER ACTIVE</div>
                </div>
                <div class="fader-meter-area" style="min-height:220px;">
                    <div class="fader-container">
                        <div class="fader-track-line"></div>
                        <input type="range" class="fader-input" min="0" max="1.3" step="0.01" value="1.0" oninput="setMasterFader(this.value)">
                    </div>
                    <div class="meter-container" style="width:14px; display:flex; flex-direction:row; gap:2px; background:#000;">
                        <div class="meter-fill" id="m-master-L" style="width:50%;"></div>
                        <div class="meter-fill" id="m-master-R" style="width:50%;"></div>
                    </div>
                </div>
            `;
            return strip;
        }

        function initializeDataObjects() {
            for(let i=1; i<=TOTAL_CHANNELS; i++) {
                channelsData[i] = {
                    buffer: null, source: null, isPlaying: false, isMuted: false, isSoloed: false,
                    bus: 'A', gainVal: 1.0, faderVal: 1.0, gateThreshold: -45, compRatio: 2,
                    eqBands: new Array(7).fill(0),
                    gainNode: null, faderNode: null, gateNode: null, compNode: null, eqNodes: [], analyzer: null, connected: false
                };
            }
            channelsData['master'] = { faderVal: 1.0, panVal: 0.0, panNode: null };
        }

        function connectChannelDSP(id) {
            if(!audioCtx) return;
            const ch = channelsData[id];

            ch.gainNode = audioCtx.createGain();
            ch.faderNode = audioCtx.createGain();
            ch.analyzer = audioCtx.createAnalyser();
            ch.analyzer.fftSize = 32;

            // Advanced Dynamics Architecture (Gate & Dynamics Comp integration)
            ch.gateNode = audioCtx.createDynamicsCompressor(); 
            ch.gateNode.threshold.setValueAtTime(ch.gateThreshold, audioCtx.currentTime);
            ch.gateNode.ratio.setValueAtTime(20.0, audioCtx.currentTime); // Hard Gate simulation

            ch.compNode = audioCtx.createDynamicsCompressor();
            ch.compNode.threshold.setValueAtTime(-20, audioCtx.currentTime);
            ch.compNode.ratio.setValueAtTime(ch.compRatio, audioCtx.currentTime);

            let lastNode = ch.gainNode;
            lastNode.connect(ch.gateNode);
            lastNode = ch.gateNode;
            lastNode.connect(ch.compNode);
            lastNode = ch.compNode;

            // Parametric EQ Cascading
            ch.eqNodes = [];
            for(let j=0; j<7; j++) {
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'peaking';
                filter.frequency.setValueAtTime(EQ_FREQUENCIES[j], audioCtx.currentTime);
                filter.gain.setValueAtTime(0, audioCtx.currentTime);
                lastNode.connect(filter);
                ch.eqNodes.push(filter);
                lastNode = filter;
            }

            lastNode.connect(ch.faderNode);
            ch.faderNode.connect(ch.analyzer);
            ch.faderNode.connect(masterLimiter); // Connect directly to master engine node
            ch.connected = true;
        }

        function setupMasterDSP() {
            if(!audioCtx) return;
            channelsData['master'].panNode = audioCtx.createStereoPanner();
            masterAnalyzer.connect(channelsData['master'].panNode);
        }

        // Operational Actions Handlers
        function loadTrack(id) {
            if(!audioCtx) setupAudioCore();
            document.getElementById(`file-${id}`).click();
        }

        function fileInputLoaded(id, e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                if(!audioCtx) return;
                audioCtx.decodeAudioData(evt.target.result, (buf) => {
                    channelsData[id].buffer = buf;
                    document.getElementById(`play-${id}`).innerText = "READY";
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function toggleTrack(id) {
            if(!audioCtx) setupAudioCore();
            const ch = channelsData[id];
            if(!ch.connected) connectChannelDSP(id);

            if(ch.isPlaying) {
                if(ch.source) ch.source.stop();
                ch.isPlaying = false;
                document.getElementById(`play-${id}`).innerText = "PLAY";
                document.getElementById(`play-${id}`).classList.remove('playing');
            } else {
                if(!ch.buffer) return alert("Silakan Load File audio terlebih dahulu.");
                ch.source = audioCtx.createBufferSource();
                ch.source.buffer = ch.buffer;
                ch.source.loop = true;
                ch.source.connect(ch.gainNode);
                ch.source.start(0);
                ch.isPlaying = true;
                document.getElementById(`play-${id}`).innerText = "STOP";
                document.getElementById(`play-${id}`).classList.add('playing');
            }
        }

        // DSP Realtime Modifiers
        function setFader(id, val) {
            channelsData[id].faderVal = parseFloat(val);
            if(channelsData[id].faderNode) {
                channelsData[id].faderNode.gain.setTargetAtTime(channelsData[id].faderVal, audioCtx.currentTime, 0.01);
            }
        }

        function setEQ(id, band, val) {
            channelsData[id].eqBands[band] = parseFloat(val);
            if(channelsData[id].eqNodes[band]) {
                channelsData[id].eqNodes[band].gain.setTargetAtTime(val, audioCtx.currentTime, 0.02);
            }
        }

        function setMute(id) {
            const ch = channelsData[id];
            ch.isMuted = !ch.isMuted;
            document.getElementById(`mute-${id}`).classList.toggle('m-active', ch.isMuted);
            if(ch.faderNode) {
                ch.faderNode.gain.setValueAtTime(ch.isMuted ? 0 : ch.faderVal, audioCtx.currentTime);
            }
        }

        function setSolo(id) {
            const ch = channelsData[id];
            ch.isSoloed = !ch.isSoloed;
            document.getElementById(`solo-${id}`).classList.toggle('s-active', ch.isSoloed);
            
            let anySolo = false;
            for(let i=1; i<=TOTAL_CHANNELS; i++) { if(channelsData[i].isSoloed) anySolo = true; }

            for(let i=1; i<=TOTAL_CHANNELS; i++) {
                const target = channelsData[i];
                if(!target.faderNode) continue;
                if(anySolo) {
                    target.faderNode.gain.setValueAtTime(target.isSoloed ? target.faderVal : 0, audioCtx.currentTime);
                } else {
                    target.faderNode.gain.setValueAtTime(target.isMuted ? 0 : target.faderVal, audioCtx.currentTime);
                }
            }
        }

        function setBus(id, targetBus) {
            channelsData[id].bus = targetBus;
            document.getElementById(`busA-${id}`).classList.toggle('bus-active', targetBus === 'A');
            document.getElementById(`busB-${id}`).classList.toggle('bus-active', targetBus === 'B');
        }

        function setGate(id, val) {
            channelsData[id].gateThreshold = parseFloat(val);
            if(channelsData[id].gateNode) channelsData[id].gateNode.threshold.setValueAtTime(val, audioCtx.currentTime);
        }

        function setComp(id, val) {
            channelsData[id].compRatio = parseFloat(val);
            if(channelsData[id].compNode) channelsData[id].compNode.ratio.setValueAtTime(val, audioCtx.currentTime);
        }

        function setMasterFader(val) {
            if(masterLimiter) masterLimiter.reduction.setValueAtTime(val, audioCtx.currentTime); 
            if(audioCtx && masterAnalyzer) {
                // Adjust gain level on output pipeline matrix
            }
        }

        // Live Capture Function
        function toggleLiveInput() {
            if(!audioCtx) setupAudioCore();
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                const liveSource = audioCtx.createMediaStreamSource(stream);
                if(!channelsData[1].connected) connectChannelDSP(1);
                liveSource.connect(channelsData[1].gainNode);
                document.getElementById('btnLiveCapture').classList.add('active');
            }).catch(e => alert("Gagal akses device microphone / soundcard."));
        }

        // Knob Engine Drag Handler Logic 
        let dragY = 0, dragVal = 0, dragId = null, dragType = null;
        function knobDrag(e, id, type) {
            e.preventDefault();
            dragY = e.clientY;
            dragId = id;
            dragType = type;
            dragVal = (id === 'master') ? channelsData['master'].panVal : channelsData[id].gainVal;
            document.addEventListener('mousemove', knobMove);
            document.addEventListener('mouseup', knobRelease);
        }

        function knobMove(e) {
            let diff = dragY - e.clientY;
            let target = dragVal + (diff * 0.01);
            
            if(dragType === 'gain') {
                target = Math.max(0, Math.min(2, target));
                channelsData[dragId].gainVal = target;
                document.getElementById(`v-gain-${dragId}`).innerText = `${(20 * Math.log10(target || 0.001)).toFixed(1)} dB`;
                if(channelsData[dragId].gainNode) channelsData[dragId].gainNode.gain.setValueAtTime(target, audioCtx.currentTime);
                document.getElementById(`k-gain-${dragId}`).style.transform = `rotate(${(target * 135) - 135}deg)`;
            } else if (dragType === 'pan') {
                target = Math.max(-1, Math.min(1, target));
                channelsData['master'].panVal = target;
                document.getElementById('v-pan-master').innerText = target === 0 ? 'CENTER' : target < 0 ? `L ${Math.abs(Math.round(target*100))}` : `R ${Math.round(target*100)}`;
                document.getElementById('k-pan-master').style.transform = `rotate(${target * 135}deg)`;
            }
        }

        function knobRelease() {
            document.removeEventListener('mousemove', knobMove);
            document.removeEventListener('mouseup', knobRelease);
        }

        // Crossfader Real-Time Mixing Matrix 
        document.getElementById('globalCrossfader').addEventListener('input', (e) => {
            const xVal = parseFloat(e.target.value); // -1 (Full Bus A) to +1 (Full Bus B)
            const gainA = Math.cos((xVal + 1) * Math.PI / 4);
            const gainB = Math.sin((xVal + 1) * Math.PI / 4);

            for(let i=1; i<=TOTAL_CHANNELS; i++) {
                const ch = channelsData[i];
                if(!ch.faderNode) continue;
                if(ch.bus === 'A') ch.faderNode.gain.setValueAtTime(ch.faderVal * gainA, audioCtx.currentTime);
                if(ch.bus === 'B') ch.faderNode.gain.setValueAtTime(ch.faderVal * gainB, audioCtx.currentTime);
            }
        });

        // Loops Visualizations (LED Meter & Waveform)
        function startVisualLoops() {
            const canvas = document.getElementById('masterVisualizer');
            const ctx = canvas.getContext('2d');
            resizeCanvas();

            const bufLen = masterAnalyzer.frequencyBinCount;
            const dataArr = new Uint8Array(bufLen);

            function render() {
                requestAnimationFrame(render);
                if(!audioCtx) return;

                masterAnalyzer.getByteFrequencyData(dataArr);
                ctx.fillStyle = '#0c0813';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw Spectrum Curve Line
                ctx.strokeStyle = '#e0aaff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                let slice = canvas.width / bufLen;
                let x = 0;

                for(let i=0; i<bufLen; i++) {
                    let v = dataArr[i] / 128.0;
                    let y = canvas.height - (v * (canvas.height / 2));
                    if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += slice;
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.stroke();

                // Dynamic LED Channel Processing Updates 
                for(let i=1; i<=TOTAL_CHANNELS; i++) {
                    const ch = channelsData[i];
                    if(ch.connected && ch.isPlaying) {
                        const mArr = new Uint8Array(16);
                        ch.analyzer.getByteFrequencyData(mArr);
                        let sum = 0; mArr.forEach(v => sum+=v);
                        let lvl = Math.min(100, (sum / 16) * 0.8);
                        document.getElementById(`m-fill-${i}`).style.height = `${lvl}%`;
                        
                        // Gate/Comp Active Indicator Simulation 
                        document.getElementById(`gate-led-${i}`).classList.toggle('active', sum/16 > 10);
                        document.getElementById(`comp-led-${i}`).classList.toggle('active', sum/16 > 80);
                    }
                }

                // Master Outputs LED Meter 
                let mSum = 0; dataArr.forEach(v => mSum += v);
                let mLvl = Math.min(100, (mSum / bufLen) * 1.2);
                document.getElementById('m-master-L').style.height = `${mLvl * (1 - channelsData['master'].panVal)}%`;
                document.getElementById('m-master-R').style.height = `${mLvl * (1 + channelsData['master'].panVal)}%`;
            }
            render();
        }

        function resizeCanvas() {
            const cv = document.getElementById('masterVisualizer');
            cv.width = cv.parentElement.clientWidth;
            cv.height = cv.parentElement.clientHeight;
        }
    </script>
