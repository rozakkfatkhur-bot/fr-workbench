<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FR Audio X78 Series - Digital Live Mixer & Audio Engine</title>
  <style>
    /* RESET & BASE STYLES */
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
      background: #0f1115;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      overflow-x: auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(145deg, #1a1d24, #14161a);
      padding: 15px 25px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid #2d3139;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .brand h1 {
      font-size: 24px;
      color: #00e5ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,229,255,0.3);
    }
    .brand p { font-size: 12px; color: #718096; margin-top: 2px; }
    
    /* SYSTEM CONTROLS */
    .sys-controls { display: flex; gap: 15px; align-items: center; }
    .btn {
      background: #252932;
      color: #fff;
      border: 1px solid #3b4252;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      font-size: 13px;
    }
    .btn:hover { background: #2f3542; border-color: #4c566a; }
    .btn-power { border-color: #00ffaa; color: #00ffaa; }
    .btn-power.active { background: #00ffaa; color: #101216; box-shadow: 0 0 15px rgba(0,255,170,0.4); }
    .btn-menu { border-color: #00e5ff; color: #00e5ff; }
    .btn-menu.active { background: #00e5ff; color: #101216; box-shadow: 0 0 15px rgba(0,229,255,0.4); }

    /* MIXER GRID WRAPPER */
    .mixer-container {
      display: flex;
      gap: 12px;
      background: #14161b;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid #22262f;
      min-width: 1200px;
    }

    /* CHANNEL STRIP */
    .channel-strip {
      flex: 1;
      min-width: 115px;
      max-width: 140px;
      background: linear-gradient(180deg, #1e222b 0%, #171a21 100%);
      border: 1px solid #2a2f3a;
      border-radius: 10px;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .channel-strip.master-strip {
      background: linear-gradient(180deg, #251f2b 0%, #1a1621 100%);
      border-color: #443554;
      max-width: 160px;
    }
    .ch-header { text-align: center; margin-bottom: 12px; width: 100%; }
    .ch-name { font-size: 12px; font-weight: 700; color: #a0aec0; text-transform: uppercase; }
    .ch-type { font-size: 9px; color: #4a5568; font-weight: 800; background: #0f1115; padding: 2px 4px; border-radius: 4px; display: inline-block; margin-top: 2px; }
    
    /* ANALYSER DISPLAY */
    .analyser-wrapper {
      width: 100%;
      height: 40px;
      background: #090a0d;
      border-radius: 4px;
      margin-bottom: 15px;
      border: 1px solid #1f232b;
      overflow: hidden;
    }
    .analyser-canvas { width: 100%; height: 100%; display: block; }

    /* KNOB & SLIDER STYLES */
    .control-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 14px;
      position: relative;
    }
    .control-label { font-size: 9px; color: #718096; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
    
    .knob-container { position: relative; width: 36px; height: 36px; cursor: ns-resize; }
    .knob-dial {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #3a4150 0%, #222731 70%);
      border: 2px solid #4a5568;
      position: relative;
      transition: transform 0.05s linear;
    }
    .knob-dial::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 50%;
      width: 3px;
      height: 10px;
      background: #00e5ff;
      border-radius: 2px;
      transform: translateX(-50%);
    }
    .knob-container[data-type="low"] .knob-dial::after { background: #ffaa00; }
    .knob-container[data-type="mid"] .knob-dial::after { background: #00ffaa; }
    .knob-container[data-type="high"] .knob-dial::after { background: #00aaff; }
    .knob-value { font-size: 9px; color: #a0aec0; margin-top: 3px; font-family: monospace; }

    /* BUTTON SWITCHES */
    .switch-row { display: flex; gap: 4px; width: 100%; margin-bottom: 15px; }
    .sw-btn {
      flex: 1;
      padding: 5px 0;
      font-size: 10px;
      font-weight: 700;
      background: #252932;
      border: 1px solid #323846;
      color: #a0aec0;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }
    .sw-btn.active-mute { background: #e53e3e; color: #fff; border-color: #fc8181; }

    /* FADER SYSTEM */
    .fader-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      padding: 10px 0;
      background: rgba(0,0,0,0.15);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .fader-track { position: relative; height: 180px; width: 8px; background: #090a0d; border-radius: 4px; border: 1px solid #22262f; }
    .fader-thumb {
      position: absolute;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 36px;
      background: linear-gradient(135deg, #4a5568, #2d3748);
      border: 2px solid #718096;
      border-radius: 4px;
      cursor: ns-resize;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }
    .fader-thumb::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: #ff3366;
      transform: translateY(-50%);
    }
    .master-strip .fader-thumb::before { background: #00e5ff; }
    .fader-db { font-size: 10px; color: #a0aec0; margin-top: 8px; font-family: monospace; }

    /* FILE INPUT BUTTON */
    .file-upload-btn {
      width: 100%;
      padding: 6px 0;
      background: #1f232b;
      border: 1px dashed #4a5568;
      border-radius: 4px;
      color: #a0aec0;
      font-size: 9px;
      cursor: pointer;
      text-align: center;
      margin-bottom: 10px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    /* OVERLAY MODAL PANELS */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .modal-overlay.open { visibility: visible; opacity: 1; }
    .modal-card {
      background: #1a1d24;
      border: 1px solid #2d3139;
      border-radius: 14px;
      width: 550px;
      padding: 25px;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #2d3139; padding-bottom: 12px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #00e5ff; }
    .modal-close { font-size: 20px; color: #718096; cursor: pointer; }

    /* ROUTING ROUTER GRID */
    .routing-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 15px; }
    .route-cell {
      background: #232731;
      border: 1px solid #323846;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
    }
    .route-cell.assigned { background: rgba(0, 255, 170, 0.15); border-color: #00ffaa; }
    .route-cell h4 { font-size: 13px; margin-bottom: 4px; color: #fff; }
    .route-cell p { font-size: 10px; color: #a0aec0; }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <h1>FR Audio X78 Series</h1>
      <p>Digital Live Mixer & Dynamic Multitrack Signal Processor</p>
    </div>
    <div class="sys-controls">
      <button class="btn btn-power" id="btn-power">START AUDIO ENGINE</button>
      <button class="btn btn-menu" id="btn-multitrack">HW ROUTING PATCH</button>
    </div>
  </header>

  <div class="mixer-container" id="mixer-surface"></div>

  <div class="modal-overlay" id="modal-routing-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Hardware Multitrack Routing (ESP32-S3)</div>
        <div class="modal-close" id="modal-routing-close">&times;</div>
      </div>
      <p style="font-size: 12px; color: #a0aec0; line-height: 1.5;">
        Aktifkan pemisah channel hardware (ESP32-S3 8-Channel Bus). Jika diaktifkan, input analog pin fisik akan langsung masuk ke channel strip mixer secara independen.
      </p>
      <div class="routing-grid" id="soundcard-grid-target"></div>
    </div>
  </div>

  <script>
    const CHANNEL_COUNT = 12;
    let audioCtx = null;
    let isSystemPowered = false;
    let hardwareStream = null;
    let channelSplitterNode = null; // Node krusial pemisah 8 channel hardware

    // Status aktifasi multitrack per-channel hardware (CH 1 - CH 8)
    let soundcardAssigned = new Set([0,1,2,3,4,5,6,7]); // Default: Aktif terpisah semua

    const channelDefs = [
      { id: 1, name: 'CH 01', type: 'KICK (HW 1)' },
      { id: 2, name: 'CH 02', type: 'SNARE (HW 2)' },
      { id: 3, name: 'CH 03', type: 'HAT (HW 3)' },
      { id: 4, name: 'CH 04', type: 'BASS (HW 4)' },
      { id: 5, name: 'CH 05', type: 'KEYS (HW 5)' },
      { id: 6, name: 'CH 06', type: 'GUITAR (HW 6)' },
      { id: 7, name: 'CH 07', type: 'VOX (HW 7)' },
      { id: 8, name: 'CH 08', type: 'PAD (HW 8)' },
      { id: 9, name: 'CH 09', type: 'YT LINK' },
      { id: 10, name: 'CH 10', type: 'FX RTN' },
      { id: 11, name: 'CH 11', type: 'PLAYBACK' },
      { id: 12, name: 'CH 12', type: 'PLAYBACK' }
    ];

    let channelNodes = [];
    let masterNodes = { inputGain: null, low: null, mid: null, high: null, pan: null, mainFader: null, analyser: null };

    const mixerSurface = document.getElementById('mixer-surface');
    const btnPower = document.getElementById('btn-power');
    const btnMultitrack = document.getElementById('btn-multitrack');
    const modalRoutingOverlay = document.getElementById('modal-routing-overlay');
    const modalRoutingClose = document.getElementById('modal-routing-close');
    const soundcardGridTarget = document.getElementById('soundcard-grid-target');

    function initMixerUI() {
      mixerSurface.innerHTML = '';
      channelDefs.forEach((ch, idx) => {
        const strip = document.createElement('div');
        strip.className = 'channel-strip';
        strip.innerHTML = `
          <div class="ch-header">
            <div class="ch-name">${ch.name}</div>
            <div class="ch-type">${ch.type}</div>
          </div>
          <div class="analyser-wrapper"><canvas class="analyser-canvas" id="canvas-ch-${idx}"></canvas></div>
          <button class="file-upload-btn" id="file-label-${idx}">Load Audio</button>
          <input type="file" style="display:none" id="file-in-${idx}" accept="audio/*">
          <div class="control-group">
            <span class="control-label">Pan</span>
            <div class="knob-container" data-idx="${idx}" data-param="pan"><div class="knob-dial" id="knob-pan-${idx}"></div></div>
            <span class="knob-value" id="val-pan-${idx}">C</span>
          </div>
          <div class="control-group">
            <span class="control-label" style="color:#ffaa00">Low</span>
            <div class="knob-container" data-type="low" data-idx="${idx}" data-param="low"><div class="knob-dial" id="knob-low-${idx}"></div></div>
            <span class="knob-value" id="val-low-${idx}">0 dB</span>
          </div>
          <div class="control-group">
            <span class="control-label" style="color:#00ffaa">Mid</span>
            <div class="knob-container" data-type="mid" data-idx="${idx}" data-param="mid"><div class="knob-dial" id="knob-mid-${idx}"></div></div>
            <span class="knob-value" id="val-mid-${idx}">0 dB</span>
          </div>
          <div class="control-group">
            <span class="control-label" style="color:#00aaff">High</span>
            <div class="knob-container" data-type="high" data-idx="${idx}" data-param="high"><div class="knob-dial" id="knob-high-${idx}"></div></div>
            <span class="knob-value" id="val-high-${idx}">0 dB</span>
          </div>
          <div class="switch-row"><button class="sw-btn" id="btn-mute-${idx}">MUTE</button></div>
          <div class="fader-container">
            <div class="fader-track"><div class="fader-thumb" id="fader-${idx}" style="bottom: 90px;"></div></div>
            <span class="fader-db" id="db-ch-${idx}">0.0 dB</span>
          </div>
        `;
        mixerSurface.appendChild(strip);
      });

      // Render Master Strip
      const masterStrip = document.createElement('div');
      masterStrip.className = 'channel-strip master-strip';
      masterStrip.innerHTML = `
        <div class="ch-header"><div class="ch-name" style="color:#00e5ff">MASTER</div><div class="ch-type" style="background:#00e5ff; color:#000">LR MAIN</div></div>
        <div class="analyser-wrapper" style="height:60px"><canvas class="analyser-canvas" id="canvas-master"></canvas></div>
        <div class="control-group" style="margin-top:20px;">
          <span class="control-label">Pan</span>
          <div class="knob-container" data-idx="master" data-param="pan"><div class="knob-dial" id="knob-master-pan"></div></div>
          <span class="knob-value" id="val-master-pan">C</span>
        </div>
        <div class="fader-container" style="margin-top:160px;">
          <div class="fader-track"><div class="fader-thumb" id="fader-master" style="bottom: 90px;"></div></div>
          <span class="fader-db" id="db-master">0.0 dB</span>
        </div>
      `;
      mixerSurface.appendChild(masterStrip);
      attachControlListeners();
    }

    function initAudioEngine() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
      
      // Master Nodes Setup
      masterNodes.inputGain = audioCtx.createGain();
      masterNodes.low = audioCtx.createBiquadFilter(); masterNodes.low.type = 'lowshelf'; masterNodes.low.frequency.value = 200;
      masterNodes.mid = audioCtx.createBiquadFilter(); masterNodes.mid.type = 'peaking'; masterNodes.mid.frequency.value = 2500;
      masterNodes.high = audioCtx.createBiquadFilter(); masterNodes.high.type = 'highshelf'; masterNodes.high.frequency.value = 8000;
      masterNodes.pan = audioCtx.createStereoPanner();
      masterNodes.mainFader = audioCtx.createGain();
      masterNodes.analyser = audioCtx.createAnalyser(); masterNodes.analyser.fftSize = 256;

      masterNodes.inputGain.connect(masterNodes.low);
      masterNodes.low.connect(masterNodes.mid);
      masterNodes.mid.connect(masterNodes.high);
      masterNodes.high.connect(masterNodes.pan);
      masterNodes.pan.connect(masterNodes.mainFader);
      masterNodes.mainFader.connect(masterNodes.analyser);
      masterNodes.analyser.connect(audioCtx.destination);

      // Channel Strips Nodes Setup
      channelDefs.forEach((ch, idx) => {
        const inputGain = audioCtx.createGain();
        const lowEq = audioCtx.createBiquadFilter(); lowEq.type = 'lowshelf'; lowEq.frequency.value = 100;
        const midEq = audioCtx.createBiquadFilter(); midEq.type = 'peaking'; midEq.frequency.value = 1500;
        const highEq = audioCtx.createBiquadFilter(); highEq.type = 'highshelf'; highEq.frequency.value = 10000;
        const panner = audioCtx.createStereoPanner();
        const chGain = audioCtx.createGain();
        const hwSwitch = audioCtx.createGain(); // Jembatan switch on/off per channel hardware
        const analyser = audioCtx.createAnalyser(); analyser.fftSize = 128;

        hwSwitch.connect(inputGain);
        inputGain.connect(lowEq);
        lowEq.connect(midEq);
        midEq.connect(highEq);
        highEq.connect(panner);
        panner.connect(chGain);
        chGain.connect(analyser);
        analyser.connect(masterNodes.inputGain);

        channelNodes[idx] = {
          input: inputGain, hwSwitch: hwSwitch, low: lowEq, mid: midEq, high: highEq,
          pan: panner, gain: chGain, analyser: analyser,
          fileSource: null, isMuted: false, gainValue: 0.5, panValue: 0.0, lowVal: 0, midVal: 0, highVal: 0
        };
      });

      // AMBIL DRIVER USB HARDWARE AUDIO DAN PECAH MENJADI MULTITRACK INDEPENDEN
      setupHardwareMultitrack();
      renderVisualisations();
    }

    function setupHardwareMultitrack() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        console.error("Browser tidak mendukung penangkapan perangkat keras audio.");
        return;
      }

      // Meminta browser membuka stream multichannel tanpa auto-processing perusak sinyal hajatan
      navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          channelCount: 8 // Paksa request menangkap seluruh 8 channel tiang data ESP32-S3
        }
      })
      .then(stream => {
        hardwareStream = stream;
        const sourceNode = audioCtx.createMediaStreamSource(stream);
        
        // KRUSIAL: Pecah bungkusan USB Audio Stream menjadi 8 jalur kabel digital terpisah
        channelSplitterNode = audioCtx.createChannelSplitter(8);
        sourceNode.connect(channelSplitterNode);

        // Petakan masing-masing hasil pecahan splitter langsung ke CH 1 s/d CH 8 internal Web Mixer
        for (let i = 0; i < 8; i++) {
          // Hubungkan output splitter index [i] ke node pintu masuk channel internal [i]
          channelSplitterNode.connect(channelNodes[i].hwSwitch, i, 0);
        }

        // Jalankan pengawas status switch agar file audio & mic hardware tidak saling tabrakan
        setInterval(() => {
          for (let i = 0; i < 8; i++) {
            const isRouterOn = soundcardAssigned.has(i);
            const isPlayingFile = channelNodes[i].fileSource != null;

            if (isRouterOn && !isPlayingFile) {
              channelNodes[i].hwSwitch.gain.value = 1.0; // Alirkan mic hardware murni
            } else {
              channelNodes[i].hwSwitch.gain.value = 0.0; // Blokir mic hardware jika file play/router off
            }
          }
        }, 150);

        console.log("8-Channel Hardware Multitrack Terhubung Sukses!");
      })
      .catch(err => {
        alert("Gagal memuat Soundcard 8-Ch. Pastikan USB Terpasang dan izinkan akses mikrofon.");
        console.error(err);
      });
    }

    function renderSoundcardGrid() {
      soundcardGridTarget.innerHTML = '';
      for (let i = 0; i < 8; i++) {
        const cell = document.createElement('div');
        const active = soundcardAssigned.has(i);
        cell.className = `route-cell ${active ? 'assigned' : ''}`;
        cell.innerHTML = `
          <h4>CH 0${i+1} Link</h4>
          <p>${active ? 'ESP32 HW INPUT ACTV' : 'DISCONNECTED'}</p>
        `;
        cell.onclick = () => {
          if (!isSystemPowered) return alert("Nyalakan Engine terlebih dahulu!");
          if (soundcardAssigned.has(i)) {
            soundcardAssigned.delete(i);
          } else {
            soundcardAssigned.add(i);
          }
          renderSoundcardGrid();
        };
        soundcardGridTarget.appendChild(cell);
      }
    }

    function attachControlListeners() {
      document.querySelectorAll('.knob-container').forEach(knob => {
        let startY = 0, startVal = 0;
        const idx = knob.getAttribute('data-idx');
        const param = knob.getAttribute('data-param');

        knob.addEventListener('mousedown', e => {
          startY = e.clientY;
          if(idx === 'master') {
            startVal = (param === 'pan') ? masterNodes.pan.pan.value : 0;
          } else {
            const nodeObj = channelNodes[parseInt(idx)];
            startVal = (param === 'pan') ? nodeObj.panValue : nodeObj[param + 'Val'];
          }
          window.onmousemove = moveEvent => {
            const deltaY = startY - moveEvent.clientY;
            let newVal = startVal + (deltaY * 0.02);
            newVal = (param === 'pan') ? Math.max(-1.0, Math.min(1.0, newVal)) : Math.max(-12, Math.min(12, newVal));
            updateKnobParam(idx, param, newVal);
          };
          window.onmouseup = () => { window.onmousemove = null; window.onmouseup = null; };
        });
      });

      document.querySelectorAll('.fader-thumb').forEach(thumb => {
        let startY = 0, startBottom = 0;
        const idAttr = thumb.getAttribute('id');
        thumb.addEventListener('mousedown', e => {
          startY = e.clientY; startBottom = parseInt(thumb.style.bottom) || 0;
          window.onmousemove = moveEvent => {
            let newBottom = startBottom + (startY - moveEvent.clientY);
            newBottom = Math.max(0, Math.min(144, newBottom));
            thumb.style.bottom = newBottom + 'px';
            updateFaderGain(idAttr, newBottom / 144);
          };
          window.onmouseup = () => { window.onmousemove = null; window.onmouseup = null; };
        });
      });

      channelDefs.forEach((ch, idx) => {
        const lbl = document.getElementById(`file-label-${idx}`);
        const inpt = document.getElementById(`file-in-${idx}`);
        if(lbl && inpt) {
          lbl.onclick = () => inpt.click();
          inpt.onchange = e => {
            if (!isSystemPowered) return alert("Nyalakan Engine terlebih dahulu!");
            const file = e.target.files[0];
            if(file) { lbl.innerText = file.name; processAudioFileInput(file, idx); }
          };
        }
        const btnMute = document.getElementById(`btn-mute-${idx}`);
        if(btnMute) {
          btnMute.onclick = () => {
            if(!isSystemPowered) return;
            const node = channelNodes[idx];
            node.isMuted = !node.isMuted;
            btnMute.classList.toggle('active-mute', node.isMuted);
            node.gain.gain.setValueAtTime(node.isMuted ? 0 : node.gainValue, audioCtx.currentTime);
          };
        }
      });
    }

    function processAudioFileInput(file, idx) {
      const reader = new FileReader();
      reader.onload = e => {
        audioCtx.decodeAudioData(e.target.result, buffer => {
          if (channelNodes[idx].fileSource) { try { channelNodes[idx].fileSource.stop(); } catch(e) {} }
          const source = audioCtx.createBufferSource();
          source.buffer = buffer; source.loop = true;
          source.connect(channelNodes[idx].input);
          source.start(0);
          channelNodes[idx].fileSource = source;
        });
      };
      reader.readAsArrayBuffer(file);
    }

    function updateKnobParam(idx, param, val) {
      const elDial = document.getElementById(idx === 'master' ? `knob-master-${param}` : `knob-${param}-${idx}`);
      const elText = document.getElementById(idx === 'master' ? `val-master-${param}` : `val-${param}-${idx}`);
      if(!elDial) return;

      if (param === 'pan') {
        elDial.style.transform = `rotate(${val * 135}deg)`;
        elText.innerText = val === 0 ? 'C' : val > 0 ? `R ${val.toFixed(1)}` : `L ${Math.abs(val).toFixed(1)}`;
        if(isSystemPowered) {
          const targetNode = idx === 'master' ? masterNodes.pan.pan : channelNodes[parseInt(idx)].pan.pan;
          targetNode.setValueAtTime(val, audioCtx.currentTime);
          if(idx !== 'master') channelNodes[parseInt(idx)].panValue = val;
        }
      } else {
        elDial.style.transform = `rotate(${(val / 12) * 135}deg)`;
        elText.innerText = `${val > 0 ? '+' : ''}${val.toFixed(1)} dB`;
        if(isSystemPowered) {
          const targetFilter = idx === 'master' ? masterNodes[param].gain : channelNodes[parseInt(idx)][param].gain;
          targetFilter.setValueAtTime(val, audioCtx.currentTime);
          if(idx !== 'master') channelNodes[parseInt(idx)][param + 'Val'] = val;
        }
      }
    }

    function updateFaderGain(idAttr, ratio) {
      if(!isSystemPowered) return;
      const dbValue = (ratio === 0) ? -Infinity : (Math.log10(ratio) * 20).toFixed(1);
      if(idAttr === 'fader-master') {
        document.getElementById('db-master').innerText = dbValue === -Infinity ? '-inf dB' : `${dbValue} dB`;
        masterNodes.mainFader.gain.setValueAtTime(ratio * 2, audioCtx.currentTime);
      } else {
        const idx = parseInt(idAttr.split('-')[1]);
        document.getElementById(`db-ch-${idx}`).innerText = dbValue === -Infinity ? '-inf dB' : `${dbValue} dB`;
        const node = channelNodes[idx];
        node.gainValue = ratio;
        if(!node.isMuted) node.gain.gain.setValueAtTime(ratio, audioCtx.currentTime);
      }
    }

    function renderVisualisations() {
      requestAnimationFrame(renderVisualisations);
      if(!isSystemPowered) return;

      for(let i = 0; i < CHANNEL_COUNT; i++) {
        const canvas = document.getElementById(`canvas-ch-${i}`);
        if(!canvas) continue;
        const ctx = canvas.getContext('2d');
        const node = channelNodes[i];
        const dataArray = new Uint8Array(node.analyser.frequencyBinCount);
        node.analyser.getByteFrequencyData(dataArray);

        ctx.fillStyle = '#090a0d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let barWidth = (canvas.width / dataArray.length) * 2.5, barHeight, x = 0;
        for(let j = 0; j < dataArray.length; j++) {
          barHeight = dataArray[j] / 4;
          ctx.fillStyle = `rgb(0, 229, 255)`;
          ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
          x += barWidth + 1;
        }
      }

      const mCanvas = document.getElementById('canvas-master');
      if(mCanvas) {
        const mCtx = mCanvas.getContext('2d');
        const mDataArray = new Uint8Array(masterNodes.analyser.frequencyBinCount);
        masterNodes.analyser.getByteFrequencyData(mDataArray);
        mCtx.fillStyle = '#090a0d'; mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
        let mBarWidth = (mCanvas.width / mDataArray.length) * 1.8, mBarHeight, mx = 0;
        for(let k = 0; k < mDataArray.length; k++) {
          mBarHeight = mDataArray[k] / 3.5;
          mCtx.fillStyle = `rgb(255, 51, 102)`;
          mCtx.fillRect(mx, mCanvas.height - mBarHeight, mBarWidth, mBarHeight);
          mx += mBarWidth + 1;
        }
      }
    }

    btnPower.onclick = () => {
      if(!isSystemPowered) {
        btnPower.innerText = "DSP ENGINE ACTIVE";
        btnPower.classList.add('active');
        isSystemPowered = true;
        initAudioEngine();
      } else {
        if(confirm("Matikan Core DSP Engine?")) { location.reload(); }
      }
    };

    btnMultitrack.onclick = () => { modalRoutingOverlay.classList.add('open'); renderSoundcardGrid(); };
    modalRoutingClose.onclick = () => modalRoutingOverlay.classList.remove('open');

    window.onload = () => { initMixerUI(); };
  </script>
</body>
</html>
