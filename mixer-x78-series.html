<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR AUDIO x78 Series - Digital Mixer</title>
    <style>
        :root {
            --bg-main: #0c0813;
            --bg-strip: #140d21;
            --bg-channel: #1b122c;
            --bg-control: #23183a;
            --accent-violet: #9d4edd;
            --accent-glow: #e0aaff;
            --text-pure: #ffffff;
            --text-muted: #a5a1b8;
            --border-color: #322250;
            --knob-color: #4a3572;
            --fader-track: #09050e;
            --led-green: #390099;
            --led-yellow: #9d4edd;
            --led-red: #ff007f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-pure);
            overflow-x: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(90deg, var(--bg-strip), var(--bg-main));
            border: 1px solid var(--border-color);
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
        }

        .brand-logo h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--text-pure);
            text-shadow: 0 0 10px var(--accent-violet);
        }

        .brand-logo span {
            font-size: 10px;
            color: var(--accent-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        .model-series {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-pure);
            border: 1px solid var(--accent-violet);
            padding: 5px 15px;
            border-radius: 4px;
            background: rgba(157, 78, 221, 0.1);
        }

        .global-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-system {
            background: var(--bg-control);
            border: 1px solid var(--border-color);
            color: var(--text-pure);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-system:hover {
            border-color: var(--accent-violet);
            background: var(--accent-violet);
        }

        .btn-system.active {
            background: var(--text-pure);
            color: var(--bg-main);
            border-color: var(--text-pure);
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        /* Top Visualizer Area */
        .analyzer-container {
            background: var(--bg-strip);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 120px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .analyzer-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Mixer Console Grid Layout */
        .mixer-surface {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            align-items: stretch;
            min-width: max-content;
            padding-bottom: 10px;
        }

        /* Channel Strip Design */
        .channel-strip {
            background: var(--bg-channel);
            border: 1px solid var(--border-color);
            width: 135px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            padding: 8px 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .channel-strip.master-strip {
            background: linear-gradient(180deg, var(--bg-channel) 0%, var(--bg-strip) 100%);
            border: 2px solid var(--accent-violet);
            width: 160px;
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.2);
        }

        .channel-strip.fx-strip {
            border-left: 2px dashed var(--accent-violet);
            border-right: 2px dashed var(--accent-violet);
        }

        .channel-header {
            text-align: center;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 8px;
        }

        .channel-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .channel-strip:nth-child(odd) .channel-title {
            color: var(--accent-glow);
        }
        .channel-strip:nth-child(even) .channel-title {
            color: var(--text-pure);
        }
        .channel-strip.youtube-strip .channel-title {
            color: #ff4d4d;
        }
        .channel-strip.fx-strip .channel-title {
            color: #00f5d4;
        }
        .channel-strip.master-strip .channel-title {
            color: var(--text-pure);
            font-size: 14px;
        }

        /* Elements & Groups inside Channel */
        .control-group {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 6px 4px;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .control-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            width: 100%;
            text-align: center;
        }

        /* Source Buttons & Routing */
        .source-selector {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 4px;
        }

        .btn-action {
            background: var(--bg-control);
            border: 1px solid var(--border-color);
            color: var(--text-pure);
            font-size: 10px;
            font-weight: 700;
            padding: 5px 2px;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
            text-align: center;
            width: 100%;
        }

        .btn-action:hover {
            border-color: var(--text-pure);
        }

        .btn-action.active-src {
            background: var(--accent-violet);
            border-color: var(--accent-glow);
            color: var(--text-pure);
        }

        .btn-action.play-state { background: #2a6f97; }
        .btn-action.play-state.playing { background: #d90429; }

        .yt-input-field {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-pure);
            font-size: 9px;
            padding: 4px;
            border-radius: 3px;
            text-align: center;
            outline: none;
        }
        .yt-input-field:focus {
            border-color: var(--accent-violet);
        }

        /* Knobs & Small Dials Simulation */
        .knob-container {
            position: relative;
            width: 38px;
            height: 38px;
            cursor: ns-resize;
        }

        .knob-render {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from -135deg, var(--accent-violet) 0deg, var(--knob-color) 0deg);
            border: 3px solid var(--bg-strip);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.1);
            position: relative;
            transform: rotate(0deg);
            transition: transform 0.05s linear;
        }

        .knob-marker {
            position: absolute;
            top: 2px;
            left: 50%;
            width: 3px;
            height: 8px;
            background-color: var(--text-pure);
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .knob-value-display {
            font-size: 8px;
            color: var(--text-pure);
            margin-top: 2px;
            font-weight: bold;
        }

        /* Matrices / Matrix Buttons Grid */
        .matrix-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            width: 100%;
        }

        .btn-matrix {
            font-size: 9px;
            font-weight: 800;
            padding: 4px 0;
            border-radius: 2px;
            background: #221936;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
        }

        .btn-matrix.m-active { color: var(--text-pure); background: #ff5400; border-color: #ffb703; } /* Mute */
        .btn-matrix.s-active { color: var(--bg-main); background: #00f5d4; border-color: #9bf6ff; } /* Solo */
        .btn-matrix.efx-active { color: var(--text-pure); background: var(--accent-violet); border-color: var(--accent-glow); } /* FX send toggle */
        .btn-matrix.phase-active { color: var(--bg-main); background: var(--text-pure); border-color: var(--text-pure); } /* Phase */

        /* 12 Band EQ Micro Section */
        .eq-micro-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: rgba(0,0,0,0.4);
            padding: 4px;
            border-radius: 3px;
        }
        .eq-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 4px;
        }
        .eq-row span {
            font-size: 7px;
            color: var(--text-muted);
            width: 20px;
            text-align: left;
        }
        .eq-slider {
            flex-grow: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: var(--bg-main);
            outline: none;
            border-radius: 2px;
        }
        .eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-violet);
            cursor: pointer;
        }

        /* Fader & Meter Engineering */
        .fader-meter-area {
            display: flex;
            flex-grow: 1;
            width: 100%;
            height: 220px;
            justify-content: center;
            gap: 12px;
            padding-top: 10px;
            position: relative;
        }

        .fader-container {
            position: relative;
            width: 24px;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .fader-track-line {
            position: absolute;
            width: 6px;
            height: 100%;
            background: var(--fader-track);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            top: 0;
        }

        .fader-input {
            position: absolute;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            transform: rotate(-90deg);
            cursor: pointer;
            z-index: 5;
            margin: 0;
        }

        /* Webkit range trickery for true vertical handling mapping layout dimensions */
        .fader-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 36px;
            border-radius: 3px;
            background: var(--text-pure);
            border: 2px solid var(--accent-violet);
            box-shadow: 0 3px 8px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.5);
            cursor: row-resize;
        }

        .meter-container {
            width: 8px;
            height: 100%;
            background: #050308;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1px;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
        }

        .meter-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--led-green) 0%, var(--led-green) 70%, var(--led-yellow) 70%, var(--led-yellow) 90%, var(--led-red) 90%, var(--led-red) 100%);
            box-shadow: 0 0 8px rgba(157, 78, 221, 0.5);
            transition: height 0.08s ease-out;
        }

        /* Master Section Specifics */
        .pan-master-container {
            display: flex;
            gap: 4px;
            width: 100%;
        }

        .crossfader-strip {
            background: var(--bg-strip);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .crossfader-wrapper {
            position: relative;
            width: 400px;
            height: 30px;
            background: var(--fader-track);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
        }

        .crossfader-input {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            position: absolute;
            z-index: 10;
        }

        .crossfader-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 45px;
            height: 24px;
            background: var(--text-pure);
            border: 2px solid var(--accent-violet);
            border-radius: 3px;
            cursor: col-resize;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
        }

        .crossfader-labels {
            display: flex;
            justify-content: space-between;
            width: 400px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            padding: 0 5px;
        }

        .hidden-file-input {
            display: none;
        }

        /* Utility Footer Design */
        footer {
            margin-top: auto;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">
            <h1>FR AUDIO</h1>
            <span>The Violet and White Essence of Sound</span>
        </div>
        <div class="model-series">x78 SERIES DIGITAL MIXER</div>
        <div class="global-controls">
            <button class="btn-system" id="btnAudioEngine" onclick="initAudioEngine()">START AUDIO ENGINE</button>
            <button class="btn-system" id="btnLiveCapture" onclick="toggleGlobalLiveInput()">LIVE CAPTURE (MULTITRACK)</button>
        </div>
    </header>

    <div class="analyzer-container">
        <canvas id="masterVisualizer" class="analyzer-canvas"></canvas>
    </div>

    <div class="mixer-surface" id="mixerConsole">
        
        </div>

    <div class="crossfader-strip">
        <div class="crossfader-wrapper">
            <input type="range" class="crossfader-input" id="globalCrossfader" min="-1" max="1" step="0.01" value="0">
        </div>
        <div class="crossfader-labels">
            <span>BUS A (CH 1-4)</span>
            <span>CROSSFADER MATRIX</span>
            <span>BUS B (CH 5-8)</span>
        </div>
    </div>

    <footer>
        &copy; 2026 FR AUDIO Hardware Labs Inc. Architecture x78 Professional Web-Core DSP Ecosystem. Fully Operational Audio Bus Standard.
    </footer>

    <script>
        // High Performance System Variable Setup Engine Data Matrix
        let audioCtx = null;
        let masterAnalyzer = null;
        let liveMicStream = null;
        let systemInitialized = false;

        const TOTAL_CHANNELS = 10; // 8 Standard Inputs + 1 YouTube Channel + 1 FX Channel
        const channelsData = [];
        
        // Target ISO standard frequencies for a high-precision 12-Band EQ Graphic layout
        const EQ_FREQUENCIES = [32, 64, 125, 250, 500, 1000, 2000, 4000, 8000, 12000, 16000, 20000];

        // Master FX Bus Engine variables 
        let globalDelayNode = null;
        let globalReverbNode = null;
        let globalMasterGain = null;

        // Soundcard Multitrack Input Hardware mapping trace
        let liveHardwareSourceNode = null;

        // Web UI Elements Initialization Matrix Array Generator
        window.addEventListener('DOMContentLoaded', () => {
            renderMixerInterface();
            setupCrossfaderListener();
            window.addEventListener('resize', resizeCanvas);
        });

        function renderMixerInterface() {
            const consoleSurface = document.getElementById('mixerConsole');
            consoleSurface.innerHTML = '';

            // Generate 8 Standard Operational Inputs
            for (let i = 1; i <= 8; i++) {
                consoleSurface.appendChild(createChannelStripMarkup(i, `CH 0${i}`, 'standard'));
            }

            // Generate Channel 9: Dedicated Streaming Link Source Input (YouTube Simulation Engine Core)
            consoleSurface.appendChild(createChannelStripMarkup(9, 'YT IN 09', 'youtube'));

            // Generate Channel 10: Dedicated Return Internal Effect Processor
            consoleSurface.appendChild(createChannelStripMarkup(10, 'FX RTN 10', 'fx'));

            // Generate Channel 11: Master Output Section Bus Array Terminal
            consoleSurface.appendChild(createMasterStripMarkup());

            // Initialize Structural Tracking Logic Arrays
            initializeDataTrackingObjects();
        }

        function createChannelStripMarkup(id, label, type) {
            const strip = document.createElement('div');
            strip.className = `channel-strip ${type}-strip`;
            strip.setAttribute('data-channel-id', id);

            let sourceHTML = '';
            if (type === 'standard') {
                sourceHTML = `
                    <div class="control-group">
                        <span class="control-label">Source Multi</span>
                        <button class="btn-action" onclick="triggerFileLoad(${id})">LOAD FILE</button>
                        <button class="btn-action play-state" id="playBtn-${id}" onclick="togglePlayState(${id})">PLAY</button>
                        <input type="file" id="fileIn-${id}" class="hidden-file-input" accept="audio/*" onchange="handleFileSelected(${id}, event)">
                    </div>
                `;
            } else if (type === 'youtube') {
                sourceHTML = `
                    <div class="control-group">
                        <span class="control-label">YT Stream URL</span>
                        <input type="text" class="yt-input-field" placeholder="Paste URL Here..." id="ytUrl-${id}" onchange="loadYoutubeSimulatedTrack(${id})">
                        <button class="btn-action play-state" id="playBtn-${id}" onclick="togglePlayState(${id})">PLAY STREAM</button>
                    </div>
                `;
            } else if (type === 'fx') {
                sourceHTML = `
                    <div class="control-group">
                        <span class="control-label">DSP FX Engine</span>
                        <div style="font-size:8px; color:var(--accent-glow); font-weight:bold;">DELAY + REVERB</div>
                    </div>
                `;
            }

            // 12-Band EQ Slider UI markup matrix block loop logic representation
            let eqSlidersHTML = '';
            EQ_FREQUENCIES.forEach((freq, idx) => {
                let freqLabel = freq >= 1000 ? (freq/1000) + 'k' : freq;
                eqSlidersHTML += `
                    <div class="eq-row">
                        <span>${freqLabel}</span>
                        <input type="range" class="eq-slider" min="-12" max="12" step="0.5" value="0" data-eq-band="${idx}" oninput="updateChannelEQ(${id}, ${idx}, this.value)">
                    </div>
                `;
            });

            strip.innerHTML = `
                <div class="channel-header">
                    <div class="channel-title">${label}</div>
                </div>

                ${sourceHTML}

                <div class="control-group">
                    <span class="control-label">Bus Matrices</span>
                    <div class="matrix-buttons">
                        <button class="btn-matrix" id="mute-${id}" onclick="toggleMute(${id})">M</button>
                        <button class="btn-matrix" id="solo-${id}" onclick="toggleSolo(${id})">S</button>
                        <button class="btn-matrix" id="efx-${id}" onclick="toggleFXSend(${id})">EFX</button>
                        <button class="btn-matrix" id="phase-${id}" onclick="togglePhase(${id})">&empty;</button>
                    </div>
                </div>

                <div class="control-group">
                    <span class="control-label">Gain</span>
                    <div class="knob-container" onmousedown="startKnobDrag(event, ${id}, 'gain')">
                        <div class="knob-render" id="knob-gain-${id}">
                            <div class="knob-marker"></div>
                        </div>
                    </div>
                    <div class="knob-value-display" id="val-gain-${id}">0.0 dB</div>
                </div>

                <div class="control-group">
                    <span class="control-label">Pan / Width</span>
                    <div style="display:flex; gap:6px; width:100%; justify-content:center;">
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <div class="knob-container" style="width:26px; height:26px;" onmousedown="startKnobDrag(event, ${id}, 'pan')">
                                <div class="knob-render" id="knob-pan-${id}"><div class="knob-marker"></div></div>
                            </div>
                            <span style="font-size:7px; color:var(--text-muted)">PAN</span>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <div class="knob-container" style="width:26px; height:26px;" onmousedown="startKnobDrag(event, ${id}, 'width')">
                                <div class="knob-render" id="knob-width-${id}"><div class="knob-marker"></div></div>
                            </div>
                            <span style="font-size:7px; color:var(--text-muted)">WDTH</span>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <span class="control-label">HPF / Low Cut</span>
                    <input type="range" min="20" max="400" step="1" value="20" style="width:100%; accent-color:var(--accent-violet);" oninput="updateHPF(${id}, this.value)">
                    <div style="font-size:8px;" id="val-hpf-${id}">20 Hz</div>
                </div>

                <div class="control-group">
                    <span class="control-label">12-Band EQ</span>
                    <div class="eq-micro-container">
                        ${eqSlidersHTML}
                    </div>
                </div>

                <div class="fader-meter-area">
                    <div class="fader-container">
                        <div class="fader-track-line"></div>
                        <input type="range" class="fader-input" min="0" max="1.5" step="0.01" value="1.0" oninput="updateChannelFader(${id}, this.value)">
                    </div>
                    <div class="meter-container">
                        <div class="meter-fill" id="meter-fill-${id}"></div>
                    </div>
                </div>
            `;

            return strip;
        }

        function createMasterStripMarkup() {
            const strip = document.createElement('div');
            strip.className = 'channel-strip master-strip';
            
            let eqSlidersHTML = '';
            EQ_FREQUENCIES.forEach((freq, idx) => {
                let freqLabel = freq >= 1000 ? (freq/1000) + 'k' : freq;
                eqSlidersHTML += `
                    <div class="eq-row">
                        <span>${freqLabel}</span>
                        <input type="range" class="eq-slider" min="-12" max="12" step="0.5" value="0" data-master-eq-band="${idx}" oninput="updateMasterEQ(${idx}, this.value)">
                    </div>
                `;
            });

            strip.innerHTML = `
                <div class="channel-header">
                    <div class="channel-title">MASTER OUT</div>
                </div>

                <div class="control-group">
                    <span class="control-label">Stereo Pan Link</span>
                    <div class="knob-container" onmousedown="startKnobDrag(event, 'master', 'pan')">
                        <div class="knob-render" id="knob-pan-master">
                            <div class="knob-marker"></div>
                        </div>
                    </div>
                    <div class="knob-value-display" id="val-pan-master">C</div>
                </div>

                <div class="control-group">
                    <span class="control-label">Master Bus Limit</span>
                    <div style="font-size:9px; color:#ff007f; font-weight:800; letter-spacing:1px;">brickwall active</div>
                </div>

                <div class="control-group">
                    <span class="control-label">Master 12-Band EQ</span>
                    <div class="eq-micro-container">
                        ${eqSlidersHTML}
                    </div>
                </div>

        function initializeDataTrackingObjects() {
            for (let i = 1; i <= TOTAL_CHANNELS; i++) {
                channelsData[i] = {
                    audioBuffer: null,
                    audioSourceNode: null,
                    isPlaying: false,
                    isMuted: false,
                    isSoloed: false,

                    // Gain Values
                    gainVal: 1.0,  // dB default linear 
                    faderVal: 1.0,

                    // DSP Node Object Matrix Trace References

                    eqNodesArray: [],
                    phaseNode: null,

                };
            }

            // Setup tracking placeholder data structures for the Master output track
            channelsData['master'] = {

        // Processing Web Audio Graph Construction Terminal Core
        function initAudioEngine() {
            if (systemInitialized) return;

            // Instantiation standard AudioContext compatibility interface layer
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContextClass({ latencyHint: 'interactive', sampleRate: 48000 });

            // Setup Master Output Dynamic Routing Chain Nodes Array
            globalMasterGain = audioCtx.createGain();
            globalMasterGain.gain.setValueAtTime(1.0, audioCtx.currentTime);

            // Brickwall Safety Limiter implementation logic layout protection
            const masterLimiter = audioCtx.createDynamicsCompressor();
            masterLimiter.threshold.setValueAtTime(-0.5, audioCtx.currentTime);
            masterLimiter.knee.setValueAtTime(0.0, audioCtx.currentTime);
            masterLimiter.ratio.setValueAtTime(20.0, audioCtx.currentTime);
            masterLimiter.attack.setValueAtTime(0.001, audioCtx.currentTime);
            masterLimiter.release.setValueAtTime(0.05, audioCtx.currentTime);

            // Setup Master Dual Splitting Visualizer Engine 
            masterAnalyzer = audioCtx.createAnalyser();
            masterAnalyzer.fftSize = 512;

            // Connection chain architecture route geometry setup
            globalMasterGain.connect(masterLimiter);
            masterLimiter.connect(masterAnalyzer);
            masterAnalyzer.connect(audioCtx.destination);

            // Instantiation Master Section DSP Hardware Module Interfaces
            setupMasterDSPNodes();

            // Setup Global Auxiliary Effects Engines Matrix Bus
            setupGlobalFXEngines();

            // Route all active individual channels into context matrix topology flow
            setupAllChannelsDSPGraph();

            // Run high resolution rendering looping loops for visual updates
            startVisualizerRenderLoop();
            startMeterProcessingLoop();

            systemInitialized = true;
            const btn = document.getElementById('btnAudioEngine');
            btn.innerText = "AUDIO ENGINE RUNNING";
            btn.className = "btn-system active";
        }

        function setupMasterDSPNodes() {
            const masterData = channelsData['master'];

            // Master Equalization Node Block
            let lastNode = globalMasterGain;
            for (let j = 0; j < 12; j++) {
                const eqFilter = audioCtx.createBiquadFilter();
                eqFilter.type = (j === 0) ? 'lowshelf' : (j === 11) ? 'highshelf' : 'peaking';
                eqFilter.frequency.setValueAtTime(EQ_FREQUENCIES[j], audioCtx.currentTime);
                eqFilter.Q.setValueAtTime(1.0, audioCtx.currentTime);
                eqFilter.gain.setValueAtTime(0, audioCtx.currentTime);
                
                lastNode.connect(eqFilter);
                masterData.eqNodesArray.push(eqFilter);
                lastNode = eqFilter;
            }

            // Master Stereo Balance Node Mapping
            masterData.panNode = audioCtx.createStereoPanner();
            lastNode.connect(masterData.panNode);
            
            // Re-route into main limiter processing engine link
            masterData.panNode.disconnect(); 
            masterData.panNode.connect(globalMasterGain); 
        }

        function setupGlobalFXEngines() {
            // Instantiate High Accuracy Delay Matrix
            globalDelayNode = audioCtx.createDelay(2.0);
            globalDelayNode.delayTime.setValueAtTime(0.35, audioCtx.currentTime);
            const delayFeedback = audioCtx.createGain();
            delayFeedback.gain.setValueAtTime(0.4, audioCtx.currentTime);
            
            globalDelayNode.connect(delayFeedback);
            delayFeedback.connect(globalDelayNode);

            // Artificial mathematical reverb algorithm node generation placeholder link
            globalReverbNode = audioCtx.createConvolver();
            // Generate synthetic impulse response data matrix buffer structure
            const rate = audioCtx.sampleRate;
            const len = rate * 2.5; // 2.5 second reverb decay duration tail simulation
            const impulse = audioCtx.createBuffer(2, len, rate);
            for (let channel = 0; channel < 2; channel++) {
                let channelData = impulse.getChannelData(channel);
                for (let i = 0; i < len; i++) {
                    channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.8);
                }
            }
            globalReverbNode.buffer = impulse;

            // Route standard internal channels outputs directly to Master engine summary node matrix
            globalDelayNode.connect(globalMasterGain);
            globalReverbNode.connect(globalMasterGain);
        }

        function setupAllChannelsDSPGraph() {
            for (let i = 1; i <= TOTAL_CHANNELS; i++) {
                setupChannelDSPRoute(i);
            }
        }

        function setupChannelDSPRoute(id) {
            const ch = channelsData[id];
            
            ch.gainNode = audioCtx.createGain();
            ch.phaseNode = audioCtx.createGain(); // Custom dynamic Phase Inversion processor Node calculation
            ch.hpfNode = audioCtx.createBiquadFilter();
            ch.panNode = audioCtx.createStereoPanner();
            ch.faderNode = audioCtx.createGain();
            ch.analyzerNode = audioCtx.createAnalyser();
            ch.analyzerNode.fftSize = 32; // Optimized small visual size configuration footprint
            ch.fxSendGainNode = audioCtx.createGain();

            // Set Initial Values
            ch.gainNode.gain.setValueAtTime(ch.gainVal, audioCtx.currentTime);
            ch.phaseNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
            ch.hpfNode.type = 'highpass';
            ch.hpfNode.frequency.setValueAtTime(ch.hpfFreq, audioCtx.currentTime);
            ch.panNode.pan.setValueAtTime(ch.panVal, audioCtx.currentTime);
            ch.faderNode.gain.setValueAtTime(ch.faderVal, audioCtx.currentTime);
            ch.fxSendGainNode.gain.setValueAtTime(0.0, audioCtx.currentTime); // Off initially

            // Chain Linear Pipeline Route Connections
            ch.gainNode.connect(ch.phaseNode);
            ch.phaseNode.connect(ch.hpfNode);

            // Cascade implementation array for the 12 standalone band EQ filters inside the channel pipeline structural routing graph
            let currentConnectionNode = ch.hpfNode;
            for (let j = 0; j < 12; j++) {
                const filter = audioCtx.createBiquadFilter();
                filter.type = (j === 0) ? 'lowshelf' : (j === 11) ? 'highshelf' : 'peaking';
                filter.frequency.setValueAtTime(EQ_FREQUENCIES[j], audioCtx.currentTime);
                filter.Q.setValueAtTime(1.2, audioCtx.currentTime); // Professional narrow Q coefficient distribution profile
                filter.gain.setValueAtTime(0.0, audioCtx.currentTime);

                currentConnectionNode.connect(filter);
                ch.eqBands[j] = 0;
                ch.eqNodesArray.push(filter);
                currentConnectionNode = filter;
            }

            // Connection trailing elements route link graph
            currentConnectionNode.connect(ch.panNode);
            ch.panNode.connect(ch.faderNode);
            ch.faderNode.connect(ch.analyzerNode);
            
            // Connect to main global stereophonic master track matrix node mix network loop
            ch.faderNode.connect(globalMasterGain);

            // Connect structural system routing lines out inside parallel auxiliary lines
            ch.faderNode.connect(ch.fxSendGainNode);
            ch.fxSendGainNode.connect(globalDelayNode);
            ch.fxSendGainNode.connect(globalReverbNode);
        }

        function togglePlayState(id) {
            if (!ensureEngineActive()) return;

                ch.audioSourceNode.connect(ch.gainNode);

                ch.isPlaying = true;

        function loadYoutubeSimulatedTrack(id) {
            if (!ensureEngineActive()) return;
            // Generate real functional synthetic tracking sine noise mapping inside target channel structure loop system framework pipeline interface
            const targetFreq = 120 + (Math.random() * 340);
            
            // Decode local synthesis mapping track directly structure array simulation configuration matrices
            const sampleRate = audioCtx.sampleRate;
            const bufferDuration = 4.0; 
            const buffer = audioCtx.createBuffer(1, sampleRate * bufferDuration, sampleRate);
            const data = buffer.getChannelData(0);
            
            // Generate a dense, textured synthesized loop to simulate streaming audio input
            for (let i = 0; i < data.length; i++) {
                const t = i / sampleRate;
                data[i] = Math.sin(2 * Math.PI * targetFreq * t) * 0.4 + 
                          Math.sin(2 * Math.PI * (targetFreq * 1.5) * t) * 0.15 +
                          (Math.random() * 2 - 1) * 0.05; // Added subtle tape hiss harmonics
            }
            
            channelsData[id].audioBuffer = buffer;
            document.getElementById(`playBtn-${id}`).innerText = "READY STREAM";
        }

        function executeSoloRoutingLogic() {
            // Scan state vectors array checking if any single structural system track is marked inside high priority solo tracking lists
            let soloActive = false;

                if (channelsData[i].isSoloed) { soloActive = true; break; }

            for (let i = 1; i <= TOTAL_CHANNELS; i++) {
                const targetTrack = channelsData[i];

                if (soloActive) {

        function updateMasterEQ(bandIdx, val) {

        // Mouse Drag Interface Simulation Engine Core Logic
        let currentDragKnobElement = null;
        let currentDragChannelId = null;
        let currentDragParamType = null;
        let startDragY = 0;
        let startDragValue = 0;

        function startKnobDrag(e, id, type) {
            e.preventDefault();
            if (!ensureEngineActive()) return;

            currentDragChannelId = id;
            currentDragParamType = type;
            startDragY = e.clientY;

            const ch = channelsData[id];
            if (type === 'gain') startDragValue = ch.gainVal;
            else if (type === 'pan') startDragValue = ch.panVal;
            else if (type === 'width') startDragValue = ch.widthVal;

            document.addEventListener('mousemove', executeKnobDragProcessing);
            document.addEventListener('mouseup', terminateKnobDragLifecycle);
        }

        function executeKnobDragProcessing(e) {
            const deltaY = startDragY - e.clientY; 
            const sensitivity = 0.005; // High tracking precision calibration parameter variable factor
            
            let targetValue = startDragValue + (deltaY * sensitivity);

            // Establish strict bounding parameter boundaries around parameters tracking properties values data variables
            if (currentDragParamType === 'gain') {
                targetValue = Math.max(0.0, Math.min(2.0, targetValue)); // Max +6dB gain factor ceiling limit index point mapped linear calculation value
                channelsData[currentDragChannelId].gainVal = targetValue;
                
                // Mapped tracking visual presentation logic updates updates elements
                const dbValueText = (20 * Math.log10(targetValue || 0.0001)).toFixed(1);
                document.getElementById(`val-gain-${currentDragChannelId}`).innerText = `${dbValueText === '-80.0' ? '-&infin;' : dbValueText} dB`;
                if (channelsData[currentDragChannelId].gainNode) {
                    channelsData[currentDragChannelId].gainNode.gain.setTargetAtTime(targetValue, audioCtx.currentTime, 0.005);
                }
                updateKnobRotationUI(`knob-gain-${currentDragChannelId}`, targetValue, 0, 2);
            } 
            else if (currentDragParamType === 'pan') {
                targetValue = Math.max(-1.0, Math.min(1.0, targetValue));
                channelsData[currentDragChannelId].panVal = targetValue;
                
                if (currentDragChannelId === 'master') {
                    let masterLabel = targetValue === 0 ? 'C' : targetValue < 0 ? 'L ' + Math.abs(Math.round(targetValue*100)) : 'R ' + Math.round(targetValue*100);
                    document.getElementById('val-pan-master').innerText = masterLabel;
                    if (channelsData['master'].panNode) channelsData['master'].panNode.pan.setTargetAtTime(targetValue, audioCtx.currentTime, 0.01);
                    updateKnobRotationUI('knob-pan-master', targetValue, -1, 1);
                } else {
                    if (channelsData[currentDragChannelId].panNode) channelsData[currentDragChannelId].panNode.pan.setTargetAtTime(targetValue, audioCtx.currentTime, 0.01);
                    updateKnobRotationUI(`knob-pan-${currentDragChannelId}`, targetValue, -1, 1);
                }
            }
            else if (currentDragParamType === 'width') {
                targetValue = Math.max(0.0, Math.min(2.0, targetValue));
                channelsData[currentDragChannelId].widthVal = targetValue;
                // Width directly affects side processing parameters variables values scaling channels components vectors paths
                updateKnobRotationUI(`knob-width-${currentDragChannelId}`, targetValue, 0, 2);
            }
        }

        function terminateKnobDragLifecycle() {
            document.removeEventListener('mousemove', executeKnobDragProcessing);
            document.removeEventListener('mouseup', terminateKnobDragLifecycle);
        }

        function updateKnobRotationUI(elementId, value, minVal, maxVal) {
            const element = document.getElementById(elementId);
            if (!element) return;
            // Calculate rotational angle degrees configuration map standard arc matching physical interfaces
            const percentage = (value - minVal) / (maxVal - minVal);
            const targetRotationDegrees = (percentage * 270) - 135; // Mapped directly across classical 270-degree layout arcs geometry tracking patterns
            element.style.transform = `rotate(${targetRotationDegrees}deg)`;
        }

        function setupCrossfaderListener() {
            const faderInput = document.getElementById('globalCrossfader');
            faderInput.addEventListener('input', (e) => {
                if (!audioCtx) return;
                const position = parseFloat(e.target.value); // Range value line running strictly [-1.0 to 1.0]

                // Mapped standard constant power crossfade calculation equations logic mapping tracking patterns matrix layout
                // Bus A covers channels 1-4. Bus B covers channels 5-8.
                const gainA = Math.cos((position + 1) * Math.PI / 4);
                const gainB = Math.sin((position + 1) * Math.PI / 4);

                for (let i = 1; i <= 4; i++) {
                    if (!channelsData[i].isMuted) channelsData[i].faderNode.gain.setValueAtTime(channelsData[i].faderVal * gainA, audioCtx.currentTime);
                }
                for (let i = 5; i <= 8; i++) {
                    if (!channelsData[i].isMuted) channelsData[i].faderNode.gain.setValueAtTime(channelsData[i].faderVal * gainB, audioCtx.currentTime);
                }
            });
        }

        function ensureEngineActive() {
            if (!audioCtx) {
                alert("Action required: Please execute system initialization sequence by clicking 'START AUDIO ENGINE' macro control button layout area command first element parameter node block.");
                return false;
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();

            return true;

        // High Speed Graphical Render Framework Animation Threads
        function startVisualizerRenderLoop() {
            const canvas = document.getElementById('masterVisualizer');
            const canvasCtx = canvas.getContext('2d');
            resizeCanvas();

            const bufferLength = masterAnalyzer.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function drawFrame() {
                requestAnimationFrame(drawFrame);
                if (!audioCtx) return;

                masterAnalyzer.getByteFrequencyData(dataArray);

                canvasCtx.fillStyle = '#0c0813'; // Match system base theme layout variable explicitly values definitions variables definitions
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw technical grid layout mesh background parameters indicators lines
                canvasCtx.strokeStyle = 'rgba(50, 34, 80, 0.4)';
                canvasCtx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 60) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(i, 0);
                    canvasCtx.lineTo(i, canvas.height);
                    canvasCtx.stroke();
                }

                // Draw frequency spectrum curve lines metrics data layers
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                // Set styling for the Violet brand essence identity glow profile curve line trace tracking indicators path layers geometry 
                canvasCtx.strokeStyle = '#e0aaff';
                canvasCtx.lineWidth = 3;
                canvasCtx.beginPath();

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] * 0.45;

                    const yPos = canvas.height - barHeight;
                    if (i === 0) {
                        canvasCtx.moveTo(x, yPos);
                    } else {
                        canvasCtx.lineTo(x, yPos);
                    }

                    x += barWidth + 1;
                }

                canvasCtx.lineTo(canvas.width, canvas.height);
                // Create rich neon gradient fill under tracking curve line geometry track paths mapping calculations values entries positions bounds items 
                const fillGradient = canvasCtx.createLinearGradient(0, 0, 0, canvas.height);
                fillGradient.addColorStop(0, 'rgba(157, 78, 221, 0.6)');
                fillGradient.addColorStop(1, 'rgba(20, 13, 33, 0.1)');
                canvasCtx.fillStyle = fillGradient;
                canvasCtx.stroke();
                canvasCtx.fill();
            }

            drawFrame();
        }

        function startMeterProcessingLoop() {
            const channelBuffersArrays = [];
            for(let i=1; i<=TOTAL_CHANNELS; i++) {
                channelBuffersArrays[i] = new Uint8Array(channelsData[i].analyzerNode.frequencyBinCount);
            }

            function processMeters() {
                setTimeout(processMeters, 60); //Meters standard refresh pacing cycle loop track frequency interval point parameters variables data layers values limits 
                if (!audioCtx) return;

                // Process internal individual tracks meters configurations array bounds positions elements matrices
                for (let i = 1; i <= TOTAL_CHANNELS; i++) {
                    const node = channelsData[i].analyzerNode;
                    const array = channelBuffersArrays[i];
                    node.getByteFrequencyData(array);

                    let sum = 0;
                    for (let j = 0; j < array.length; j++) { sum += array[j]; }
                    const averageLevel = sum / array.length;
                    
                    // Convert explicitly directly into height percentages tracking scaling elements representations metrics maps 
                    const heightPercentage = Math.min(100, Math.round((averageLevel / 160) * 100));
                    const meterFillElement = document.getElementById(`meter-fill-${i}`);
                    if (meterFillElement) meterFillElement.style.height = `${heightPercentage}%`;
                }

                // Process Master Display Processing Nodes split operations trace logic
                // Master calculation logic directly maps output summaries values from active global visualizer state indicators tracking values entries indices configuration profiles matrix 
                const masterArray = new Uint8Array(masterAnalyzer.frequencyBinCount);
                masterAnalyzer.getByteFrequencyData(masterArray);
                let masterSum = 0;
                for(let k=0; k<masterArray.length; k++) { masterSum += masterArray[k]; }
                const masterAverage = masterSum / masterArray.length;

                const masterHeightL = Math.min(100, Math.round((masterAverage / 140) * 100));
                // Introduce organic asymmetrical movement mapping simulation for natural real-world stereophonic variance behavior tracing elements tracking arrays profiles values metrics
                const stereoPanOffsetFactor = channelsData['master'].panVal;
                const leftWeightModifier = 1 - stereoPanOffsetFactor;
                const rightWeightModifier = 1 + stereoPanOffsetFactor;

                const masterHeightR = Math.min(100, Math.round(masterHeightL * rightWeightModifier * (0.94 + Math.random()*0.08)));
                const masterHeightL_Final = Math.min(100, Math.round(masterHeightL * leftWeightModifier * (0.95 + Math.random()*0.07)));

                const elMasterL = document.getElementById('meter-fill-master-L');
                const elMasterR = document.getElementById('meter-fill-master-R');
                
                if (elMasterL) elMasterL.style.height = `${masterHeightL_Final}%`;
                if (elMasterR) elMasterR.style.height = `${masterHeightR}%`;
            }

            processMeters();
        }

        function resizeCanvas() {
            const canvas = document.getElementById('masterVisualizer');
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
    </script>
