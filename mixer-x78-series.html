<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR Audio X78 Series - Web Mixer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            color: #bdc3c7;
            font-size: 0.9em;
        }

        .mixer-container {
            display: flex;
            padding: 20px;
            gap: 15px;
            overflow-x: auto;
            background: #2c3e50;
            min-height: calc(100vh - 100px);
        }

        .channel {
            background: linear-gradient(180deg, #34495e, #2c3e50);
            border-radius: 10px;
            padding: 15px;
            min-width: 120px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            border: 2px solid #4a5f7f;
            position: relative;
        }

        .channel.youtube {
            border-color: #e74c3c;
            background: linear-gradient(180deg, #c0392b, #2c3e50);
        }

        .channel.effects {
            border-color: #3498db;
            background: linear-gradient(180deg, #2980b9, #2c3e50);
        }

        .channel-label {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            font-size: 0.85em;
            text-transform: uppercase;
        }

        .channel.youtube .channel-label {
            background: #e74c3c;
        }

        .channel.effects .channel-label {
            background: #3498db;
        }

        .meter {
            width: 100%;
            height: 150px;
            background: #1a1a1a;
            border-radius: 5px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            border: 1px solid #555;
        }

        .meter-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #27ae60, #f39c12, #e74c3c);
            transition: height 0.1s ease;
            height: 0%;
        }

        .fader-container {
            height: 200px;
            position: relative;
            margin: 15px 0;
            display: flex;
            justify-content: center;
        }

        .fader {
            -webkit-appearance: slider-vertical;
            width: 40px;
            height: 100%;
            background: linear-gradient(to top, #555, #888);
            border-radius: 20px;
            outline: none;
            cursor: pointer;
        }

        .fader::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 50px;
            height: 30px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .fader::-moz-range-thumb {
            width: 50px;
            height: 30px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }

        .pan-control {
            margin: 10px 0;
        }

        .pan-knob {
            width: 100%;
            height: 8px;
            background: #555;
            border-radius: 4px;
            cursor: pointer;
        }

        .pan-knob::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #f39c12;
            border-radius: 50%;
            cursor: pointer;
        }

        .pan-knob::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #f39c12;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .btn {
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8em;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-mute {
            background: #95a5a6;
            color: #fff;
        }

        .btn-mute.active {
            background: #e74c3c;
        }

        .btn-solo {
            background: #95a5a6;
            color: #fff;
        }

        .btn-solo.active {
            background: #f39c12;
        }

        .btn-record {
            background: #95a5a6;
            color: #fff;
        }

        .btn-record.active {
            background: #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .eq-section {
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }

        .eq-label {
            font-size: 0.7em;
            margin-bottom: 5px;
            color: #bdc3c7;
        }

        .eq-knob {
            width: 100%;
            height: 6px;
            background: #555;
            border-radius: 3px;
        }

        .eq-knob::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #16a085;
            border-radius: 50%;
            cursor: pointer;
        }

        .volume-display {
            text-align: center;
            font-size: 0.8em;
            color: #3498db;
            margin-top: 5px;
            font-weight: bold;
        }

        .master-section {
            background: linear-gradient(180deg, #8e44ad, #2c3e50);
            border: 2px solid #9b59b6;
            min-width: 150px;
        }

        .fx-send {
            margin: 10px 0;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        .fx-label {
            font-size: 0.7em;
            margin-bottom: 5px;
        }

        .phase-invert {
            margin: 5px 0;
        }

        .btn-phase {
            background: #34495e;
            color: #fff;
            width: 100%;
        }

        .btn-phase.active {
            background: #9b59b6;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }
            
            .channel {
                min-width: 100px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>FR Audio X78 Series</h1>
        <p>Professional Web Audio Mixer - 10 Channel Digital Console</p>
    </div>

    <div class="mixer-container" id="mixerContainer">
        <!-- Channels akan di-generate oleh JavaScript -->
    </div>

    <script>
        // Konfigurasi channel
        const channelConfig = [
            { id: 1, name: 'Channel 1', type: 'normal' },
            { id: 2, name: 'Channel 2', type: 'normal' },
            { id: 3, name: 'Channel 3', type: 'normal' },
            { id: 4, name: 'Channel 4', type: 'normal' },
            { id: 5, name: 'Channel 5', type: 'normal' },
            { id: 6, name: 'Channel 6', type: 'normal' },
            { id: 7, name: 'Channel 7', type: 'normal' },
            { id: 8, name: 'Channel 8', type: 'normal' },
            { id: 9, name: 'YouTube', type: 'youtube' },
            { id: 10, name: 'Effects', type: 'effects' }
        ];

        // State untuk setiap channel
        const channelStates = {};

        // Inisialisasi state
        channelConfig.forEach(ch => {
            channelStates[ch.id] = {
                volume: 75,
                pan: 50,
                mute: false,
                solo: false,
                record: false,
                phase: false,
                eq: { high: 50, mid: 50, low: 50 },
                fxSend: 0
            };
        });

        // Generate channels
        function createChannels() {
            const container = document.getElementById('mixerContainer');
            
            channelConfig.forEach(ch => {
                const channelDiv = document.createElement('div');
                channelDiv.className = `channel ${ch.type}`;
                channelDiv.innerHTML = `
                    <div class="channel-label">${ch.name}</div>
                    
                    <div class="meter">
                        <div class="meter-bar" id="meter-${ch.id}"></div>
                    </div>
                    
                    <div class="eq-section">
                        <div class="eq-label">High</div>
                        <input type="range" class="eq-knob" min="0" max="100" value="50" 
                               onchange="updateEQ(${ch.id}, 'high', this.value)">
                        
                        <div class="eq-label">Mid</div>
                        <input type="range" class="eq-knob" min="0" max="100" value="50"
                               onchange="updateEQ(${ch.id}, 'mid', this.value)">
                        
                        <div class="eq-label">Low</div>
                        <input type="range" class="eq-knob" min="0" max="100" value="50"
                               onchange="updateEQ(${ch.id}, 'low', this.value)">
                    </div>
                    
                    <div class="pan-control">
                        <div class="eq-label">Pan</div>
                        <input type="range" class="pan-knob" min="0" max="100" value="50"
                               onchange="updatePan(${ch.id}, this.value)">
                    </div>
                    
                    <div class="fader-container">
                        <input type="range" class="fader" min="0" max="100" value="75" orient="vertical"
                               oninput="updateVolume(${ch.id}, this.value)">
                    </div>
                    
                    <div class="volume-display" id="vol-${ch.id}">-6 dB</div>
                    
                    <div class="fx-send">
                        <div class="fx-label">FX Send</div>
                        <input type="range" class="eq-knob" min="0" max="100" value="0"
                               onchange="updateFX(${ch.id}, this.value)">
                    </div>
                    
                    <div class="controls">
                        <button class="btn btn-mute" onclick="toggleMute(${ch.id}, this)">Mute</button>
                        <button class="btn btn-solo" onclick="toggleSolo(${ch.id}, this)">Solo</button>
                        <button class="btn btn-record" onclick="toggleRecord(${ch.id}, this)">Rec</button>
                        <button class="btn btn-phase" onclick="togglePhase(${ch.id}, this)">Ø</button>
                    </div>
                `;
                
                container.appendChild(channelDiv);
            });

            // Add Master Channel
            const masterDiv = document.createElement('div');
            masterDiv.className = 'channel master-section';
            masterDiv.innerHTML = `
                <div class="channel-label">Master</div>
                
                <div class="meter">
                    <div class="meter-bar" id="meter-master"></div>
                </div>
                
                <div class="fader-container">
                    <input type="range" class="fader" min="0" max="100" value="80" orient="vertical"
                           oninput="updateMasterVolume(this.value)">
                </div>
                
                <div class="volume-display" id="vol-master">0 dB</div>
            `;
            container.appendChild(masterDiv);
        }

        // Update functions
        function updateVolume(channelId, value) {
            channelStates[channelId].volume = value;
            const db = ((value - 75) * 0.8).toFixed(1);
            document.getElementById(`vol-${channelId}`).textContent = `${db} dB`;
            animateMeter(channelId);
        }

        function updateMasterVolume(value) {
            const db = ((value - 80) * 0.8).toFixed(1);
            document.getElementById('vol-master').textContent = `${db} dB`;
            animateMeter('master');
        }

        function updatePan(channelId, value) {
            channelStates[channelId].pan = value;
        }

        function updateEQ(channelId, band, value) {
            channelStates[channelId].eq[band] = value;
        }

        function updateFX(channelId, value) {
            channelStates[channelId].fxSend = value;
        }

        function toggleMute(channelId, btn) {
            channelStates[channelId].mute = !channelStates[channelId].mute;
            btn.classList.toggle('active');
        }

        function toggleSolo(channelId, btn) {
            channelStates[channelId].solo = !channelStates[channelId].solo;
            btn.classList.toggle('active');
        }

        function toggleRecord(channelId, btn) {
            channelStates[channelId].record = !channelStates[channelId].record;
            btn.classList.toggle('active');
        }

        function togglePhase(channelId, btn) {
            channelStates[channelId].phase = !channelStates[channelId].phase;
            btn.classList.toggle('active');
        }

        // Animasi meter
        function animateMeter(id) {
            const meter = document.getElementById(`meter-${id}`);
            if (meter) {
                const randomHeight = Math.random() * 80 + 20;
                meter.style.height = randomHeight + '%';
            }
        }

        // Simulasi meter animation
        setInterval(() => {
            channelConfig.forEach(ch => {
                if (!channelStates[ch.id].mute) {
                    animateMeter(ch.id);
                }
            });
            animateMeter('master');
        }, 100);

        // Initialize
        createChannels();
    </script>
</body>
</html>
