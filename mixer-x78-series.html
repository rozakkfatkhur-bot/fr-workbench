<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR AUDIO X78 Series - Professional Digital Mixer</title>
    <style>
        /* =========================================
           FR AUDIO X78 SERIES - PART 1: CSS ARCHITECTURE
           Skeuomorphic Design System
           ========================================= */
        
        :root {
            --bg-chassis: #1a1b1e;
            --bg-panel: #252629;
            --bg-strip: #2d2e32;
            --bg-fader-track: #151618;
            --text-primary: #e0e0e0;
            --text-muted: #7a7c82;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.4);
            --led-red: #ef4444;
            --led-green: #22c55e;
            --knob-base: #3a3b3f;
            --knob-highlight: #5a5b60;
            --shadow-inset: inset 0 2px 4px rgba(0,0,0,0.6);
            --shadow-outset: 0 4px 6px rgba(0,0,0,0.5);
            --border-subtle: 1px solid rgba(255,255,255,0.05);
            --font-ui: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --strip-width: 72px;
            --master-width: 120px;
        }

        * { box-sizing: border-box; user-select: none; outline: none; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-chassis);
            color: var(--text-primary);
            font-family: var(--font-ui);
            overflow-x: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- TOP SECTION: SELECTED CHANNEL DETAIL --- */
        .top-section {
            height: 320px;
            background: var(--bg-panel);
            border-bottom: 2px solid #000;
            display: grid;
            grid-template-columns: 280px 1fr 300px 300px;
            gap: 10px;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .panel-box {
            background: var(--bg-strip);
            border-radius: 4px;
            border: var(--border-subtle);
            box-shadow: var(--shadow-inset);
            padding: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        /* Selected Channel Info Panel */
        .selected-channel-display { gap: 10px; }
        .ch-name-large { font-size: 24px; font-weight: bold; color: var(--accent-blue); }
        .ch-number-badge { 
            background: var(--accent-blue); color: white; 
            padding: 2px 8px; border-radius: 3px; font-size: 12px; 
            display: inline-block; margin-bottom: 5px;
        }

        /* Waveform / EQ Canvas */
        canvas.fx-canvas {
            width: 100%; height: 100%;
            background: #111;
            border-radius: 2px;
            border: 1px solid #333;
            flex: 1;
        }

        /* Plugins & Routing Matrix */
        .plugin-slot {
            background: #1e1f22;
            border: 1px solid #333;
            padding: 6px;
            margin-bottom: 4px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .plugin-slot:hover { background: #2a2b2e; border-color: var(--accent-blue); }
        .plugin-active { border-left: 3px solid var(--accent-blue); }

        /* Meters Section */
        .meters-container {
            display: flex;
            gap: 15px;
            height: 100%;
            flex: 1;
        }
        .meter-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .meter-bar-bg {
            flex: 1;
            background: #111;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }
        .meter-fill {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--led-green) 0%, var(--led-green) 60%, yellow 80%, var(--led-red) 100%);
            width: 100%;
            transition: height 0.05s linear;
            opacity: 0.9;
        }
        .meter-labels {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* --- BOTTOM SECTION: MIXER STRIPS --- */
        .mixer-console {
            flex: 1;
            display: flex;
            overflow-x: auto;
            padding: 10px 20px 20px 20px;
            background: linear-gradient(to bottom, #1a1b1e, #121315);
            align-items: stretch;
        }

        .channel-strip {
            width: var(--strip-width);
            min-width: var(--strip-width);
            background: var(--bg-strip);
            margin-right: 2px;
            border-radius: 4px 4px 0 0;
            display: flex;
            flex-direction: column;
            padding: 8px 4px;
            border: 1px solid rgba(0,0,0,0.3);
            border-bottom: none;
            position: relative;
            transition: background 0.2s;
        }
        .channel-strip.selected {
            background: #36373c;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
            z-index: 10;
        }

        .strip-header {
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Knobs Container */
        .knobs-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }
        
        /* SKEUOMORPHIC KNOB IMPLEMENTATION */
        .knob-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .knob {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--knob-highlight), var(--knob-base));
            box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.2);
            position: relative;
            cursor: ns-resize;
            transform-origin: center center;
        }
        .knob::after {
            content: '';
            position: absolute;
            top: 4px; left: 50%;
            width: 2px; height: 10px;
            background: #fff;
            transform: translateX(-50%);
            border-radius: 1px;
            box-shadow: 0 0 2px rgba(0,0,0,0.8);
        }
        .knob-label {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* FADER AREA */
        .fader-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 10px 0;
            position: relative;
        }
        .fader-track {
            width: 6px;
            background: var(--bg-fader-track);
            border-radius: 3px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
            position: relative;
            height: 100%;
        }
        .fader-thumb {
            width: 36px; height: 50px;
            background: linear-gradient(to bottom, #4a4b50, #2a2b2e);
            border-radius: 4px;
            position: absolute;
            left: 50%;
            bottom: 0%; /* Dynamic */
            transform: translateX(-50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: grab;
            border: 1px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: bottom 0.05s linear;
        }
        .fader-thumb:active { cursor: grabbing; background: linear-gradient(to bottom, #5a5b60, #3a3b3e); }
        .fader-thumb::before {
            content: '';
            width: 20px; height: 2px;
            background: #ccc;
            box-shadow: 0 1px 0 rgba(0,0,0,0.5);
        }

        /* BUTTONS GRID */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 10px;
        }
        .btn-sq {
            background: #222;
            border: 1px solid #333;
            border-radius: 3px;
            color: #aaa;
            font-size: 9px;
            padding: 4px 0;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 0 #000;
            transition: all 0.1s;
        }
        .btn-sq:active { transform: translateY(2px); box-shadow: none; }
        .btn-sq.active {
            background: var(--accent-blue);
            color: white;
            border-color: #2563eb;
            box-shadow: 0 0 8px var(--accent-blue-glow);
        }
        .btn-mute.active { background: var(--led-red); border-color: #b91c1c; box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
        .btn-solo.active { background: #eab308; border-color: #a16207; color: #000; box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); }

        /* MASTER STRIP STYLES */
        .master-strip {
            width: var(--master-width);
            min-width: var(--master-width);
            background: #222326;
            border-left: 2px solid #000;
            margin-left: 10px;
        }
        .master-strip .fader-track { width: 10px; }
        .master-strip .fader-thumb { width: 50px; height: 70px; }

        /* OVERLAY FOR INITIALIZATION */
        #init-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .init-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-blue-glow);
            transition: transform 0.2s;
        }
        .init-btn:hover { transform: scale(1.05); }

        /* SCROLLBAR CUSTOMIZATION */
        ::-webkit-scrollbar { height: 12px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 6px; border: 2px solid #111; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

    </style>
</head>
<body>

    <!-- AUDIO CONTEXT INITIALIZATION OVERLAY -->
    <div id="init-overlay">
        <h1 style="color:white; margin-bottom: 10px;">FR AUDIO X78 SERIES</h1>
        <p style="color:#aaa; margin-bottom: 30px;">Professional Digital Mixing Console</p>
        <button class="init-btn" onclick="initializeAudioEngine()">POWER ON CONSOLE</button>
    </div>

    <!-- MAIN CONSOLE INTERFACE -->
    <div class="top-section">
        <!-- LEFT: SELECTED CHANNEL DETAILS -->
        <div class="panel-box selected-channel-display" id="sel-ch-panel">
            <div class="panel-header">Selected Channel</div>
            <div class="ch-number-badge" id="sel-ch-num">CH 1</div>
            <div class="ch-name-large" id="sel-ch-name">Input 1</div>
            
            <div style="margin-top: 15px;">
                <div class="panel-header">Signal Path</div>
                <div style="display:flex; gap:5px; align-items:center;">
                    <div class="btn-sq" id="sel-phase" onclick="togglePhase()">∅ PHASE</div>
                    <div class="btn-sq active" id="sel-pad" onclick="togglePad()">-20dB PAD</div>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <div class="panel-header">Input Gain</div>
                <div class="knob-wrapper">
                    <div class="knob" id="sel-gain-knob" onmousedown="startKnobDrag(event, 'gain')"></div>
                    <span class="knob-label" id="sel-gain-val">0.0 dB</span>
                </div>
            </div>
            
            <div style="margin-top:auto; height: 100px;">
                <div class="panel-header">EQ Curve</div>
                <canvas class="fx-canvas" id="eq-canvas"></canvas>
            </div>
        </div>

        <!-- CENTER LEFT: PLUGINS & FX -->
        <div class="panel-box">
            <div class="panel-header">Plugins & Inserts</div>
            <div id="plugins-list">
                <!-- Dynamically populated -->
            </div>
            <div style="margin-top: 15px;">
                <div class="panel-header">MixBus Sends</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;" id="send-buttons">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </div>

        <!-- CENTER RIGHT: INPUT METERS -->
        <div class="panel-box">
            <div class="panel-header">Inputs Metering</div>
            <div class="meters-container" id="input-meters">
                <!-- 16 Input Meters Generated Here -->
            </div>
        </div>

        <!-- RIGHT: OUTPUT METERS -->
        <div class="panel-box">
            <div class="panel-header">Outputs & Master</div>
            <div class="meters-container" id="output-meters">
                <!-- Main L/R + Aux Meters -->
            </div>
        </div>
    </div>

    <!-- BOTTOM: MIXER STRIPS -->
    <div class="mixer-console" id="mixer-strips-container">
        <!-- 16 Channel Strips + Groups + Master Generated Here -->
    </div>

<script>
/**
 * ============================================================================
 * FR AUDIO X78 SERIES - PART 1: CORE AUDIO ENGINE
 * Web Audio API Graph Construction & Signal Processing
 * ============================================================================
 */

// --- GLOBAL STATE & CONFIGURATION ---
const CONFIG = {
    numChannels: 16,
    numGroups: 4,
    numAux: 6,
    sampleRate: 48000,
    meterSmoothing: 0.85,
    faderMinDB: -60,
    faderMaxDB: 12,
    knobSensitivity: 0.005
};

// Central Application State
const AppState = {
    audioCtx: null,
    masterGain: null,
    analyserMain: null,
    channels: [], // Array of Channel Objects
    groups: [],   // Array of Group Objects
    auxes: [],    // Array of Aux Bus Objects
    selectedChannelIndex: 0,
    isDragging: false,
    dragTarget: null,
    animationFrameId: null
};

// --- WEB AUDIO ENGINE FACTORY ---

class ChannelStrip {
    constructor(index, audioCtx, destinationNode) {
        this.index = index;
        this.id = `ch_${index}`;
        this.ctx = audioCtx;
        
        // Signal Chain Nodes
        this.inputGain = audioCtx.createGain(); // Pre-fader / Trim
        this.phaseInverter = audioCtx.createWaveShaper();
        this.eqLow = audioCtx.createBiquadFilter();
        this.eqMid = audioCtx.createBiquadFilter();
        this.eqHigh = audioCtx.createBiquadFilter();
        this.panNode = audioCtx.createStereoPanner();
        this.faderGain = audioCtx.createGain();
        this.muteGain = audioCtx.createGain();
        this.analyser = audioCtx.createAnalyser();
        
        // Send Nodes (Pre/Post Fader configurable later, default Post)
        this.sends = [];
        for(let i=0; i<CONFIG.numAux; i++) {
            this.sends.push(audioCtx.createGain());
        }

        // Configure Phase Inverter
        const curve = new Float32Array(2);
        curve[0] = -1; curve[1] = 1;
        this.phaseInverter.curve = curve;
        this.phaseInverter.oversample = '4x';

        // Configure EQ Defaults
        this.eqLow.type = 'lowshelf'; this.eqLow.frequency.value = 320; this.eqLow.gain.value = 0;
        this.eqMid.type = 'peaking'; this.eqMid.frequency.value = 1000; this.eqMid.Q.value = 0.7; this.eqMid.gain.value = 0;
        this.eqHigh.type = 'highshelf'; this.eqHigh.frequency.value = 3200; this.eqHigh.gain.value = 0;

        // Analyser Settings
        this.analyser.fftSize = 256;
        this.analyser.smoothingTimeConstant = 0.8;

        // Initial Mute State
        this.isMuted = false;
        this.muteGain.gain.value = 1;
        this.faderGain.gain.value = 0.794; // -2dB default
        this.inputGain.gain.value = 1;
        this.panNode.pan.value = 0;

        // ROUTING CHAIN
        // Source -> InputGain -> Phase -> EQ(L/M/H) -> Pan -> Fader -> Mute -> Analyser -> Dest
        this.inputGain.connect(this.phaseInverter);
        this.phaseInverter.connect(this.eqLow);
        this.eqLow.connect(this.eqMid);
        this.eqMid.connect(this.eqHigh);
        this.eqHigh.connect(this.panNode);
        this.panNode.connect(this.faderGain);
        this.faderGain.connect(this.muteGain);
        this.muteGain.connect(this.analyser);
        this.analyser.connect(destinationNode);

        // Route Sends from Fader output (Post-Fader by default)
        this.sends.forEach(send => {
            this.faderGain.connect(send);
        });

        // Public Parameters for UI Binding
        this.params = {
            gain: 0,      // dB
            pan: 0,       // -1 to 1
            eqLow: 0,     // dB
            eqMid: 0,     // dB
            eqHigh: 0,    // dB
            fader: -2,    // dB
            phase: false,
            mute: false,
            solo: false,
            sends: new Array(CONFIG.numAux).fill(-Infinity) // dB
        };
    }

    setFaderDB(db) {
        this.params.fader = db;
        const linear = db <= -60 ? 0 : Math.pow(10, db / 20);
        this.faderGain.gain.setTargetAtTime(linear, this.ctx.currentTime, 0.01);
    }

    setGainDB(db) {
        this.params.gain = db;
        const linear = Math.pow(10, db / 20);
        this.inputGain.gain.setTargetAtTime(linear, this.ctx.currentTime, 0.01);
    }

    setPan(val) {
        this.params.pan = val;
        this.panNode.pan.setTargetAtTime(val, this.ctx.currentTime, 0.01);
    }

    setEQ(band, db) {
        this.params[band] = db;
        const node = band === 'eqLow' ? this.eqLow : (band === 'eqMid' ? this.eqMid : this.eqHigh);
        node.gain.setTargetAtTime(db, this.ctx.currentTime, 0.01);
    }

    toggleMute() {
        this.params.mute = !this.params.mute;
        this.muteGain.gain.setTargetAtTime(this.params.mute ? 0 : 1, this.ctx.currentTime, 0.005);
        return this.params.mute;
    }

    togglePhase() {
        this.params.phase = !this.params.phase;
        // Re-create curve to invert
        const curve = new Float32Array(2);
        curve[0] = this.params.phase ? 1 : -1; 
        curve[1] = this.params.phase ? -1 : 1;
        this.phaseInverter.curve = curve;
        return this.params.phase;
    }

    getMeterData() {
        const data = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(data);
        // Calculate RMS-like average for meter
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i];
        return sum / data.length;
    }
}

class GroupBus {
    constructor(index, audioCtx, destinationNode) {
        this.index = index;
        this.id = `grp_${index}`;
        this.ctx = audioCtx;
        this.input = audioCtx.createGain();
        this.fader = audioCtx.createGain();
        this.mute = audioCtx.createGain();
        this.analyser = audioCtx.createAnalyser();
        this.analyser.fftSize = 256;
        
        this.isMuted = false;
        this.fader.gain.value = 0.794;
        this.mute.gain.value = 1;

        this.input.connect(this.fader);
        this.fader.connect(this.mute);
        this.mute.connect(this.analyser);
        this.analyser.connect(destinationNode);
    }

    getMeterData() {
        const data = new Uint8Array(this.analyser.frequencyBinCount);
        this.analyser.getByteFrequencyData(data);
        let sum = 0;
        for(let i=0; i<data.length; i++) sum += data[i];
        return sum / data.length;
    }
}

// --- INITIALIZATION BOOTSTRAP (PARTIAL) ---
// Full UI rendering and interaction logic will be in PART 2

function initializeAudioEngine() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    AppState.audioCtx = new AudioContext();
    
    // Create Master Bus
    AppState.masterGain = AppState.audioCtx.createGain();
    AppState.masterGain.gain.value = 0.794; // -2dB
    AppState.masterGain.connect(AppState.audioCtx.destination);
    
    // Create Analyser for Master Meters
    AppState.analyserMain = AppState.audioCtx.createAnalyser();
    AppState.analyserMain.fftSize = 256;
    AppState.masterGain.connect(AppState.analyserMain);

    // Initialize Channels
    AppState.channels = [];
    for(let i=0; i<CONFIG.numChannels; i++) {
        AppState.channels.push(new ChannelStrip(i, AppState.audioCtx, AppState.masterGain));
    }

    // Initialize Groups
    AppState.groups = [];
    for(let i=0; i<CONFIG.numGroups; i++) {
        AppState.groups.push(new GroupBus(i, AppState.audioCtx, AppState.masterGain));
    }

    // Initialize Auxes (Simple Gain nodes for now)
    AppState.auxes = [];
    for(let i=0; i<CONFIG.numAux; i++) {
        const aux = AppState.audioCtx.createGain();
        aux.gain.value = 0.5;
        aux.connect(AppState.masterGain); // Aux returns to master by default
        AppState.auxes.push(aux);
    }

    // Hide Overlay
    document.getElementById('init-overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('init-overlay').remove(), 500);

    console.log("FR AUDIO X78 Core Engine Initialized. Waiting for UI Part 2...");
}

// Expose init to global scope for button
window.initializeAudioEngine = initializeAudioEngine;

</script>
<script>
/**
 * ============================================================================
 * FR AUDIO X78 SERIES - PART 2: UI RENDERING & INTERACTION SYSTEM
 * Melanjutkan langsung dari Part 1 (Core Audio Engine)
 * ============================================================================
 */

// --- UI RENDERING FACTORY ---

function renderConsole() {
    const stripsContainer = document.getElementById('mixer-strips-container');
    const inputMetersContainer = document.getElementById('input-meters');
    const outputMetersContainer = document.getElementById('output-meters');
    const pluginsList = document.getElementById('plugins-list');
    const sendButtons = document.getElementById('send-buttons');

    // 1. Generate Input Meters (Top Panel)
    inputMetersContainer.innerHTML = '';
    for(let i=0; i<CONFIG.numChannels; i+=2) {
        const col = document.createElement('div');
        col.className = 'meter-column';
        col.innerHTML = `
            <div class="meter-bar-bg"><div class="meter-fill" id="meter-in-l-${i}" style="height:0%"></div></div>
            <div class="meter-bar-bg"><div class="meter-fill" id="meter-in-r-${i+1}" style="height:0%"></div></div>
            <div class="meter-labels"><span>${i+1}</span><span>${i+2}</span></div>
        `;
        inputMetersContainer.appendChild(col);
    }

    // 2. Generate Output Meters (Top Panel)
    outputMetersContainer.innerHTML = '';
    ['MAIN L', 'MAIN R', 'AUX 1', 'AUX 2'].forEach((lbl, idx) => {
        const col = document.createElement('div');
        col.className = 'meter-column';
        col.style.flex = '0 0 20px';
        col.innerHTML = `
            <div class="meter-bar-bg" style="height:100%"><div class="meter-fill" id="meter-out-${idx}" style="height:0%"></div></div>
            <div class="meter-labels" style="writing-mode: vertical-rl; transform: rotate(180deg);">${lbl}</div>
        `;
        outputMetersContainer.appendChild(col);
    });

    // 3. Generate Channel Strips
    stripsContainer.innerHTML = '';
    
    // Main Channels (1-16)
    for(let i=0; i<CONFIG.numChannels; i++) {
        const strip = createStripHTML(i, 'channel');
        stripsContainer.appendChild(strip);
    }

    // Group Channels (G1-G4)
    for(let i=0; i<CONFIG.numGroups; i++) {
        const strip = createStripHTML(i, 'group');
        stripsContainer.appendChild(strip);
    }

    // Master Strip
    const masterStrip = document.createElement('div');
    masterStrip.className = 'channel-strip master-strip';
    masterStrip.id = 'strip-master';
    masterStrip.innerHTML = `
        <div class="strip-header">MASTER</div>
        <div class="knobs-row">
            <div class="knob-wrapper"><div class="knob" id="master-dim" onclick="toggleMasterDim()"></div><span class="knob-label">DIM</span></div>
        </div>
        <div class="fader-area">
            <div class="fader-track">
                <div class="fader-thumb" id="fader-master" onmousedown="startFaderDrag(event, 'master')"></div>
            </div>
        </div>
        <div class="buttons-grid">
            <div class="btn-sq btn-mute" id="btn-master-mute" onclick="toggleMasterMute()">MUTE</div>
            <div class="btn-sq" id="btn-master-solo">SOLO</div>
        </div>
        <div style="margin-top:auto; text-align:center; font-size:9px; color:#555;">FR AUDIO X78</div>
    `;
    stripsContainer.appendChild(masterStrip);

    // 4. Populate Plugins List (Visual + Functional Binding)
    pluginsList.innerHTML = '';
    const fxTypes = ['EQ-X78', 'COMP-76', 'DELAY-TAPE', 'REV-HALL'];
    fxTypes.forEach((fx, idx) => {
        const slot = document.createElement('div');
        slot.className = `plugin-slot ${idx === 0 ? 'plugin-active' : ''}`;
        slot.id = `plugin-slot-${idx}`;
        slot.innerHTML = `<span>${fx}</span><span style="color:#555" id="plugin-status-${idx}">ON</span>`;
        slot.onclick = () => togglePlugin(idx);
        pluginsList.appendChild(slot);
    });

    // 5. Populate Send Buttons
    sendButtons.innerHTML = '';
    for(let i=0; i<CONFIG.numAux; i++) {
        const btn = document.createElement('div');
        btn.className = 'btn-sq';
        btn.innerText = `AUX ${i+1}`;
        btn.id = `btn-send-${i}`;
        btn.onclick = () => toggleSendView(i);
        sendButtons.appendChild(btn);
    }

    // Select first channel by default
    selectChannel(0, 'channel');
    
    // Start Metering Animation Loop
    startMeteringLoop();
}

function createStripHTML(index, type) {
    const div = document.createElement('div');
    div.className = 'channel-strip';
    div.id = `strip-${type}-${index}`;
    // Klik pada area strip (bukan tombol/fader) akan memilih channel
    div.onclick = (e) => {
        if(!e.target.closest('.fader-thumb') && !e.target.closest('.knob') && !e.target.closest('.btn-sq')) {
            selectChannel(index, type);
        }
    };

    const label = type === 'channel' ? `CH ${index+1}` : `G${index+1}`;
    
    let knobsHTML = '';
    if(type === 'channel') {
        knobsHTML = `
            <div class="knobs-row">
                <div class="knob-wrapper"><div class="knob" id="knob-pan-${index}" onmousedown="startKnobDrag(event, 'pan', ${index})"></div><span class="knob-label">PAN</span></div>
            </div>
            <div class="knobs-row">
                <div class="knob-wrapper"><div class="knob" id="knob-eqL-${index}" onmousedown="startKnobDrag(event, 'eqLow', ${index})"></div><span class="knob-label">LOW</span></div>
                <div class="knob-wrapper"><div class="knob" id="knob-eqM-${index}" onmousedown="startKnobDrag(event, 'eqMid', ${index})"></div><span class="knob-label">MID</span></div>
                <div class="knob-wrapper"><div class="knob" id="knob-eqH-${index}" onmousedown="startKnobDrag(event, 'eqHigh', ${index})"></div><span class="knob-label">HIGH</span></div>
            </div>
        `;
    } else {
        // Group hanya punya Pan dummy di UI ini
        knobsHTML = `
            <div class="knobs-row">
                <div class="knob-wrapper"><div class="knob" style="opacity:0.5; cursor:default;"></div><span class="knob-label">PAN</span></div>
            </div>
        `;
    }

    div.innerHTML = `
        <div class="strip-header">${label}</div>
        ${knobsHTML}
        <div class="fader-area">
            <div class="fader-track">
                <div class="fader-thumb" id="fader-${type}-${index}" onmousedown="startFaderDrag(event, '${type}', ${index})"></div>
            </div>
        </div>
        <div class="buttons-grid">
            <div class="btn-sq btn-mute" id="btn-mute-${type}-${index}" onclick="toggleMute('${type}', ${index})">MUTE</div>
            <div class="btn-sq btn-solo" id="btn-solo-${type}-${index}" onclick="toggleSolo('${type}', ${index})">SOLO</div>
            <div class="btn-sq" id="btn-rec-${type}-${index}">REC</div>
            <div class="btn-sq active" id="btn-sel-${type}-${index}">SEL</div>
        </div>
    `;
    return div;
}

// --- SELECTION & STATE SYNC LOGIC ---

function selectChannel(index, type='channel') {
    // Update visual selection state
    document.querySelectorAll('.channel-strip').forEach(s => s.classList.remove('selected'));
    const strip = document.getElementById(`strip-${type}-${index}`);
    if(strip) strip.classList.add('selected');

    AppState.selectedChannelIndex = index;
    AppState.selectedType = type;

    // Sync Top Panel Info
    document.getElementById('sel-ch-num').innerText = type === 'channel' ? `CH ${index+1}` : `GRP ${index+1}`;
    document.getElementById('sel-ch-name').innerText = type === 'channel' ? `Input ${index+1}` : `Group ${index+1}`;
    
    updateTopPanelUI();
    drawEQCurve(); // Redraw EQ canvas for selected channel
}

function updateTopPanelUI() {
    const idx = AppState.selectedChannelIndex;
    const type = AppState.selectedType;
    const ch = type === 'channel' ? AppState.channels[idx] : AppState.groups[idx];
    
    if(!ch || !ch.params) return;

    // Update Phase Button State
    const phaseBtn = document.getElementById('sel-phase');
    if(ch.params.phase) phaseBtn.classList.add('active');
    else phaseBtn.classList.remove('active');

    // Update Gain Knob Visual Rotation (-20dB to +20dB mapped to -135deg to +135deg)
    const gainKnob = document.getElementById('sel-gain-knob');
    const gainValLabel = document.getElementById('sel-gain-val');
    if(ch.params.gain !== undefined) {
        const rot = -135 + ((ch.params.gain + 20) / 40) * 270; 
        gainKnob.style.transform = `rotate(${rot}deg)`;
        gainValLabel.innerText = `${ch.params.gain.toFixed(1)} dB`;
    }
}

// --- BUTTON TOGGLE ACTIONS ---

function toggleMute(type, index) {
    const ch = type === 'channel' ? AppState.channels[index] : AppState.groups[index];
    const isMuted = ch.toggleMute();
    
    const btn = document.getElementById(`btn-mute-${type}-${index}`);
    if(isMuted) btn.classList.add('active');
    else btn.classList.remove('active');
}

function toggleSolo(type, index) {
    // Solo Logic: In a real DAW, this mutes all non-soloed channels. 
    // For this implementation, we toggle the visual state and log it.
    const btn = document.getElementById(`btn-solo-${type}-${index}`);
    btn.classList.toggle('active');
    console.log(`Solo toggled for ${type} ${index}`);
}

function togglePhase() {
    const idx = AppState.selectedChannelIndex;
    if(AppState.selectedType !== 'channel') return;
    const ch = AppState.channels[idx];
    const isInv = ch.togglePhase();
    
    const btn = document.getElementById('sel-phase');
    if(isInv) btn.classList.add('active');
    else btn.classList.remove('active');
}

function togglePad() {
    const idx = AppState.selectedChannelIndex;
    if(AppState.selectedType !== 'channel') return;
    const ch = AppState.channels[idx];
    // Toggle between 0dB and -20dB trim
    const newGain = ch.params.gain === 0 ? -20 : 0;
    ch.setGainDB(newGain);
    updateTopPanelUI();
}

function toggleMasterMute() {
    const btn = document.getElementById('btn-master-mute');
    const isMuted = btn.classList.contains('active');
    
    if(isMuted) {
        AppState.masterGain.gain.setTargetAtTime(0.794, AppState.audioCtx.currentTime, 0.01);
        btn.classList.remove('active');
    } else {
        AppState.masterGain.gain.setTargetAtTime(0, AppState.audioCtx.currentTime, 0.01);
        btn.classList.add('active');
    }
}

function toggleMasterDim() {
    const knob = document.getElementById('master-dim');
    const isDimmed = knob.classList.contains('active');
    
    if(isDimmed) {
        AppState.masterGain.gain.setTargetAtTime(0.794, AppState.audioCtx.currentTime, 0.01);
        knob.classList.remove('active');
    } else {
        AppState.masterGain.gain.setTargetAtTime(0.2, AppState.audioCtx.currentTime, 0.01); // -14dB dim
        knob.classList.add('active');
    }
}

function togglePlugin(idx) {
    const slot = document.getElementById(`plugin-slot-${idx}`);
    const status = document.getElementById(`plugin-status-${idx}`);
    const isActive = slot.classList.contains('plugin-active');
    
    if(isActive) {
        slot.classList.remove('plugin-active');
        status.innerText = 'OFF';
        status.style.color = '#555';
    } else {
        slot.classList.add('plugin-active');
        status.innerText = 'ON';
        status.style.color = '#fff';
    }
}

function toggleSendView(auxIndex) {
    // Highlight the selected aux button
    for(let i=0; i<CONFIG.numAux; i++) {
        document.getElementById(`btn-send-${i}`).classList.remove('active');
    }
    document.getElementById(`btn-send-${auxIndex}`).classList.add('active');
    console.log(`Viewing sends for AUX ${auxIndex + 1}`);
}

// --- DRAG INTERACTION SYSTEM (FADERS & KNOBS) ---

window.addEventListener('mousemove', (e) => {
    if(!AppState.isDragging || !AppState.dragTarget) return;
    
    const deltaY = AppState.dragTarget.startY - e.clientY; // Up movement is positive
    
    if(AppState.dragTarget.type === 'fader') {
        // Fader sensitivity: 0.15 dB per pixel
        let newVal = AppState.dragTarget.startVal + (deltaY * 0.15);
        newVal = Math.max(CONFIG.faderMinDB, Math.min(CONFIG.faderMaxDB, newVal));
        
        const { stripType, index } = AppState.dragTarget;
        
        if(stripType === 'master') {
            const linear = Math.pow(10, newVal / 20);
            AppState.masterGain.gain.setTargetAtTime(linear, AppState.audioCtx.currentTime, 0.01);
            AppState.masterParams = { fader: newVal };
            updateFaderVisual('master', null, newVal);
        } else {
            const ch = stripType === 'channel' ? AppState.channels[index] : AppState.groups[index];
            ch.setFaderDB(newVal);
            updateFaderVisual(stripType, index, newVal);
        }
    } 
    else if (AppState.dragTarget.type === 'knob') {
        // Knob sensitivity: 0.5 units per pixel
        const { param, index } = AppState.dragTarget;
        let newVal = AppState.dragTarget.startVal + (deltaY * 0.5);
        
        // Clamp values based on parameter type
        if(param === 'pan') newVal = Math.max(-1, Math.min(1, newVal));
        else if(param.startsWith('eq')) newVal = Math.max(-15, Math.min(15, newVal));
        else if(param === 'gain') newVal = Math.max(-20, Math.min(20, newVal));
        
        if(index !== undefined && AppState.channels[index]) {
            if(param === 'pan') AppState.channels[index].setPan(newVal);
            else if(param.startsWith('eq')) AppState.channels[index].setEQ(param, newVal);
            else if(param === 'gain') AppState.channels[index].setGainDB(newVal);
            
            updateKnobVisual(param, index, newVal);
            
            // If editing selected channel's gain, update top panel live
            if(param === 'gain' && AppState.selectedChannelIndex === index && AppState.selectedType === 'channel') {
                updateTopPanelUI();
            }
            // Redraw EQ curve if EQ knobs are moved on selected channel
            if(param.startsWith('eq') && AppState.selectedChannelIndex === index && AppState.selectedType === 'channel') {
                drawEQCurve();
            }
        } else if (param === 'gain' && AppState.selectedType === 'channel') {
            AppState.channels[AppState.selectedChannelIndex].setGainDB(newVal);
            updateTopPanelUI();
        }
    }
});

window.addEventListener('mouseup', () => {
    AppState.isDragging = false;
    AppState.dragTarget = null;
    document.body.style.cursor = 'default';
});

function startFaderDrag(e, type, index) {
    e.preventDefault();
    e.stopPropagation();
    AppState.isDragging = true;
    AppState.dragTarget = { type: 'fader', stripType: type, index: index, startY: e.clientY };
    
    let currentDB = -2;
    if(type === 'master') currentDB = AppState.masterParams ? AppState.masterParams.fader : -2;
    else if(type === 'channel') currentDB = AppState.channels[index].params.fader;
    else if(type === 'group') currentDB = AppState.groups[index].params.fader;
    
    AppState.dragTarget.startVal = currentDB;
    document.body.style.cursor = 'ns-resize';
}

function startKnobDrag(e, param, index) {
    e.preventDefault();
    e.stopPropagation();
    AppState.isDragging = true;
    AppState.dragTarget = { type: 'knob', param: param, index: index, startY: e.clientY };
    
    let currentVal = 0;
    if(index !== undefined && AppState.channels[index]) {
        currentVal = AppState.channels[index].params[param];
    } else if (param === 'gain' && AppState.selectedType === 'channel') {
        currentVal = AppState.channels[AppState.selectedChannelIndex].params.gain;
    }
    
    AppState.dragTarget.startVal = currentVal;
    document.body.style.cursor = 'ns-resize';
}

// --- VISUAL UPDATE HELPERS ---

function updateFaderVisual(type, index, db) {
    // Map dB range (-60 to +12) to percentage (0% to 100%)
    const percent = ((db - CONFIG.faderMinDB) / (CONFIG.faderMaxDB - CONFIG.faderMinDB)) * 100;
    const clampedPercent = Math.max(0, Math.min(100, percent));
    
    const thumbId = type === 'master' ? 'fader-master' : `fader-${type}-${index}`;
    const thumb = document.getElementById(thumbId);
    if(thumb) {
        thumb.style.bottom = `${clampedPercent}%`;
    }
}

function updateKnobVisual(param, index, val) {
    let rot = 0;
    if(param === 'pan') rot = val * 135; 
    else if(param.startsWith('eq')) rot = (val / 15) * 135; 
    else if(param === 'gain') rot = ((val + 20) / 40) * 270 - 135;
    
    let actualId = '';
    if(param === 'gain') actualId = 'sel-gain-knob';
    else if(param === 'pan') actualId = `knob-pan-${index}`;
    else if(param === 'eqLow') actualId = `knob-eqL-${index}`;
    else if(param === 'eqMid') actualId = `knob-eqM-${index}`;
    else if(param === 'eqHigh') actualId = `knob-eqH-${index}`;
    
    const knob = document.getElementById(actualId);
    if(knob) knob.style.transform = `rotate(${rot}deg)`;
}

// --- REAL-TIME METERING LOOP ---

function startMeteringLoop() {
    function loop() {
        // Update Input Meters (Channels 1-16)
        AppState.channels.forEach((ch, i) => {
            const val = ch.getMeterData();
            const pct = Math.min(100, (val / 255) * 100 * 1.5); 
            
            const lMeter = document.getElementById(`meter-in-l-${i}`);
            const rMeter = document.getElementById(`meter-in-r-${i}`);
            if(lMeter) lMeter.style.height = `${pct}%`;
            if(rMeter) rMeter.style.height = `${pct}%`;
        });

        // Update Master Output Meters
        if(AppState.analyserMain) {
            const data = new Uint8Array(AppState.analyserMain.frequencyBinCount);
            AppState.analyserMain.getByteFrequencyData(data);
            let sum = 0;
            for(let k=0; k<data.length; k++) sum += data[k];
            const avg = sum / data.length;
            const pct = Math.min(100, (avg / 255) * 100 * 1.2);
            
            const mL = document.getElementById('meter-out-0');
            const mR = document.getElementById('meter-out-1');
            if(mL) mL.style.height = `${pct}%`;
            if(mR) mR.style.height = `${pct}%`;
        }

        AppState.animationFrameId = requestAnimationFrame(loop);
    }
    loop();
}

// --- YOUTUBE INTEGRATION CORE ---
// Class ini menangani routing audio dari iframe YouTube ke dalam Web Audio Graph

class YouTubeAudioRouter {
    constructor(audioCtx, destinationNode) {
        this.ctx = audioCtx;
        this.dest = destinationNode;
        this.mediaElementSource = null;
        this.gainNode = audioCtx.createGain();
        this.gainNode.gain.value = 0.794; // Default -2dB
        this.isActive = false;
        
        // Connect YouTube gain to master bus
        this.gainNode.connect(this.dest);
    }

    async captureFromElement(videoElement) {
        try {
            // Create MediaElementSource from the HTML5 video element inside YouTube iframe
            // NOTE: Due to CORS, direct capture from youtube.com iframes is restricted.
            // This implementation assumes a proxied/embedded video element or local file.
            // For production YouTube integration, use the IFrame API + external audio source.
            
            if(this.mediaElementSource) {
                this.mediaElementSource.disconnect();
            }
            
            this.mediaElementSource = this.ctx.createMediaElementSource(videoElement);
            this.mediaElementSource.connect(this.gainNode);
            this.isActive = true;
            console.log("YouTube/Video Audio captured successfully");
        } catch(e) {
            console.error("Failed to capture video audio (CORS restriction):", e);
            alert("Cannot capture YouTube audio directly due to browser security. Use a local file or CORS-proxy.");
        }
    }

    setVolume(db) {
        const linear = db <= -60 ? 0 : Math.pow(10, db / 20);
        this.gainNode.gain.setTargetAtTime(linear, this.ctx.currentTime, 0.01);
    }

    mute(isMuted) {
        this.gainNode.gain.setTargetAtTime(isMuted ? 0 : 0.794, this.ctx.currentTime, 0.01);
    }
}

const originalInit = window.initializeAudioEngine;
window.initializeAudioEngine = function() {
    originalInit();
    ytRouter = new YouTubeAudioRouter(AppState.audioCtx, AppState.masterGain);
    
    // Render UI after engine is fully ready
    renderConsole();
};

<script>

// --- DYNAMIC EQ CANVAS VISUALIZATION ---

function drawEQCurve() {
    const canvas = document.getElementById('eq-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const width = canvas.width = canvas.offsetWidth;
    const height = canvas.height = canvas.offsetHeight;
    
    // Clear canvas
    ctx.fillStyle = '#0a0c0e';
    ctx.fillRect(0, 0, width, height);
    
    // Draw grid lines
    ctx.strokeStyle = '#1f2124';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<5; i++) {
        const y = (height / 4) * i;
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
    }
    for(let i=0; i<10; i++) {
        const x = (width / 9) * i;
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
    }
    ctx.stroke();
    
    // Get current EQ values from selected channel
    const idx = AppState.selectedChannelIndex;
    const type = AppState.selectedType;
    let eqLow = 0, eqMid = 0, eqHigh = 0;
    
    if(type === 'channel' && AppState.channels[idx]) {
        eqLow = AppState.channels[idx].params.eqLow;
        eqMid = AppState.channels[idx].params.eqMid;
        eqHigh = AppState.channels[idx].params.eqHigh;
    }
    
    // Draw EQ Curve (Simulated Biquad Response)
    ctx.beginPath();
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(59, 130, 246, 0.5)';
    ctx.shadowBlur = 4;
    
    const centerX = width / 2;
    const centerY = height / 2;
    
    // Low Shelf (Left side)
    ctx.moveTo(0, centerY - (eqLow / 15) * (height/3));
    ctx.bezierCurveTo(width * 0.15, centerY - (eqLow / 15) * (height/3), 
                      width * 0.25, centerY + (eqMid / 15) * (height/4), 
                      centerX, centerY + (eqMid / 15) * (height/4));
                      
    // Peaking Mid (Center)
    ctx.bezierCurveTo(width * 0.55, centerY + (eqMid / 15) * (height/4),
                      width * 0.75, centerY - (eqHigh / 15) * (height/3),
                      width, centerY - (eqHigh / 15) * (height/3));
                      
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // Draw frequency labels
    ctx.fillStyle = '#555';
    ctx.font = '8px sans-serif';
    ctx.fillText('100Hz', width * 0.1, height - 5);
    ctx.fillText('1kHz', width * 0.45, height - 5);
    ctx.fillText('10kHz', width * 0.8, height - 5);
}

// --- MATRIX ROUTING SYSTEM ---
// Implements the crosspoint switching matrix seen in the blueprint top-right

const MatrixState = {
    inputs: 16,
    outputs: 8, // O1, O2, A1-A4, G1-G2
    crosspoints: {} // Format: "in-out": boolean
};

function initMatrixRouting() {
    const container = document.createElement('div');
    container.className = 'panel-box';
    container.style.gridColumn = 'span 1';
    container.innerHTML = '<div class="panel-header">Matrix Routing</div>';
    
    const grid = document.createElement('div');
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
    grid.style.gap = '2px';
    grid.style.marginTop = '8px';
    
    // Create header row
    const headers = ['O1','O2','A1','A2','A3','A4','G1','G2'];
    headers.forEach(h => {
        const lbl = document.createElement('div');
        lbl.innerText = h;
        lbl.style.fontSize = '7px';
        lbl.style.textAlign = 'center';
        lbl.style.color = '#777';
        grid.appendChild(lbl);
    });
    
    // Create 16x8 crosspoint buttons
    for(let i=0; i<MatrixState.inputs; i++) {
        for(let j=0; j<MatrixState.outputs; j++) {
            const btn = document.createElement('div');
            btn.className = 'btn-sq';
            btn.style.padding = '2px 0';
            btn.style.fontSize = '7px';
            btn.id = `matrix-${i}-${j}`;
            btn.onclick = () => toggleMatrixCrosspoint(i, j, btn);
            
            // Default routing: Ch 1-4 -> O1/O2, Ch 5-8 -> A1/A2
            if((i < 4 && j < 2) || (i >= 4 && i < 8 && j >= 2 && j < 4)) {
                btn.classList.add('active');
                MatrixState.crosspoints[`${i}-${j}`] = true;
            } else {
                MatrixState.crosspoints[`${i}-${j}`] = false;
            }
            
            grid.appendChild(btn);
        }
    }
    
    container.appendChild(grid);
    
    // Insert into top section (replace plugins list area or add new column)
    const topSection = document.querySelector('.top-section');
    // Adjust grid to accommodate matrix if needed, or append to existing panel
    document.getElementById('plugins-list').parentElement.appendChild(container);
}

function toggleMatrixCrosspoint(inputIdx, outputIdx, btnElement) {
    const key = `${inputIdx}-${outputIdx}`;
    MatrixState.crosspoints[key] = !MatrixState.crosspoints[key];
    
    if(MatrixState.crosspoints[key]) {
        btnElement.classList.add('active');
        // Apply routing logic here in full implementation
        console.log(`Routed CH${inputIdx+1} -> ${['O1','O2','A1','A2','A3','A4','G1','G2'][outputIdx]}`);
    } else {
        btnElement.classList.remove('active');
    }
}

// --- ADVANCED DSP EFFECTS ENGINE ---
// Implements actual Web Audio processing for Delay and Reverb plugins

class DSPEffectsEngine {
    constructor(audioCtx) {
        this.ctx = audioCtx;
        this.effects = {};
        this.initDelayEffect();
        this.initReverbEffect();
    }
    
    initDelayEffect() {
        // Tape Delay Simulation: Delay + Feedback + Lowpass Filter
        this.effects.delay = {
            node: this.ctx.createDelay(5.0),
            feedback: this.ctx.createGain(),
            filter: this.ctx.createBiquadFilter(),
            wet: this.ctx.createGain(),
            dry: this.ctx.createGain()
        };
        
        this.effects.delay.node.delayTime.value = 0.3; // 300ms default
        this.effects.delay.feedback.gain.value = 0.4;
        this.effects.delay.filter.type = 'lowpass';
        this.effects.delay.filter.frequency.value = 2000; // Tape warmth simulation
        this.effects.delay.wet.gain.value = 0.5;
        this.effects.delay.dry.gain.value = 0.5;
        
        // Feedback loop: Delay -> Filter -> Feedback -> Delay
        this.effects.delay.node.connect(this.effects.delay.filter);
        this.effects.delay.filter.connect(this.effects.delay.feedback);
        this.effects.delay.feedback.connect(this.effects.delay.node);
    }
    
    initReverbEffect() {
        // Algorithmic Reverb using multiple delays and allpass filters
        this.effects.reverb = {
            input: this.ctx.createGain(),
            delays: [],
            gains: [],
            wet: this.ctx.createGain(),
            dry: this.ctx.createGain()
        };
        
        // Create 6-tap reverb tank
        const tapTimes = [0.023, 0.041, 0.067, 0.089, 0.113, 0.147];
        const tapGains = [0.7, 0.6, 0.5, 0.4, 0.3, 0.2];
        
        tapTimes.forEach((time, i) => {
            const d = this.ctx.createDelay(1.0);
            const g = this.ctx.createGain();
            d.delayTime.value = time;
            g.gain.value = tapGains[i];
            this.effects.reverb.delays.push(d);
            this.effects.reverb.gains.push(g);
            
            this.effects.reverb.input.connect(d);
            d.connect(g);
        });
        
        this.effects.reverb.wet.gain.value = 0.4;
        this.effects.reverb.dry.gain.value = 0.6;
    }
    
    // Apply effect to a channel's signal chain
    applyEffect(channel, effectType) {
        if(effectType === 'DELAY-TAPE') {
            // Disconnect fader from mute temporarily
            channel.faderGain.disconnect();
            
            // Route through delay parallel processing
            channel.faderGain.connect(this.effects.delay.dry);
            channel.faderGain.connect(this.effects.delay.node);
            
            this.effects.delay.dry.connect(channel.muteGain);
            this.effects.delay.node.connect(this.effects.delay.wet);
            this.effects.delay.wet.connect(channel.muteGain);
            
        } else if (effectType === 'REV-HALL') {
            channel.faderGain.disconnect();
            
            channel.faderGain.connect(this.effects.reverb.dry);
            channel.faderGain.connect(this.effects.reverb.input);
            
            this.effects.reverb.dry.connect(channel.muteGain);
            
            // Sum all reverb taps to wet output
            this.effects.reverb.gains.forEach(g => {
                g.connect(this.effects.reverb.wet);
            });
            this.effects.reverb.wet.connect(channel.muteGain);
        }
    }
    
    // Bypass effect (restore direct connection)
    bypassEffect(channel) {
        // Clean up any existing effect connections
        try { channel.faderGain.disconnect(); } catch(e){}
        try { this.effects.delay.dry.disconnect(); } catch(e){}
        try { this.effects.delay.wet.disconnect(); } catch(e){}
        try { this.effects.reverb.dry.disconnect(); } catch(e){}
        try { this.effects.reverb.wet.disconnect(); } catch(e){}
        
        // Restore direct path
        channel.faderGain.connect(channel.muteGain);
    }
}

let dspEngine = null;

// Override plugin toggle to use real DSP
const originalTogglePlugin = window.togglePlugin;
window.togglePlugin = function(idx) {
    originalTogglePlugin(idx);
    
    // Apply/bypass actual DSP based on plugin slot
    const slot = document.getElementById(`plugin-slot-${idx}`);
    const isActive = slot.classList.contains('plugin-active');
    const ch = AppState.channels[AppState.selectedChannelIndex];
    
    if(!ch || AppState.selectedType !== 'channel') return;
    
    const fxTypes = ['EQ-X78', 'COMP-76', 'DELAY-TAPE', 'REV-HALL'];
    const selectedFx = fxTypes[idx];
    
    if(isActive && (selectedFx === 'DELAY-TAPE' || selectedFx === 'REV-HALL')) {
        dspEngine.applyEffect(ch, selectedFx);
    } else {
        dspEngine.bypassEffect(ch);
    }
};

// --- PRESET MANAGEMENT SYSTEM ---
// Save/Load mixer state to localStorage

const PresetManager = {
    savePreset(name) {
        const presetData = {
            name: name,
            timestamp: Date.now(),
            channels: AppState.channels.map(ch => ({
                gain: ch.params.gain,
                pan: ch.params.pan,
                eqLow: ch.params.eqLow,
                eqMid: ch.params.eqMid,
                eqHigh: ch.params.eqHigh,
                fader: ch.params.fader,
                mute: ch.params.mute,
                phase: ch.params.phase
            })),
            master: {
                fader: AppState.masterParams ? AppState.masterParams.fader : -2,
                mute: document.getElementById('btn-master-mute').classList.contains('active')
            }
        };
        
        localStorage.setItem(`frx78_preset_${name}`, JSON.stringify(presetData));
        alert(`Preset "${name}" saved successfully!`);
    },
    
    loadPreset(name) {
        const data = localStorage.getItem(`frx78_preset_${name}`);
        if(!data) {
            alert(`Preset "${name}" not found!`);
            return;
        }
        
        const preset = JSON.parse(data);
        
        // Restore channel states
        preset.channels.forEach((chData, i) => {
            const ch = AppState.channels[i];
            ch.setGainDB(chData.gain);
            ch.setPan(chData.pan);
            ch.setEQ('eqLow', chData.eqLow);
            ch.setEQ('eqMid', chData.eqMid);
            ch.setEQ('eqHigh', chData.eqHigh);
            ch.setFaderDB(chData.fader);
            
            // Update UI buttons
            const muteBtn = document.getElementById(`btn-mute-channel-${i}`);
            if(chData.mute && !muteBtn.classList.contains('active')) muteBtn.click();
            else if(!chData.mute && muteBtn.classList.contains('active')) muteBtn.click();
            
            // Update fader visual
            updateFaderVisual('channel', i, chData.fader);
            updateKnobVisual('pan', i, chData.pan);
            updateKnobVisual('eqLow', i, chData.eqLow);
            updateKnobVisual('eqMid', i, chData.eqMid);
            updateKnobVisual('eqHigh', i, chData.eqHigh);
        });
        
        // Restore master
        const masterLinear = Math.pow(10, preset.master.fader / 20);
        AppState.masterGain.gain.setTargetAtTime(masterLinear, AppState.audioCtx.currentTime, 0.01);
        updateFaderVisual('master', null, preset.master.fader);
        
        if(preset.master.mute) {
            const mBtn = document.getElementById('btn-master-mute');
            if(!mBtn.classList.contains('active')) mBtn.click();
        }
        
        alert(`Preset "${name}" loaded!`);
    },
    
    listPresets() {
        const presets = [];
        for(let i=0; i<localStorage.length; i++) {
            const key = localStorage.key(i);
            if(key.startsWith('frx78_preset_')) {
                presets.push(key.replace('frx78_preset_', ''));
            }
        }
        return presets;
    }
};

// Add preset controls to UI dynamically
function addPresetControls() {
    const topSection = document.querySelector('.top-section');
    const presetPanel = document.createElement('div');
    presetPanel.className = 'panel-box';
    presetPanel.innerHTML = `
        <div class="panel-header">Preset Manager</div>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <input type="text" id="preset-name" placeholder="Preset Name" 
                   style="background:#1e1f22; border:1px solid #333; color:white; 
                          padding:4px; border-radius:3px; flex:1; font-size:10px;">
            <button class="btn-sq" onclick="PresetManager.savePreset(document.getElementById('preset-name').value)">SAVE</button>
        </div>
        <select id="preset-select" style="width:100%; margin-top:5px; background:#1e1f22; 
               border:1px solid #333; color:white; padding:4px; border-radius:3px; font-size:10px;"
               onchange="PresetManager.loadPreset(this.value)">
            <option value="">-- Load Preset --</option>
        </select>
    `;
    topSection.appendChild(presetPanel);
    
    // Populate dropdown
    const select = document.getElementById('preset-select');
    PresetManager.listPresets().forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.innerText = name;
        select.appendChild(opt);
    });
}
