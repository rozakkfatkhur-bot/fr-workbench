<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>FR-AUDIO Qu-32 PHYSICAL REPLICA v2.0</title>
    <style>
        :root {
            --bg-body: #0d0f12;
            --bg-mixer: #15191e;
            --bg-strip: #1a1f26;
            --ah-blue: #0097b2; /* Biru khas Allen & Heath */
            --ah-green: #00b359; /* Hijau knop & lampu */
            --ah-red: #cc0033;
        }

        body {
            background-color: var(--bg-body);
            color: #d1d7e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            user-select: none;
            box-sizing: border-box;
        }

        /* Top Panel - Dibuat Mirip Layar Utama & Knop Preamp Atas */
        .top-panel {
            display: grid;
            grid-template-columns: 1.51fr 2fr 1.2fr;
            gap: 12px;
            background: #111418;
            border-top: 4px solid var(--ah-blue);
            border-bottom: 2px solid #222830;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .sys-title h1 {
            margin: 0; font-size: 22px; color: #fff; letter-spacing: 1px; font-weight: 700;
        }
        .sys-title h1 span { color: var(--ah-blue); }
        .sys-title p { margin: 4px 0 0 0; font-size: 10px; color: #717b8a; font-family: monospace; }

        .mixer-screen {
            background: #081c24;
            border: 2px solid #123847;
            border-radius: 4px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #00ffcc;
            box-shadow: inset 0 0 12px rgba(0,255,200,0.2);
            line-height: 1.5;
        }

        .bank-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
            justify-content: flex-end;
        }
        .bank-btn {
            background: #202630;
            color: #9aa5b5;
            border: 1px solid #313b4a;
            padding: 8px 10px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
        }
        .bank-btn.active {
            background: var(--ah-blue);
            color: #fff;
            border-color: #00bfe0;
            box-shadow: 0 0 8px rgba(0,151,178,0.5);
        }

        /* Mixer Surface - Hitam Garis Biru */
        .mixer-surface {
            background-color: var(--bg-mixer);
            border: 4px solid #1c2129;
            border-radius: 8px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(8, 1fr) 1.2fr;
            gap: 6px;
            overflow-x: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        /* Channel Strip - Sesuai Layout Fisik Asli */
        .channel-strip {
            background: var(--bg-strip);
            border: 1px solid #252d37;
            border-top: 3px solid var(--ah-blue);
            border-radius: 4px;
            padding: 8px 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .channel-strip.master-strip {
            background: #1f252e;
            border-top: 3px solid var(--ah-green);
            border-left: 2px dashed #313b4a;
            padding-left: 6px;
        }

        .ch-num {
            font-size: 10px; font-weight: bold; color: #8c9ba5; margin-bottom: 6px;
            font-family: monospace;
        }

        /* Simulasi Knop Putar Fisik (Gain/Pan) */
        .knob-pot {
            width: 22px; height: 22px;
            background: radial-gradient(circle, #333 30%, #111 80%);
            border: 2px solid var(--ah-green);
            border-radius: 50%;
            margin-bottom: 8px;
            position: relative;
        }
        .knob-pot::after {
            content: '';
            position: absolute;
            width: 2px; height: 8px;
            background: #fff;
            top: 2px; left: 10px;
        }
        .master-strip .knob-pot {
            border-color: var(--ah-blue);
        }

        /* Tombol Kotak Khas Qu-32 */
        .btn-ch {
            width: 85%; padding: 5px 0; margin: 2px 0;
            font-size: 9px; font-weight: bold; border-radius: 2px; 
            border: 1px solid #111; cursor: pointer;
            text-align: center; font-family: sans-serif;
        }
        .btn-sel { background: #2e3745; color: #a4b3c6; }
        .btn-sel.active { background: var(--ah-blue); color: #fff; box-shadow: 0 0 10px var(--ah-blue); }
        .btn-mute { background: #3a1c22; color: #c6a4a8; }
        .btn-mute.muted { background: var(--ah-red); color: #fff; box-shadow: 0 0 10px var(--ah-red); }

        /* VU Meter Kotak Kecil Menempel */
        .vu-meter {
            width: 5px; height: 55px; background: #0b0d10;
            margin: 8px 0; border-radius: 1px;
            display: flex; flex-direction: column-reverse; gap: 1px;
            padding: 1px;
        }
        .vu-segment { width: 100%; height: 4px; background: #1a1d24; transition: 0.05s; }
        .vu-segment.green { background: #00ff66; }
        .vu-segment.yellow { background: #ffcc00; }
        .vu-segment.red { background: #ff3300; }

        /* Jalur Fader & Kepala Fader Perak */
        .fader-wrapper {
            height: 220px; display: flex; align-items: center; justify-content: center; position: relative; margin: 5px 0;
            width: 100%;
            background: linear-gradient(90deg, transparent 48%, #000 48%, #000 52%, transparent 52%);
        }
        .fader-track-label {
            position: absolute; height: 100%; display: flex; flex-direction: column; justify-content: space-between;
            left: 2px; font-size: 7px; color: #4f5a66; font-family: monospace; pointer-events: none;
        }

        input[type=range].v-slider {
            -webkit-appearance: none;
            transform: rotate(-90deg);
            width: 190px; height: 4px;
            background: transparent;
            outline: none; margin: 0; cursor: pointer;
        }
        
        /* Desain Kepala Fader Chrome/Perak Fisik */
        input[type=range].v-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 32px; border-radius: 2px;
            background: linear-gradient(180deg, #d8dee6 0%, #adb5bd 40%, #6c757d 50%, #adb5bd 60%, #e9ecef 100%);
            border: 1px solid #495057; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.6), inset 0 1px 0 #fff;
            cursor: pointer;
            position: relative;
        }

        .db-readout {
            font-size: 10px; font-family: monospace; color: #8c9ba5; margin-top: 4px;
            background: #090b0e; padding: 1px 4px; border-radius: 2px; min-width: 35px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="top-panel">
        <div class="sys-title">
            <h1>FR-AUDIO <span>Qu-32</span></h1>
            <p>PHYSICAL REPLICA ENGINE v2.0</p>
        </div>
        <div class="mixer-screen" id="dispScreen">
            [SYSTEM LIVE] - LAYER: CH 01 - 08<br>
            CH_MODE: LINE INPUT READY<br>
            SELECTED: NONE
        </div>
        <div class="bank-container">
            <button class="bank-btn active" id="btn-b1" onclick="switchBank(1)">CH 1-8</button>
            <button class="bank-btn" id="btn-b2" onclick="switchBank(2)">CH 9-16</button>
            <button class="bank-btn" id="btn-b3" onclick="switchBank(3)">CH 17-24</button>
            <button class="bank-btn" id="btn-b4" onclick="switchBank(4)">CH 25-32</button>
        </div>
    </div>

    <div class="mixer-surface" id="mixerSurface">
        <!-- 8 Strips rendered by JS -->
        
        <!-- Fixed Master Strip LR -->
        <div class="channel-strip master-strip" style="grid-column: 9;">
            <div class="ch-num" style="color: var(--ah-green);">MASTER LR</div>
            <div class="knob-pot"></div>
            <button class="btn-ch btn-sel" id="sel-MASTER" onclick="selectCh('MASTER')">SEL</button>
            <button class="btn-ch btn-mute" id="mute-MASTER" onclick="toggleMute('MASTER')">MUTE</button>
            <div class="vu-meter" id="vu-MASTER"></div>
            <div class="fader-wrapper">
                <input type="range" class="v-slider" id="slide-MASTER" min="0" max="100" value="75" oninput="updateFader('MASTER', this.value)">
            </div>
            <div class="db-readout" id="db-MASTER" style="color: var(--ah-green);">0.0dB</div>
        </div>
    </div>

    <script>
        let currentBank = 1;
        let selectedChannel = localStorage.getItem('fr_selected_v2') || "NONE";
        let channelData = JSON.parse(localStorage.getItem('fr_mixer_data_v2'));

        if (!channelData) {
            channelData = {};
            for(let i=1; i<=32; i++) {
                channelData[i] = { gain: 75, muted: false };
            }
            channelData['MASTER'] = { gain: 75, muted: false };
            saveMemory();
        }

        function saveMemory() {
            localStorage.setItem('fr_mixer_data_v2', JSON.stringify(channelData));
            localStorage.setItem('fr_selected_v2', selectedChannel);
        }

        function createVuSegments(elementId) {
            const vu = document.getElementById(elementId);
            if (!vu) return;
            vu.innerHTML = '';
            for(let i=0; i<12; i++) {
                const seg = document.createElement('div');
                seg.className = 'vu-segment ' + (i > 10 ? 'red' : i > 8 ? 'yellow' : 'green');
                vu.appendChild(seg);
            }
        }

        function renderBank() {
            const surface = document.getElementById('mixerSurface');
            const strips = surface.querySelectorAll('.channel-strip:not(.master-strip)');
            strips.forEach(s => s.remove());

            const startCh = (currentBank - 1) * 8 + 1;
            const endCh = startCh + 7;

            for(let i = startCh; i <= endCh; i++) {
                const data = channelData[i];
                const isSel = (selectedChannel == i);
                const strip = document.createElement('div');
                strip.className = `channel-strip`;
                strip.innerHTML = `
                    <div class="ch-num">CH${String(i).padStart(2, '0')}</div>
                    <div class="knob-pot"></div>
                    <button class="btn-ch btn-sel ${isSel ? 'active' : ''}" id="sel-${i}" onclick="selectCh(${i})">SEL</button>
                    <button class="btn-ch btn-mute ${data.muted ? 'muted' : ''}" id="mute-${i}" onclick="toggleMute(${i})">MUTE</button>
                    <div class="vu-meter" id="vu-${i}"></div>
                    <div class="fader-wrapper">
                        <div class="fader-track-label"><span>+10</span><span>5</span><span>0</span><span>-5</span><span>-10</span><span>-20</span><span>-inf</span></div>
                        <input type="range" class="v-slider" min="0" max="100" value="${data.gain}" oninput="updateFader(${i}, this.value)">
                    </div>
                    <div class="db-readout" id="db-${i}">${valToDb(data.gain)}</div>
                `;
                surface.insertBefore(strip, surface.lastElementChild);
                createVuSegments(`vu-${i}`);
            }

            document.getElementById('mute-MASTER').className = `btn-ch btn-mute ${channelData['MASTER'].muted ? 'muted' : ''}`;
            document.getElementById('sel-MASTER').className = `btn-ch btn-sel ${selectedChannel == 'MASTER' ? 'active' : ''}`;
            document.getElementById(`slide-MASTER`).value = channelData['MASTER'].gain;
            document.getElementById(`db-MASTER`).innerText = valToDb(channelData['MASTER'].gain);

            createVuSegments('vu-MASTER');
            updateScreen();
        }

        function switchBank(bankNum) {
            currentBank = bankNum;
            document.querySelectorAll('.bank-btn').forEach((b, idx) => {
                b.classList.toggle('active', (idx + 1) === bankNum);
            });
            renderBank();
        }

        function updateFader(ch, val) {
            channelData[ch].gain = parseInt(val);
            document.getElementById(`db-${ch}`).innerText = valToDb(val);
            saveMemory();
        }

        function toggleMute(ch) {
            channelData[ch].muted = !channelData[ch].muted;
            const btn = document.getElementById(`mute-${ch}`);
            if(btn) btn.classList.toggle('muted');
            saveMemory();
        }

        function selectCh(ch) {
            selectedChannel = ch;
            saveMemory();
            renderBank();
        }

        function valToDb(val) {
            if(val == 0) return "-INF";
            let db = (val - 75) / 2.5;
            return (db > 0 ? "+" : "") + db.toFixed(1) + "dB";
        }

        function updateScreen() {
            const start = (currentBank - 1) * 8 + 1;
            const end = start + 7;
            let displaySel = (selectedChannel === "NONE") ? "NONE" : (selectedChannel === "MASTER") ? "MASTER LR" : `CH ${String(selectedChannel).padStart(2,'0')}`;
            
            document.getElementById('dispScreen').innerHTML = `
                [SYSTEM OPERATIONAL]<br>
                ACTIVE LAYER: CH ${String(start).padStart(2,'0')}-${String(end).padStart(2,'0')}<br>
                SELECTED CHANNEL: ${displaySel}
            `;
        }

        // VU Meter Simulation
        setInterval(() => {
            const start = (currentBank - 1) * 8 + 1;
            const end = start + 7;
            
            for(let i = start; i <= end; i++) {
                if(channelData[i].muted) {
                    animateVu(`vu-${i}`, -1);
                    continue;
                }
                animateVu(`vu-${i}`, Math.floor(Math.random() * 10));
            }
            if(!channelData['MASTER'].muted) {
                animateVu('vu-MASTER', Math.floor(Math.random() * 11));
            } else {
                animateVu('vu-MASTER', -1);
            }
        }, 100);

        function animateVu(elementId, level) {
            const vu = document.getElementById(elementId);
            if(!vu) return;
            const segments = vu.children;
            for(let i=0; i<segments.length; i++) {
                segments[i].style.opacity = (i <= level) ? '1' : '0.12';
            }
        }

        renderBank();
    </script>
</body>
</html>
