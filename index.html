<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FR-AUDIO LAB v18.0 OMEGA - FULL SUITE</title>
    <style>
        :root { --bg: #05070a; --panel: #0d1117; --accent: #00d4ff; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .grid-main { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .panel { background: var(--panel); border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
        select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; background: #161b22; color: white; border: 1px solid #30363d; }
        button:hover { background: var(--accent); color: black; cursor: pointer; }
        #ai-output { background: #000; padding: 15px; border-left: 4px solid var(--accent); min-height: 200px; }
        .badge { font-size: 10px; background: #238636; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

<h1>FR-AUDIO LAB v18.0 OMEGA</h1>

<div class="grid-main">
    <div class="panel">
        <h3>Database & Modul</h3>
        <select id="mainCat" onchange="loadSubCat()">
            <option value="Amplifier">Class Amplifier</option>
            <option value="Transistor">Transistor & MOSFET</option>
            <option value="TOA">Driver TOA</option>
        </select>
        <select id="subCat" onchange="displayData()"></select>
        <hr>
        <h3>Mode Cerdas</h3>
        <button onclick="aiThink()">🔍 Extended Thinking</button>
        <button onclick="aiLearn()">🎓 Guided Learning</button>
        <button onclick="generateQuiz()">📝 Kuis Interaktif</button>
    </div>

    <div class="panel">
        <div id="ai-output">Pilih data atau aktifkan mode cerdas untuk memulai analisis...</div>
    </div>
</div>

<script>
// DATABASE LENGKAP
const db = {
    Amplifier: {
        "Class A": ["JLH 1969", "Nelson Pass Zen", "Hiraga Le Class A", "Aleph 3 Clone", "First Watt F5"],
        "Class B": ["OCL 150W", "OCL 200W Bell", "OCL 400W", "TIP 41/42 OCL", "Mini OCL 50W"],
        "Class AB": ["SOCL 504", "SOCL 506", "MCRD V3", "Yiroshi MK5", "Apex B500"],
        "Class H2": ["Apex H900", "NX 14000", "Raptor 1200", "CA-9", "Extreme H900"],
        "Class H3": ["A3 Super Power", "H3 High Voltage Balap", "Triple Stepper 3000W", "Monster H3"],
        "Class D": ["D900", "D2K", "D3K Fullbridge", "D5K", "D10K", "IRS2092 Stereo"],
        "Class TD & GB": ["Lab Gruppen FP14000", "TD Engine 2000", "GB 1.8", "GB Monster 5000"]
    },
    Transistor: {
        "Toshiba": ["2SC5200", "2SA1943", "2SC3858", "2SC2922", "2SC5198"],
        "Sanken": ["2SC2922(S)", "2SA1216(S)", "2SC3858(S)", "2SC3519", "2SC4468"],
        "MOSFET": ["IRFP250", "IRFP260", "IRFP460", "IRFP4227", "IRFP4229"]
    },
    TOA: {
        "Unit Horn": ["TU-632 (35W)", "TU-652 (50W)"],
        "Amplifier": ["ZA-230W", "ZA-260W", "ZA-2120", "ZA-2240", "ZA-3248"]
    }
};

// LOGIKA SISTEM
function loadSubCat() {
    const cat = document.getElementById('mainCat').value;
    const sub = document.getElementById('subCat');
    sub.innerHTML = "";
    Object.keys(db[cat]).forEach(key => {
        sub.innerHTML += `<option value="${key}">${key}</option>`;
    });
    displayData();
}

function displayData() {
    const cat = document.getElementById('mainCat').value;
    const sub = document.getElementById('subCat').value;
    const out = document.getElementById('ai-output');
    out.innerHTML = `<h3>Data: ${sub}</h3><ul>` + db[cat][sub].map(i => `<li>${i}</li>`).join('') + `</ul>`;
}

function aiThink() {
    document.getElementById('ai-output').innerHTML = "🧠 <b>Analisis Extended Thinking:</b><br>Menganalisis topologi, stabilitas termal, dan efisiensi arus...<br><i>Sistem sedang memvalidasi data untuk hasil akurasi tinggi...</i>";
}

function aiLearn() {
    document.getElementById('ai-output').innerHTML = "🎓 <b>Mode Belajar Terpandu:</b><br>Mari kita bedah perbedaan Class A dan Class D. Apakah kamu ingin tahu tentang efisiensi daya atau kualitas suara (THD) terlebih dahulu?";
}

function generateQuiz() {
    document.getElementById('ai-output').innerHTML = "📝 <b>Kuis Singkat:</b><br>Apa kelemahan utama Class B dibanding Class AB?<br><button>A. Distorsi Crossover</button><br><button>B. Terlalu Panas</button><br><button>C. Efisiensi Rendah</button>";
}

// Inisialisasi
loadSubCat();
</script>
</body>
</html>
