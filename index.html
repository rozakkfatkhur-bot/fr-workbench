<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>FR-AUDIO Qu-32 SUITE MASTER v1.2</title>
    <style>
        :root {
            --bg-body: #08020f;
            --bg-mixer: #130a1c;
            --bg-strip: #1c102a;
            --purple-neon: #a200ff;
            --cyan-neon: #00ffcc;
            --fader-ch: #bc46ff;
        }

        body {
            background-color: var(--bg-body);
            color: #e2dbec;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            user-select: none;
            box-sizing: border-box;
        }

        .top-panel {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 10px;
            background: linear-gradient(135deg, #180927, #270644);
            border: 2px solid var(--purple-neon);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(162, 0, 255, 0.2);
        }

        .sys-title h1 {
            margin: 0; font-size: 20px; color: #fff; text-shadow: 0 0 8px var(--purple-neon);
        }
        .sys-title p { margin: 2px 0 0 0; font-size: 11px; color: var(--cyan-neon); font-family: monospace; }

        .mixer-screen {
            background: #040107;
            border: 2px solid #3d215a;
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #00ff55;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.2);
            line-height: 1.4;
        }

        .bank-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .bank-btn {
            background: #2a1442;
            color: #fff;
            border: 1px solid var(--purple-neon);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .bank-btn.active {
            background: var(--purple-neon);
            box-shadow: 0 0 10px var(--purple-neon);
        }

        .mixer-surface {
            background-color: var(--bg-mixer);
            border: 3px solid #2d1842;
            border-radius: 16px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(8, 1fr) 1.2fr;
            gap: 8px;
            overflow-x: auto;
        }

        .channel-strip {
            background: var(--bg-strip);
            border: 1px solid #331d4c;
            border-radius: 8px;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .channel-strip.master-strip {
            background: linear-gradient(180deg, #1a062b, #2d054e);
            border: 2px solid var(--cyan-neon);
        }

        .ch-num {
            font-size: 11px; font-weight: bold; color: #fff; margin-bottom: 5px;
            background: #000; padding: 2px 6px; border-radius: 4px; width: 80%; text-align: center;
        }
        .master-strip .ch-num { color: var(--cyan-neon); background: #081a17;}

        .btn-ch {
            width: 85%; padding: 6px 0; margin: 3px 0;
            font-size: 10px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer;
        }
        .btn-sel { background: #3d255c; color: white; }
        .btn-sel.active { background: var(--cyan-neon); color: #000; font-weight: bold; box-shadow: 0 0 8px var(--cyan-neon); }
        .btn-mute { background: #5a1827; color: #ff6b8b; }
        .btn-mute.muted { background: #ff0044; color: #fff; box-shadow: 0 0 8px #ff0044; }

        .vu-meter {
            width: 6px; height: 60px; background: #07030a;
            margin: 10px 0; border-radius: 3px; position: relative; overflow: hidden;
            display: flex; flex-direction: column-reverse; gap: 1px;
        }
        .vu-segment { width: 100%; height: 5px; background: #222; opacity: 0.15; transition: 0.05s; }
        .vu-segment.green { background: #00ff55; }
        .vu-segment.yellow { background: #ffea00; }
        .vu-segment.red { background: #ff0044; }

        .fader-wrapper {
            height: 220px; display: flex; align-items: center; justify-content: center; position: relative; margin: 10px 0;
        }
        .fader-track-label {
            position: absolute; height: 100%; display: flex; flex-direction: column; justify-content: space-between;
            left: -12px; font-size: 8px; color: #5a4b6e; font-family: monospace; pointer-events: none;
        }

        input[type=range].v-slider {
            -webkit-appearance: none;
            transform: rotate(-90deg);
            width: 200px; height: 6px;
            background: #09030e; border-radius: 3px;
            outline: none; margin: 0; cursor: pointer;
        }
        input[type=range].v-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px; height: 36px; border-radius: 4px;
            background: linear-gradient(90deg, #fff, #ccc, #aaa);
            border: 2px solid var(--purple-neon); box-shadow: 0 0 5px #000; cursor: pointer;
        }
        .master-strip input[type=range].v-slider::-webkit-slider-thumb {
            border: 2px solid var(--cyan-neon);
        }

        .db-readout {
            font-size: 11px; font-family: monospace; color: var(--cyan-neon); margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="top-panel">
        <div class="sys-title">
            <h1>FR-AUDIO Qu-32</h1>
            <p>CONGLOMERATE CORE ENGINE v1.2</p>
        </div>
        <div class="mixer-screen" id="dispScreen">
            [SYSTEM READY] - LAYER: CH 01 - 08<br>
            MEM_STATE: LOADED FROM LOCAL STORAGE<br>
            SELECTED: NONE
        </div>
        <div class="bank-container">
            <button class="bank-btn active" id="btn-b1" onclick="switchBank(1)">1-8</button>
            <button class="bank-btn" id="btn-b2" onclick="switchBank(2)">9-16</button>
            <button class="bank-btn" id="btn-b3" onclick="switchBank(3)">17-24</button>
            <button class="bank-btn" id="btn-b4" onclick="switchBank(4)">25-32</button>
        </div>
    </div>

    <div class="mixer-surface" id="mixerSurface">
        <div class="channel-strip master-strip" style="grid-column: 9;">
            <div class="ch-num">LR ST</div>
            <button class="btn-ch btn-sel" id="sel-MASTER" onclick="selectCh('MASTER')">SEL</button>
            <button class="btn-ch btn-mute" id="mute-MASTER" onclick="toggleMute('MASTER')">MUTE</button>
            <div class="vu-meter" id="vu-MASTER"></div>
            <div class="fader-wrapper">
                <input type="range" class="v-slider" id="slide-MASTER" min="0" max="100" value="85" oninput="updateFader('MASTER', this.value)">
            </div>
            <div class="db-readout" id="db-MASTER">0.0dB</div>
        </div>
    </div>

    <script>
        let currentBank = 1;
        let selectedChannel = localStorage.getItem('fr_selected') || "NONE";
        let channelData = JSON.parse(localStorage.getItem('fr_mixer_data'));

        // Jika data memory kosong, buat settingan awal standar lapangan
        if (!channelData) {
            channelData = {};
            for(let i=1; i<=32; i++) {
                channelData[i] = { gain: 75, muted: false };
            }
            channelData['MASTER'] = { gain: 85, muted: false };
            saveMemory();
        }

        function saveMemory() {
            localStorage.setItem('fr_mixer_data', JSON.stringify(channelData));
            localStorage.setItem('fr_selected', selectedChannel);
        }

        function createVuSegments(elementId) {
            const vu = document.getElementById(elementId);
            if (!vu) return;
            vu.innerHTML = '';
            for(let i=0; i<12; i++) {
                const seg = document.createElement('div');
                seg.className = 'vu-segment ' + (i > 9 ? 'red' : i > 7 ? 'yellow' : 'green');
                vu.appendChild(seg);
            }
        }

        function renderBank() {
            const surface = document.getElementById('mixerSurface');
            const strips = surface.querySelectorAll('.channel-strip:not(.master-strip)');
            strips.forEach(s => s.remove());

            const startCh = (currentBank - 1) * 8 + 1;
            const endCh = startCh + 7;

            for(let i = startCh; i <= endCh; i++) {
                const data = channelData[i];
                const isSel = (selectedChannel == i);
                const strip = document.createElement('div');
                strip.className = `channel-strip`;
                strip.innerHTML = `
                    <div class="ch-num">CH ${String(i).padStart(2, '0')}</div>
                    <button class="btn-ch btn-sel ${isSel ? 'active' : ''}" id="sel-${i}" onclick="selectCh(${i})">SEL</button>
                    <button class="btn-ch btn-mute ${data.muted ? 'muted' : ''}" id="mute-${i}" onclick="toggleMute(${i})">MUTE</button>
                    <div class="vu-meter" id="vu-${i}"></div>
                    <div class="fader-wrapper">
                        <div class="fader-track-label"><span>+10</span><span>0</span><span>-10</span><span>-30</span><span>-&infin;</span></div>
                        <input type="range" class="v-slider" min="0" max="100" value="${data.gain}" oninput="updateFader(${i}, this.value)">
                    </div>
                    <div class="db-readout" id="db-${i}">${valToDb(data.gain)}</div>
                `;
                surface.insertBefore(strip, surface.lastElementChild);
                createVuSegments(`vu-${i}`);
            }

            // Update status tombol Master Mute & Master Sel dari memory
            document.getElementById('mute-MASTER').className = `btn-ch btn-mute ${channelData['MASTER'].muted ? 'muted' : ''}`;
            document.getElementById('mute-MASTER').innerText = 'MUTE';
            document.getElementById('sel-MASTER').className = `btn-ch btn-sel ${selectedChannel == 'MASTER' ? 'active' : ''}`;
            document.getElementById(`slide-MASTER`).value = channelData['MASTER'].gain;
            document.getElementById(`db-MASTER`).innerText = valToDb(channelData['MASTER'].gain);

            createVuSegments('vu-MASTER');
            updateScreen();
        }

        function switchBank(bankNum) {
            currentBank = bankNum;
            document.querySelectorAll('.bank-btn').forEach((b, idx) => {
                b.classList.toggle('active', (idx + 1) === bankNum);
            });
            renderBank();
        }

        function updateFader(ch, val) {
            channelData[ch].gain = parseInt(val);
            document.getElementById(`db-${ch}`).innerText = valToDb(val);
            saveMemory();
        }

        function toggleMute(ch) {
            channelData[ch].muted = !channelData[ch].muted;
            const btn = document.getElementById(`mute-${ch}`);
            if(btn) btn.classList.toggle('muted');
            saveMemory();
        }

        function selectCh(ch) {
            selectedChannel = ch;
            saveMemory();
            renderBank();
        }

        function valToDb(val) {
            if(val == 0) return "-INF";
            let db = (val - 75) / 2.5;
            return (db > 0 ? "+" : "") + db.toFixed(1) + "dB";
        }

        function updateScreen() {
            const start = (currentBank - 1) * 8 + 1;
            const end = start + 7;
            let displaySel = (selectedChannel === "NONE") ? "NONE" : (selectedChannel === "MASTER") ? "MASTER LR" : `CH ${String(selectedChannel).padStart(2,'0')}`;
            
            document.getElementById('dispScreen').innerHTML = `
                [SYSTEM OK] - LAYER ACTIVE: CH ${String(start).padStart(2,'0')}-${String(end).padStart(2,'0')}<br>
                PRESET: LIVE_FIELD_REVERB_SULTAN<br>
                SELECTED CHANNEL: ${displaySel} &bull; MEMORY OK
            `;
        }

        // Live VU Meter Randomizer
        setInterval(() => {
            const start = (currentBank - 1) * 8 + 1;
            const end = start + 7;
            
            for(let i = start; i <= end; i++) {
                if(channelData[i].muted) {
                    animateVu(`vu-${i}`, -1);
                    continue;
                }
                animateVu(`vu-${i}`, Math.floor(Math.random() * 12));
            }
            if(!channelData['MASTER'].muted) {
                animateVu('vu-MASTER', Math.floor(Math.random() * 12));
            } else {
                animateVu('vu-MASTER', -1);
            }
        }, 100);

        function animateVu(elementId, level) {
            const vu = document.getElementById(elementId);
            if(!vu) return;
            const segments = vu.children;
            for(let i=0; i<segments.length; i++) {
                segments[i].style.opacity = (i <= level) ? '1' : '0.15';
            }
        }

        // Jalankan Pertama Kali
        renderBank();
    </script>
</body>
</html>
