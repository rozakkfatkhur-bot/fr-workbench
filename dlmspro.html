<!DOCTYPE html>
<html lang="id">
<head>
    <style>
        :root {
            --bg-dark: #121418;
            --panel-bg: #1e2128;
            --accent-blue: #00a8ff;
            --text-light: #d1d1d1;
            --fader-track: #0e0f12;
        }

        body { background: var(--bg-dark); color: var(--text-light); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        /* Container Utama */
        .mixer-wrapper { background: var(--panel-bg); padding: 20px; border-radius: 10px; width: 900px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* EQ Graph (Visualisasi Grafik) */
        .eq-graph { background: #15171d; height: 150px; border: 1px solid #333; position: relative; margin-bottom: 20px; border-radius: 4px; }
        .eq-line { stroke: var(--accent-blue); fill: none; stroke-width: 2; }

        /* Channel Strip */
        .mixer-board { display: flex; gap: 15px; }
        .channel { width: 100px; display: flex; flex-direction: column; align-items: center; gap: 10px; border-right: 1px solid #333; padding-right: 10px; }

        /* Fader */
        .fader-track { height: 150px; width: 20px; background: var(--fader-track); border-radius: 10px; position: relative; }
        .fader-thumb { width: 30px; height: 15px; background: var(--accent-blue); position: absolute; left: -5px; cursor: pointer; border-radius: 3px; }

        /* Knob (Potensio) */
        .knob { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #555; display: flex; align-items: center; justify-content: center; position: relative; }
        .knob::after { content: ''; width: 2px; height: 15px; background: var(--accent-blue); position: absolute; top: 2px; }

        /* Button */
        .btn-mute-solo { display: flex; gap: 5px; margin-top: 10px; }
        button { background: #333; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div class="mixer-wrapper">
    <!-- Top EQ Section (Representasi dari 1000746978_2.jpg) -->
    <div class="eq-graph">
        <svg width="100%" height="100%">
            <path class="eq-line" d="M0 80 Q 200 40, 400 80 T 800 80" />
        </svg>
    </div>

    <!-- Mixer Board Section -->
    <div class="mixer-board">
        <!-- Contoh Channel -->
        <div class="channel">
            <div class="knob"></div>
            <span>Gain</span>
            <div class="fader-track"><div class="fader-thumb" style="top: 50px;"></div></div>
            <div class="btn-mute-solo">
                <button>Mute</button>
                <button>Solo</button>
            </div>
            <p>Mic</p>
        </div>
        <!-- Tambahkan lebih banyak channel dengan struktur sama -->
    </div>
</div>

</body>
</html>
