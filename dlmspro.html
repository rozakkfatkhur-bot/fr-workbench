<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Mastering Chain Replica - 1000746648.jpg</title>
    <style>
        /* ==========================================================================
           RESET & CORE STYLES 
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #0f1115;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #d1d5db;
            padding: 20px;
        }

        /* ==========================================================================
           MAIN RACK CONTAINER (Background mirip panel besi biru-abu-abu)
           ========================================================================== */
        .mastering-chain-rack {
            display: flex;
            background: linear-gradient(180deg, #42586b 0%, #324454 50%, #253341 100%);
            border: 4px solid #1a232c;
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.2);
            height: 600px;
            width: 1100px;
            position: relative;
            overflow: hidden;
        }

        /* Pembatas antar modul */
        .module {
            position: relative;
            height: 100%;
            border-right: 2px solid #1b2631;
            box-shadow: inset -1px 0 0 rgba(255,255,255,0.05), 1px 0 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 12px;
            justify-content: space-between;
        }
        
        /* Ukuran Lebar Modul Sesuai Gambar 1000746648.jpg */
        .mod-input   { width: 18%; }
        .mod-filter  { width: 16%; }
        .mod-limiter { width: 18%; }
        .mod-tone    { width: 26%; }
        .mod-output  { width: 22%; border-right: none; background: linear-gradient(180deg, #4a6075 0%, #293846 100%);}

        /* Sekrup Panel Grapis */
        .screw {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #7f8c8d 30%, #34495e 80%);
            border-radius: 50%;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.5);
            position: absolute;
        }
        .screw.top-left { top: 6px; left: 6px; }
        .screw.bottom-left { bottom: 6px; left: 6px; }

        /* ==========================================================================
           REUSABLE SUB-COMPONENTS (Knobs, Buttons, Switches)
           ========================================================================== */
        /* Header Modul (Tombol Power & Indikator atas) */
        .mod-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }
        .power-btn {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 2px;
            box-shadow: 0 0 4px #fff;
            cursor: pointer;
        }
        .routing-selectors {
            display: flex;
            gap: 2px;
        }
        .route-tab {
            font-size: 8px;
            padding: 2px 5px;
            background: #2c3e50;
            color: #95a5a6;
            border: 1px solid #1a252f;
            cursor: pointer;
        }
        .route-tab.active {
            color: #3498db;
            background: #1a252f;
            font-weight: bold;
        }

        /* Komponen Knob Putar Tradisional */
        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin: 10px 0;
        }
        .knob-label {
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            color: #cbd5e1;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5);
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        .knob-dial {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.2);
        }
        /* Varian Warna Knob */
        .knob-grey { background: radial-gradient(circle, #7e8c8d 0%, #525f60 100%); }
        .knob-red { background: radial-gradient(circle, #c0392b 0%, #962d22 100%); }
        .knob-black { background: radial-gradient(circle, #2c3e50 0%, #11181f 100%); }
        
        /* Garis Penunjuk Knob (Pointer) */
        .knob-pointer {
            position: absolute;
            width: 4px;
            height: 25px;
            background: #ffffff;
            top: 4px;
            left: calc(50% - 2px);
            border-radius: 2px;
            transform-origin: bottom center;
        }

        /* Tombol Kotak (Square Buttons) */
        .square-btn {
            width: 22px;
            height: 22px;
            background: #7f8c8d;
            border: 2px solid #2c3e50;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .square-btn.active-red {
            background: #e74c3c;
            box-shadow: 0 0 8px #e74c3c, inset 0 1px 0 rgba(255,255,255,0.4);
        }

        /* Modul Footer Label */
        .mod-footer {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            text-align: right;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 4px;
            color: #11161b;
            text-shadow: 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mod-id { font-size: 9px; color: rgba(0,0,0,0.4); }

        /* ==========================================================================
           SPESIFIK MODUL: OUTPUT & METERS (Modul Paling Kanan)
           ========================================================================== */
        .abbey-logo {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1;
            color: #000;
        }
        .vu-meter-container {
            display: flex;
            gap: 15px;
            height: 220px;
            background: #151d24;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #34495e;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
        }
        .led-strip {
            width: 12px;
            height: 100%;
            background: #090d10;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            gap: 2px;
            padding: 2px;
        }
        .led-node {
            height: 4px;
            width: 100%;
            background: #1e272e;
        }
        .led-node.green.active { background: #2ecc71; box-shadow: 0 0 4px #2ecc71; }

    </style>
</head>
<body>

    <div class="mastering-chain-rack">
        
        <!-- ==========================================
             MODUL 1: INPUT (TG12411)
             ========================================== -->
        <div class="module mod-input">
            <div class="screw top-left"></div>
            <div class="mod-header">
                <div class="power-btn"></div>
                <div class="routing-selectors">
                    <div class="route-tab active">ST</div>
                    <div class="route-tab">DUO</div>
                    <div class="route-tab">MS</div>
                </div>
            </div>

            <!-- Bagian Atas: Dual Knobs -->
            <div style="display: flex; justify-content: space-around; margin-top: 15px;">
                <!-- Input Knob -->
                <div class="knob-container">
                    <div class="knob-dial knob-grey" style="transform: rotate(-30deg);">
                        <div class="knob-pointer"></div>
                    </div>
                    <div class="knob-label">Input</div>
                </div>
                <!-- Tape Equalizer Knob -->
                <div class="knob-container">
                    <div class="knob-dial knob-red" style="transform: rotate(45deg);">
                        <div class="knob-pointer"></div>
                    </div>
                    <div class="knob-label">Tape EQ</div>
                </div>
            </div>

            <!-- Bagian Tengah: Saklar Kotak -->
            <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                <div style="text-align:center;">
                    <div class="square-btn active-red"></div>
                    <div style="font-size:7px; margin-top:4px; font-weight:bold;">POLE L</div>
                </div>
                <div style="text-align:center;">
                    <div class="square-btn"></div>
                    <div style="font-size:7px; margin-top:4px; font-weight:bold;">TRANSPOSE</div>
                </div>
            </div>

            <!-- Bagian Bawah: Bal & Phase -->
            <div class="knob-container">
                <div class="knob-dial knob-black" style="transform: rotate(0deg); width:45px; height:45px;">
                    <div class="knob-pointer" style="height:20px;"></div>
                </div>
                <div class="knob-label">BAL</div>
            </div>

            <div class="knob-container">
                <div class="knob-dial knob-red" style="transform: rotate(180deg); width:45px; height:45px;">
                    <div class="knob-pointer" style="height:20px;"></div>
                </div>
                <div class="knob-label">PHASE</div>
            </div>

            <div class="screw bottom-left"></div>
            <div class="mod-footer">
                <span class="mod-id">TG12411</span>
                <span>INPUT</span>
            </div>
        </div>


        <!-- ==========================================
             MODUL 2: FILTER (TG12414)
             ========================================== -->
        <div class="module mod-filter">
            <div class="mod-header">
                <div class="power-btn" style="background:#42586b; box-shadow:none;"></div>
            </div>
            
            <div class="knob-container" style="margin-top:30px;">
                <div class="knob-dial knob-black" style="transform: rotate(-60deg);"><div class="knob-pointer"></div></div>
                <div class="knob-label">Low Pass</div>
            </div>

            <div class="knob-container">
                <div class="knob-dial knob-grey" style="transform: rotate(20deg);"><div class="knob-pointer"></div></div>
                <div class="knob-label">Presence</div>
            </div>

            <div class="knob-container">
                <div class="knob-dial knob-black" style="transform: rotate(0deg); width:45px; height:45px;"><div class="knob-pointer"></div></div>
                <div class="knob-label">High Pass</div>
            </div>

            <div class="mod-footer">
                <span class="mod-id">TG12414</span>
                <span>FILTER</span>
            </div>
        </div>


        <!-- ==========================================
             MODUL 3: LIMITER (TG12413)
             ========================================== -->
        <div class="module mod-limiter">
            <div class="mod-header">
                <div class="power-btn"></div>
            </div>

            <div style="display: flex; justify-content: space-around;">
                <div class="knob-container">
                    <div class="knob-dial knob-red" style="transform: rotate(-45deg); width:45px; height:45px;"><div class="knob-pointer"></div></div>
                </div>
                <div class="knob-container">
                    <div class="knob-dial knob-black" style="transform: rotate(35deg); width:45px; height:45px;"><div class="knob-pointer"></div></div>
                </div>
            </div>
            <div style="text-align: center; font-size: 8px; font-weight: bold; margin-top: -5px; color:#cbd5e1;">RECOVERY</div>

            <!-- VU Meter Fisik Kompresor (GR Meter) -->
            <div style="width: 50px; height: 130px; background: #eccc68; border: 3px solid #2c3e50; margin: 20px auto; position: relative; border-radius: 2px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5)">
                <!-- Jarum VU Analon -->
                <div style="position: absolute; width: 2px; height: 100px; background: #000; left: 24px; top: 10px; transform-origin: bottom center; transform: rotate(15deg); transition: transform 0.1s ease;"></div>
                <div style="position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 9px; font-weight: bold; color: #000;">GR</div>
            </div>

            <div class="mod-footer">
                <span class="mod-id">TG12413</span>
                <span>LIMITER</span>
            </div>
        </div>


        <!-- ==========================================
             MODUL 4: TONE (TG12412) - 4-Band Parametric
             ========================================== -->
        <div class="module mod-tone">
            <div class="mod-header">
                <div class="power-btn"></div>
            </div>

            <!-- Baris Kontrol Tone EQ (4 Band Simetris) -->
            <!-- Contoh Kontrol Band ke-4 (Paling atas di gambar) -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 5px 0;">
                <span style="font-size: 9px; font-weight: bold;">4</span>
                <div class="knob-dial knob-grey" style="width: 38px; height: 38px; transform: rotate(-20deg);"><div class="knob-pointer"></div></div>
                <div class="knob-dial knob-black" style="width: 38px; height: 38px; transform: rotate(10deg);"><div class="knob-pointer"></div></div>
                <div class="knob-dial knob-grey" style="width: 38px; height: 38px; transform: rotate(40deg);"><div class="knob-pointer"></div></div>
            </div>
            
            <!-- Band ke-3 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 5px 0;">
                <span style="font-size: 9px; font-weight: bold;">3</span>
                <div class="knob-dial knob-grey" style="width: 38px; height: 38px; transform: rotate(15deg);"><div class="knob-pointer"></div></div>
                <div class="knob-dial knob-black" style="width: 38px; height: 38px; transform: rotate(-30deg);"><div class="knob-pointer"></div></div>
                <div class="knob-dial knob-grey" style="width: 38px; height: 38px; transform: rotate(0deg);"><div class="knob-pointer"></div></div>
            </div>

            <!-- Band ke-2 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 5px 0;">
                <span style="font-size: 9px; font-weight: bold;">2</span>
                <div class="knob-dial knob-grey" style="width: 38px; height: 38px; transform: rotate(-45deg);"><div class="knob-pointer"></div></div>
                <div class="knob-dial knob-black" style="width: 38px; height: 38px; transform: rotate(45deg);"><div class="knob-pointer"></div></div>
                <div class="knob-dial knob-grey" style="width: 38px; height: 38px; transform: rotate(-10deg);"><div class="knob-pointer"></div></div>
            </div>

            <div class="mod-footer">
                <span class="mod-id">TG12412</span>
                <span>TONE</span>
            </div>
        </div>


        <!-- ==========================================
             MODUL 5: SPREADER & OUTPUT METER 
             ========================================== -->
        <div class="module mod-output">
            <!-- Branding Header -->
            <div style="text-align: right; padding-right: 5px;">
                <div class="abbey-logo">Abbey Road Studios</div>
                <div style="font-size: 8px; color: #7f8c8d;">TG Mastering Chain</div>
            </div>

            <!-- Spreader Knob -->
            <div class="knob-container" style="margin-top: 10px;">
                <div class="knob-dial knob-red" style="width: 45px; height: 45px; transform: rotate(25deg);"><div class="knob-pointer"></div></div>
                <div class="knob-label" style="font-size: 8px;">SPREADER</div>
            </div>

            <!-- Master LED Output Meters -->
            <div class="vu-meter-container">
                <div class="led-strip">
                    <!-- Loop Render Baris LED Hijau s.d Merah -->
                    <div class="led-node green active"></div>
                    <div class="led-node green active"></div>
                    <div class="led-node green active"></div>
                    <div class="led-node green active"></div>
                    <div class="led-node green"></div>
                </div>
                <div class="led-strip">
                    <div class="led-node green active"></div>
                    <div class="led-node green active"></div>
                    <div class="led-node green active"></div>
                    <div class="led-node green"></div>
                    <div class="led-node green"></div>
                </div>
            </div>

            <div class="mod-footer" style="border:none;">
                <span></span>
                <span>OUTPUT</span>
            </div>
        </div>

    </div>

</body>
</html>
