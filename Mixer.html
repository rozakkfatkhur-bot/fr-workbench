<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM3 Web Mixer Interface</title>
    <style>
        /* --- 1. RESET & BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Utama Mixer */
        .mixer-container {
            display: grid;
            grid-template-columns: 120px 1fr;
            width: 100%;
            max-width: 1200px;
            background-color: #0b0b0b;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* --- 2. SIDEBAR KIRI --- */
        .sidebar {
            background-color: #151515;
            border-right: 2px solid #222;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .side-btn {
            background-color: #2a2a2a;
            color: #aaa;
            border: 1px solid #444;
            padding: 12px 5px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .side-btn.active {
            background-color: #2b5c2b;
            color: #fff;
            border-color: #4af;
        }

        /* --- 3. DASHBOARD UTAMA (KANAN) --- */
        .main-dashboard {
            display: grid;
            grid-template-rows: 1.2fr 1fr;
            height: 650px;
        }

        /* Panel Atas (EQ & Dynamics) */
        .top-panel {
            display: grid;
            grid-template-columns: 2fr 1fr;
            background-color: #121212;
            border-bottom: 2px solid #222;
            padding: 15px;
            gap: 15px;
        }

        .eq-screen {
            background-color: #050505;
            border: 1px solid #333;
            border-radius: 6px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
        }

        /* Garis hijau EQ di tengah */
        .eq-line {
            width: 90%;
            height: 2px;
            background-color: #00ff66;
            position: relative;
            box-shadow: 0 0 8px #00ff66;
        }

        .dynamics-panel {
            background-color: #1c1c1c;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .dyn-box {
            background-color: #090909;
            height: 45%;
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #888;
        }

        /* --- 4. PANEL BAWAH (FADERS) --- */
        .fader-bank {
            background-color: #181818;
            display: flex;
            padding: 10px;
            gap: 5px;
            overflow-x: auto;
        }

        /* Desain per-Channel Strip */
        .channel-strip {
            background-color: #222;
            width: 70px;
            flex-shrink: 0;
            border-radius: 4px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            justify-content: space-between;
        }

        .ch-on-btn {
            background-color: #ff6600;
            color: black;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 3px;
            border: none;
            cursor: pointer;
        }

        /* Wadah Fader Vertikal */
        .fader-container {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Memutar Input Range Menjadi Vertikal */
        .fader-input {
            transform: rotate(-90deg);
            width: 120px;
            height: 6px;
            background: #111;
            outline: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .ch-name {
            font-size: 10px;
            background-color: #111;
            width: 90%;
            text-align: center;
            padding: 2px 0;
            border-radius: 2px;
            color: #00ff66;
        }

        /* Master Fader (Paling Kanan) */
        .channel-strip.master {
            background-color: #2d2d2d;
            border: 1px solid #555;
            margin-left: auto; /* Memberi jarak dari channel biasa */
        }
        
        .channel-strip.master .ch-name {
            color: #ff3333;
        }
    </style>
</head>
<body>

    <div class="mixer-container">
        <div class="sidebar">
            <button class="side-btn">HOME</button>
            <button class="side-btn">LIBRARY</button>
            <button class="side-btn">CH NAMES</button>
            <hr style="border-color: #333;">
            <button class="side-btn active">ONLINE</button>
            <div style="font-size: 9px; text-align:center; color:#666; margin-top:auto;">Yamaha DM3</div>
        </div>

        <div class="main-dashboard">
            
            <div class="top-panel">
                <div class="eq-screen">
                    <span style="position:absolute; top:5px; left:10px; font-size:12px; color:#666;">EQ Screen</span>
                    <div class="eq-line"></div>
                </div>
                <div class="dynamics-panel">
                    <div class="dyn-box">DYN 1 (Comp)</div>
                    <div class="dyn-box">DYN 2 (Gate)</div>
                </div>
            </div>

            <div class="fader-bank">
                <div class="channel-strip">
                    <button class="ch-on-btn">ON</button>
                    <div class="fader-container">
                        <input type="range" class="fader-input" min="0" max="100" value="70">
                    </div>
                    <div class="ch-name">CH 1</div>
                </div>
                <div class="channel-strip">
                    <button class="ch-on-btn">ON</button>
                    <div class="fader-container">
                        <input type="range" class="fader-input" min="0" max="100" value="50">
                    </div>
                    <div class="ch-name">CH 2</div>
                </div>
                <div class="channel-strip">
                    <button class="ch-on-btn">ON</button>
                    <div class="fader-container">
                        <input type="range" class="fader-input" min="0" max="100" value="20">
                    </div>
                    <div class="ch-name">CH 3</div>
                </div>
                <div class="channel-strip">
                    <button class="ch-on-btn">ON</button>
                    <div class="fader-container">
                        <input type="range" class="fader-input" min="0" max="100" value="85">
                    </div>
                    <div class="ch-name">CH 4</div>
                </div>
                <div class="channel-strip">
                    <button class="ch-on-btn">ON</button>
                    <div class="fader-container">
                        <input type="range" class="fader-input" min="0" max="100" value="0">
                    </div>
                    <div class="ch-name">CH 5</div>
                </div>

                <div class="channel-strip master">
                    <button class="ch-on-btn" style="background-color: red; color: white;">ST</button>
                    <div class="fader-container">
                        <input type="range" class="fader-input" min="0" max="100" value="75">
                    </div>
                    <div class="ch-name">STEREO</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
